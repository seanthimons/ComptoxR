name: Record VCR Cassettes

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Test file selection for live recording
        required: true
        default: priority
        type: choice
        options:
          - priority
          - all
          - failures
      workers:
        description: Parallel worker count
        required: true
        default: "4"
        type: string
      batch_size:
        description: Test files per batch
        required: true
        default: "20"
        type: string

jobs:
  record:
    name: Record cassettes from live APIs
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      ctx_api_key: ${{ secrets.CTX_API_KEY }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::cli
            any::fs
            any::here
            any::jsonlite
            any::mirai
            any::testthat
            any::vcr
            any::yaml
          needs: check

      - name: Record cassettes
        run: |
          args <- c("--record-live", "--workers", "${{ inputs.workers }}", "--batch-size", "${{ inputs.batch_size }}")
          mode <- "${{ inputs.mode }}"
          if (mode == "all") {
            args <- c(args, "--all")
          } else if (mode == "failures") {
            args <- c(args, "--failures")
          }
          status <- system2("Rscript", c("dev/rerecord_cassettes.R", args))
          quit(save = "no", status = status)
        shell: Rscript {0}

      - name: Upload recorded fixtures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recorded-cassettes
          path: |
            tests/testthat/fixtures/**/*.yml
            dev/logs/rerecord_failures.log
          if-no-files-found: warn
