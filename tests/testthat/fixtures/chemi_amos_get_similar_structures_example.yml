01014168","fact_sheet_name":"CBIS-1 is a certified reference material (CRM) designed for use in method development, validation, and quality control for the analysis of cannabinoids in cannabis. While cannabinoid solution reference standards are appropriate for instrument calibration, matrix CRMs such as CBIS-1 can help validate entire methods, from sampling, extraction, clean-up, and instrumental analysis. Certified values for the mass fraction of cannabinoids in CBIS-1 have been established.","has_searched_substance":false,"internal_id":"FS-43683","similarity":0.5116279,"source":"NRC Canada","substance_name":"Cannabigerol"},{"dtxsid":"DTXSID00871959","fact_sheet_name":"CBIS-1 is a certified reference material (CRM) designed for use in method development, validation, and quality control for the analysis of cannabinoids in cannabis. While cannabinoid solution reference standards are appropriate for instrument calibration, matrix CRMs such as CBIS-1 can help validate entire methods, from sampling, extraction, clean-up, and instrumental analysis. Certified values for the mass fraction of cannabinoids in CBIS-1 have been established.","has_searched_substance":false,"internal_id":"FS-43683","similarity":0.5217391,"source":"NRC Canada","substance_name":"Cannabidiol"},{"dtxsid":"DTXSID801019159","fact_sheet_name":"CBIS-1 is a certified reference material (CRM) designed for use in method development, validation, and quality control for the analysis of cannabinoids in cannabis. While cannabinoid solution reference standards are appropriate for instrument calibration, matrix CRMs such as CBIS-1 can help validate entire methods, from sampling, extraction, clean-up, and instrumental analysis. Certified values for the mass fraction of cannabinoids in CBIS-1 have been established.","has_searched_substance":false,"internal_id":"FS-43683","similarity":0.5217391,"source":"NRC Canada","substance_name":"Cannabidivarin"},{"dtxsid":"DTXSID701014168","fact_sheet_name":"HEMP-1 is a certif