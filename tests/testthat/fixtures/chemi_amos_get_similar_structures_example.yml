n food additives / prepared by the sixty-fifth meeting of the Joint FAO/WHO Expert Committee on Food Additives (JEFCA)","FS-43376":"Evaluation of certain food additives: sixty-fifth report of the Joint FAO/WHO Expert Committee on Food Additives","FS-43384":"Evaluation of certain food additives and contaminants: fifty-seventh report of the Joint FAO/WHO Expert Committee on Food Additives","FS-43487":"Desvenlafaxine (Pristiq) Monograph","FS-43673":"BPAL-1 is a pure substance certified reference material (CRM) for [13C5]-bisphenol A. This material, distributed in 5 mg units, is suitable for use as an internal standard during liquid chromatograph \u2013 mass spectrometry (LC\u2012MS) for the quantitation of bisphenol A. A certified value for the mass fraction of bisphenol A has been established for this CRM.","FS-43674":"BPAN-1 is a pure substance certified reference material (CRM) for bisphenol A. This material, distributed in 30 mg units, is intended for instrument calibration, method development, and validation for the quantitation of bisphenol A. A certified value for the mass fraction of bisphenol A has been established for this CRM.","FS-43680":"CBDN-1 is a calibration solution certified reference material (CRM) for the cannabinoid cannabidiol (CBD), in methanol. This material, distributed in 1 mL units, is intended for instrument calibration, method development, validation, and quantitation of CBD in cannabis, hemp, and other cannabis-derived products. Certified values for the mass fraction and mass concentration of cannabidiol in CBDN-1 have been established.","FS-43682":"CBGN-1 is a calibration solution certified reference material (CRM) for the cannabinoid cannabigerol (CBG), in methanol. This material, distributed in 1 mL units, is intended for instrument calibration, method development, validation, and quantitation of CBG in cannabis, hemp, and other cannabis-derived products. Certified values for the mass fraction and mass concentration of cannabigerol in CBGN 1 have been established. The information values for the mass fraction and mass concentration of a minor impurity in CBGN-1 is provided.","FS-43683":"CBIS-1 is a certified reference material (CRM) designed for use in method development, validation, and quality control for the analysis of cannabinoids in cannabis. While cannabinoid solution reference standards are appropriate for instrument calibration, matrix CRMs such as CBIS-1 can help validate entire methods, from sampling, extraction, clean-up, and instrumental analysis. Certified values for the mass fraction of cannabinoids in CBIS-1 have been established.","FS-43747":"HEMP-1 is a certified reference material (CRM) designed for use in method development, validation, and quality control for the analysis of cannabinoids in cannabis and hemp. While cannabinoid solution reference standards are appropriate for instrument calibration, matrix CRMs such as HEMP-1 can help validate entire methods, from sampling, extraction, clean-up, and instrumental analysis. Certified values for the mass fraction of cannabinoids in HEMP-1 have been established.","FS-43787":"SESA-1 is an artificial sea salt Certified Reference Material (CRM) from the National Research Council Canada (NRC) to be used as a proxy for seawater. A unit of SESA-1 consists of 9 g of salt powder certified for trace elements. Additionally, SESA-1 was spiked with numerous organic contaminants for future method development purposes. Gravimetric formulation information is provided for all spiked analytes. A 4.0 g of SESA-1 should be transferred into a pre-cleaned flask and reconstituted to 100 g using diluted HNO3 as detailed in the Intended Use section. SESA-1 reconstituted solution has a typical salinity of seawater and can be used for method development and quality control for the analysis of trace elements in seawaters similar to NRC CASS-6 and NASS-7.","FS-43799":"THCN-1 is a calibration solution certified reference material (CRM) for the cannabinoid delta-9-tetrahydrocannabinol (\u03949-THC), in methanol. This material, distributed in 1 mL units, is intended for instrument calibration, method development, validation, and quantitation of \u03949-THC in cannabis, hemp, and other cannabis-derived products. Certified values for the mass fraction and mass concentration of delta-9-tetrahydrocannabinol in THCN-1 have been established.","FS-43978":"SCCNFP Opinion on the use of Benzoyl Peroxide (BPO) Hydroquinone (HQ), Hydroquinone Methylether (MEHQ) in artificial nail systems","FS-43988":"SCCNFP Opinion concerning the safety review of the use of certain azo-dyes in cosmetic products","FS-43993":"SCCNFP Opinion concerning an initial list of perfumery materials which must not form part of cosmetic products except subject to the restrictions and conditions laid down","FS-44005":"SCCNFP Opinion concerning an initial list of perfumery materials which must not form part of fragrances compounds used in cosmetic products (","FS-44008":"SCCNFP The Scientific Committee on Cosmetic Products and Non-Food Products intended for Consumers concerning Fragrance Allergy in Consumers","FS-4401":"NIOSH pocket guide for Ethyl benzene","FS-44010":"SCCNFP Draft pre-opinion of the Scientific Committee on Cosmetic Products and non-food products intended for consumers concerning Fragrance allergy in consumers (30 Septembre 1999)","FS-44026":"Scientific Committee on Consumer Products opinion on: Cresylpropionaldehyde (p-Methyldihydrocinnamaldehyde) (sensitisation only)","FS-44035":"Scientific Committee on Consumer Products opinion on: : 2-Methyl-1-naphthol (including 1-acetoxy-2-methylnaphthalene, A153)","FS-44036":"Scientific Committee on Consumer Products opinion on: : 2,2'-Methylenebis-4-aminophenol HCl","FS-44038":"Scientific Committee on Consumer Products opinion on: : 2-Methylresorcinol","FS-44085":"Scientific Committee on Consumer Products opinion on: 2-Methylresorcinol","FS-44086":"Scientific Committee on Consumer Products opinion on: 4-Amino