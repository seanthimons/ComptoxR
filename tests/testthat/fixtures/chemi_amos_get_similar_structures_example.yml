ed Reference Material (CRM) from the National Research Council Canada (NRC) to be used as a proxy for seawater. A unit of SESA-1 consists of 9 g of salt powder certified for trace elements. Additionally, SESA-1 was spiked with numerous organic contaminants for future method development purposes. Gravimetric formulation information is provided for all spiked analytes. A 4.0 g of SESA-1 should be transferred into a pre-cleaned flask and reconstituted to 100 g using diluted HNO3 as detailed in the Intended Use section. SESA-1 reconstituted solution has a typical salinity of seawater and can be used for method development and quality control for the analysis of trace elements in seawaters similar to NRC CASS-6 and NASS-7.","has_searched_substance":true,"internal_id":"FS-43787","similarity":1.0001,"source":"NRC Canada","substance_name":"Bisphenol A"},{"dtxsid":"DTXSID9020827","fact_sheet_name":"SESA-1 is an artificial sea salt Certified Reference Material (CRM) from the National Research Council Canada (NRC) to be used as a proxy for seawater. A unit of SESA-1 consists of 9 g of salt powder certified for trace elements. Additionally, SESA-1 was spiked with numerous organic contaminants for future method development purposes. Gravimetric formulation information is provided for all spiked analytes. A 4.0 g of SESA-1 should be transferred into a pre-cleaned flask and reconstituted to 100 g using diluted HNO3 as detailed in the Intended Use section. SESA-1 reconstituted solution has a typical salinity of seawater and can be used for method development and quality control for the analysis of trace elements in seawaters similar to NRC CASS-6 and NASS-7.","has_searched_substance":true,"internal_id":"FS-43787","similarity":0.6097561,"source":"NRC Canada","substance_name":"Methoxychlor"},{"dtxsid":"DTXSID701014168","fact_sheet_name":"THCN-1 is a calibration solution certified reference material (CRM) for the cannabinoid delta-9-tetrahydrocannabinol (\u03949-THC), in methanol. Thi