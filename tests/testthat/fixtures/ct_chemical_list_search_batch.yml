        }, {
          "id" : 391,
          "listName" : "STOFFIDENT",
          "label" : "WATER: STOFF-IDENT Database of Water-Relevant Substances",
          "type" : "other",
          "shortDescription" : "STOFF-IDENT is a database of water relevant substances collated from various sources within the STOFF-IDENT and FOR-IDENT projects, hosted by LfU, HSWT and TUM. The database at https://www.lfu.bayern.de/stoffident/#!home has additional functionality. ",
          "longDescription" : "STOFF-IDENT is a database of water relevant substances collated from various sources within the STOFF-IDENT and FOR-IDENT projects, hosted by the Bavarian Environment Agency (Bayerisches Landesamt für Umwelt, <a href=\"https://www.lfu.bayern.de/\" target=\"_blank\">LfU</a>), the University of Applied Sciences Weihenstephan-Triesdorf (<a href=\"https://www.hswt.de/en.html\" target=\"_blank\">HSWT</a>) and the Technical University of Munich (<a href=\"https://www.tum.de/en/homepage/\" target=\"_blank\">TUM</a>). \r\nThe databases at <a href=\"https://www.lfu.bayern.de/stoffident/#!home\" target=\"_blank\">https://www.lfu.bayern.de/stoffident/#!home</a> and <a href=\"https://water.for-ident.org/#!home\" target=\"_blank\">https://water.for-ident.org/#!home</a> have additional functionality, enabling the search for exact masses from target or unknown lists and the automatic use of a Retention Time Index. Single searches are possible for free; batch queries after free registration. STOFF-IDENT is also available on the <a href=\"http://www.norman-network.com/?q=node/236\" target=\"_blank\">NORMAN Suspect List Exchange</a>. This list is undergoing continuous curation/extension.  \r\n",
          "chemicalCount" : 8885,
          "updatedAt" : "2018-11-17T14:30:39Z"
        }, {
          "id" : 948,
          "listName" : "SUSDAT",
          "label" : "NORMAN: Norman Network Suspect Screening List (SUSDAT)",
          "type" : "other",
          "shortDescription" : "Merged NORMAN Suspect List “SusDat” from the NORMAN Suspect Exchange.",
          "longDescription" : "NORMAN SusDat is a merged Suspect List containing all (mapped) entries listed on the NORMAN Suspect Exchange <a href='http://www.norman-network.com/?q=node/236'target=' _blank'>(http://www.norman-network.com/?q=node/236)</a>, including all individual NORMAN lists here. This list is undergoing continuous expansion and curation. For more information refer to the NORMAN website. Compiled by E. Schymanski, R. Aalizadeh, N. Alygizakis, A.J. Williams and more. UPDATED 06/21/2020",
          "chemicalCount" : 62259,
          "updatedAt" : "2020-06-21T13:19:30Z"
        }, {
          "id" : 1137,
          "listName" : "T3DB",
          "label" : "T3DB Toxic Exposome Database",
          "type" : "other",
          "shortDescription" : "T3DB provides mechanisms of toxicity and target proteins for each toxin.",
          "longDescription" : "The focus of the T3DB is on providing mechanisms of toxicity and target proteins for each toxin. This dual nature of the T3DB, in which toxin and toxin target records are interactively linked in both directions, makes it unique from existing databases. It is both modelled after and closely linked to the Human Metabolome Database (HMDB) and DrugBank. Potential applications of T3DB include toxin metabolism prediction, toxin/drug interaction prediction, and general toxin hazard awareness by the public, making it applicable to various fields. \r\n",
          "chemicalCount" : 3645,
