        [ {
          "id" : 1348,
          "listName" : "BIOSOLIDS",
          "label" : "Navigation Panel to Biosolid Lists",
          "type" : "federal",
          "shortDescription" : "Biosolids lists change over time and are versioned iteratively. This panel navigates between the various versions.",
          "longDescription" : "Biosolids lists change over time and are versioned iteratively. This panel navigates between the various versions which will be released over time. \r\nThe list of substances displayed below represents the latest iteration of biosolids (BIOSOLIDS2021 - November 2021). For the versioned lists please use the hyperlinked lists below.<br/><br/> \r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/BIOSOLIDS2021' target='_blank'>BIOSOLIDS2021 - November 2021</a><br/><br/>\r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/BIOSOLIDS2022' target='_blank'>BIOSOLIDS2022 - December 2022</a><br/><br/>",
          "chemicalCount" : 726,
          "updatedAt" : "2025-02-23T18:23:55Z"
        }, {
          "id" : 1327,
          "listName" : "BIOSOLIDS2021",
          "label" : "LIST: Chemicals in biosolids (2021)",
          "type" : "federal",
          "shortDescription" : "Chemicals detected in biosolids (nutrient-rich organic materials produced from wastewater treatment facilities) (Last Updated November 9th 2021)",
          "longDescription" : "Biosolids are a product of the wastewater treatment process. During wastewater treatment the liquids are separated from the solids. Those solids are then treated physically and chemically to produce a semisolid, nutrient-rich product known as biosolids. The terms ‘biosolids’ and ‘sewage sludge’ are often used interchangeably.  <a href='https://www.epa.gov/sites/default/files/2017-08/documents/federal-water-pollution-control-act-508full.pdf' target='_blank'>Section 405(d) of the Clean Water Act (CWA)</a> \r\n requires the United States Environmental Protection Agency (EPA) to (1) develop a regulation to establish pollutant limits and management practices to protect human health and the environment from any reasonably anticipated adverse effects of pollutants that might be present in sewage sludge; and (2) review sewage sludge regulations every two years to identify any additional pollutants that may occur in biosolids and to set regulations for pollutants identified in biosolids if sufficient scientific evidence shows they may harm human health or the environment. The regulation <a href='https://www.epa.gov/biosolids/biosolids-laws-and-regulations#standards' target='_blank'>40 CFR Part 503, Standards for the Use or Disposal of Sewage Sludge</a> \r\n, was published on February 19, 1993 (58 FR 9248). Part 503 established pollutants limits for ten metals. Since 1993, EPA has conducted eight <a href='https://www.epa.gov/biosolids/biennial-reviews-sewage-sludge-standards' target='_blank'>biennial reviews</a> \r\n and three <a href='https://www.epa.gov/biosolids/sewage-sludge-surveys' target='_blank'>national sewage sludge surveys</a> \r\n to review additional pollutants found in biosolids and assess possible exposure from those chemicals. To date, 726 chemicals have been found in biosolids. You can learn more about the curation of the list of chemical pollutants here: <a href='https://www.nature.com/articles/s41597-022-01267-9' target='_blank'>https://www.nature.com/articles/s41597-022-01267-9</a>. Concentration data is also available for 484 chemical pollutants detected in the three national sewage sludge surveys here: <a href='https://www.nature.com/articles/s41597-022-01267-9#Sec11' target='_blank'>Supplementary Information Table 4 (https://www.nature.com/articles/s41597-022-01267-9#Sec11)</a>. To view all the microbial pollutants found in biosolids see Table B-1, Chemical and Microbial Pollutants Identified in Biosolids in <a href='https://www.epa.gov/biosolids/biennial-report-no-8-reporting-period-2018-2019' target='_blank'>Biennial Review No. 8</a>. (Last Updated November 9th 2021)\r\n",
          "chemicalCount" : 726,
          "updatedAt" : "2022-10-05T22:30:53Z"
        }, {
          "id" : 1613,
          "listName" : "BIOSOLIDS2022",
          "label" : "LIST: Chemicals in biosolids (2022)",
          "type" : "federal",
          "shortDescription" : "Chemicals detected in biosolids (nutrient-rich organic materials produced from wastewater treatment facilities) (Last Updated December 21st 2022)",
          "longDescription" : "Biosolids are a product of the wastewater treatment process. During wastewater treatment the liquids are separated from the solids. Those solids are then treated physically and chemically to produce a semisolid, nutrient-rich product known as biosolids. The terms ‘biosolids’ and ‘sewage sludge’ are often used interchangeably though biosolids typically means treated sewage sludge that meet federal and state requirements and are applied to land as a soil amendment.  <a href='https://www.epa.gov/sites/default/files/2017-08/documents/federal-water-pollution-control-act-508full.pdf' target='_blank'>Section 405(d) of the Clean Water Act (CWA)</a> \r\n requires the United States Environmental Protection Agency (EPA) to (1) develop a regulation to establish pollutant limits and management practices to protect human health and the environment from any reasonably anticipated adverse effects of pollutants that might be present in sewage sludge; and (2) review sewage sludge regulations every two years to identify any additional pollutants that may occur in biosolids and to set regulations for pollutants identified in biosolids if sufficient scientific evidence shows they may harm human health or the environment. The regulation <a href='https://www.epa.gov/biosolids/biosolids-laws-and-regulations#standards' target='_blank'>40 CFR Part 503, Standards for the Use or Disposal of Sewage Sludge</a> \r\n, was published on February 19, 1993 (58 FR 9248). Part 503 established pollutants limits for ten metals. Since 1993, EPA has conducted nine <a href='https://www.epa.gov/biosolids/biennial-reviews-sewage-sludge-standards' target='_blank'>biennial reviews</a> \r\n and three <a href='https://www.epa.gov/biosolids/sewage-sludge-surveys' target='_blank'>national sewage sludge surveys</a> \r\n to identify additional pollutants found in biosolids. To date, 739 chemicals have been found in biosolids. You can learn more about the curation of the list of chemical pollutants through 2021 here: <a href='https://www.nature.com/articles/s41597-022-01267-9' target='_blank'>https://www.nature.com/articles/s41597-022-01267-9</a>. Concentration data is also available for 484 chemical pollutants detected in the three national sewage sludge surveys here: <a href='https://www.nature.com/articles/s41597-022-01267-9#Sec11' target='_blank'>Supplementary Information Table 4 (https://www.nature.com/articles/s41597-022-01267-9#Sec11)</a>. To view all the microbial pollutants found in biosolids see Appendix B, ‘Table B-3: Microbial Pollutants Identified in Biosolids’ in <a href='https://www.epa.gov/biosolids/biennial-reviews-sewage-sludge-standards' target='_blank'>Biennial Report No.9 (Reporting Period 2020-2021)</a>. (Last Updated December 21st, 2022).",
          "chemicalCount" : 739,
          "updatedAt" : "2022-12-23T00:41:26Z"
        }, {
          "id" : 1634,
          "listName" : "CCL",
          "label" : "WATER|EPA: Chemical Contaminants - Navigation Panel to Chemical Candidate Lists",
          "type" : "federal",
          "shortDescription" : "Chemical Candidate Lists are versioned iteratively and this panel navigates between the various versions.",
          "longDescription" : "The Safe Drinking Water Act (SDWA), as amended in 1996, requires the United States Environmental Protection Agency (EPA) to publish every five years a list of drinking water contaminants, known as the Contaminant Candidate List (CCL), that at the time of publication:<br/>\r\n•\tare not subject to any proposed or promulgated National Primary Drinking Water Regulation,<br/> \r\n•\tare known or anticipated to occur in public water systems (PWSs), and <br/>\r\n•\tmay require regulation under the SDWA. <br/><br/> \r\n\r\nThe CCLs provided in the CompTox dashboard are versioned iteratively and this description navigates between the various versions of the lists. The list of substances displayed below represents the latest iteration of the list (CCL 5 - November 2022) and only display the chemical contaminants. The CCL 5 PFAS list is listed separately. For the versioned lists please use the hyperlinked lists below.<br/><br/> \r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL5' target='_blank'>CCL5 - November 2022</a> This list <br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL4' target='_blank'>CCL4 - November 2016</a> <br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL3' target='_blank'>CCL3 - October 2009</a> <br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL2' target='_blank'>CCL2 - February 2005</a><br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL1' target='_blank'>CCL1 - March 1998</a><br/><br/>",
          "chemicalCount" : 93,
          "updatedAt" : "2024-10-02T12:08:40Z"
        }, {
          "id" : 1636,
          "listName" : "CCL5",
          "label" : "WATER|EPA: Chemical Contaminants - CCL 5",
          "type" : "federal",
          "shortDescription" : "The Contaminant Candidate List (CCL) is a list of contaminants that are known or anticipated to occur in public water systems. Version 5 is known as CCL 5.",
          "longDescription" : "The Contaminant Candidate List (CCL) is a list of contaminants that, at the time of publication, are not subject to any proposed or promulgated national primary drinking water regulations, but are known or anticipated to occur in public water systems. Contaminants listed on the CCL may require future regulation under the Safe Drinking Water Act (SDWA). EPA announced the <a href='https://www.epa.gov/ccl/contaminant-candidate-list-5-ccl-5' target='_blank'>fifth Drinking Water Contaminant Candidate List (CCL 5)</a> on November 2nd 2022. The CCL 5 includes 66 individually listed chemicals, 3 chemical groups (cyanotoxins, disinfection byproducts (DBPs), per- and polyfluoroalkyl substances (PFAS)), and 12 microbial contaminants (not displayed in the CompTox List below). The group of cyanotoxins include, but is not limited to: anatoxin-a, cylindrospermopsin, microcystins, and saxitoxin. The DBP group includes 23 unregulated DBPs that were either publicly nominated and/or among the top chemicals in the CCL 5 Universe. For the purposes of CCL 5, the PFAS group includes chemicals that contain at least one of these three structures: <br/><br/>\r\n•\tR-(CF2)-CF(R′)R′′, where both the CF2 and CF moieties are saturated carbons, and none of the R groups can be hydrogen <br/>\r\n•\tR-CF2OCF2-R′, where both the CF2 moieties are saturated carbons, and none of the R groups can be hydrogen<br/>\r\n•\tCF3C(CF3)RR′, where all the carbons are saturated, and none of the R groups can be hydrogen<br/><br/>\r\n\r\nThe CompTox dashboard also includes a separate list of PFAS (<a href='https://comptox.epa.gov/dashboard/chemical-lists/CCL5PFAS' target='_blank'>WATER|EPA: Chemical Contaminants - CCL 5 PFAS subset</a>) that meet the CCL 5 structural definition. <br/><br/>\r\nThe CCL Chemical Candidate Lists are versioned iteratively and this description navigates between the various versions of the lists. The list of substances displayed below represents only the chemical CCL 4 contaminants. For the versioned lists, please use the hyperlinked lists below.<br/><br/> \r\n\r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL5' target='_blank'>CCL5 - November 2022</a> This list <br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL4' target='_blank'>CCL4 - November 2016</a> <br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL3' target='_blank'>CCL3 - October 2009</a> <br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL2' target='_blank'>CCL2 - February 2005</a><br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL1' target='_blank'>CCL1 - March 1998</a><br/><br/>",
          "chemicalCount" : 93,
          "updatedAt" : "2022-10-28T11:52:25Z"
        }, {
          "id" : 1321,
          "listName" : "CDR2016",
          "label" : "CDR: Chemical Data Reporting 2016 ",
          "type" : "federal",
          "shortDescription" : "Chemical Data Reporting (CDR) 2016 Use data. ",
          "longDescription" : "The <a href='https://www.epa.gov/chemical-data-reporting/basic-information-about-chemical-data-reporting#what' target='_blank'>Chemical Data Reporting (CDR) rule</a> under the Toxic Substances Control Act (TSCA), requires manufacturers (including importers) to provide EPA with information on the production and use of chemicals in commerce. <br/>\r\n\r\nUnder the CDR rule, EPA collects basic exposure-related information including information on the types, quantities and uses of chemical substances produced domestically and imported into the United States. The CDR database constitutes the most comprehensive source of basic screening-level, exposure-related information on chemicals available to EPA, and is used by the Agency to protect the public from potential chemical risks. <br/>\r\n\r\nThe information is collected every four years from manufacturers (including importers) of certain chemicals in commerce generally when production volumes for the chemical are 25,000 lbs or greater for a specific reporting year. Collecting the information every four years assures that EPA and (for non-confidential data) the public have access to up-to-date information on chemicals. <br/>\r\n\r\nThe CDR rule is required by section 8(a) of the Toxic Substances Control Act (TSCA) and was formerly known as the Inventory Update Rule (IUR). <br/>",
          "chemicalCount" : 8035,
          "updatedAt" : "2021-10-18T22:25:46Z"
        }, {
          "id" : 1608,
          "listName" : "CDR2020",
          "label" : "CDR: Chemical Data Reporting 2020",
          "type" : "federal",
          "shortDescription" : "Chemical Data Reporting (CDR) 2020 Use data.",
          "longDescription" : "The <a href='https://www.epa.gov/chemical-data-reporting/basic-information-about-chemical-data-reporting#what' target='_blank'>Chemical Data Reporting (CDR) rule</a> under the Toxic Substances Control Act (TSCA), requires manufacturers (including importers) to provide EPA with information on the production and use of chemicals in commerce. <br/>\r\n\r\nUnder the CDR rule, EPA collects basic exposure-related information including information on the types, quantities and uses of chemical substances produced domestically and imported into the United States. The CDR database constitutes the most comprehensive source of basic screening-level, exposure-related information on chemicals available to EPA, and is used by the Agency to protect the public from potential chemical risks. <br/>\r\n\r\nThe information is collected every four years from manufacturers (including importers) of certain chemicals in commerce generally when production volumes for the chemical are 25,000 lbs or greater for a specific reporting year. Collecting the information every four years assures that EPA and (for non-confidential data) the public have access to up-to-date information on chemicals. <br/>\r\n\r\nThe CDR rule is required by section 8(a) of the Toxic Substances Control Act (TSCA) and was formerly known as the Inventory Update Rule (IUR). <br/>\r\n\r\nThe CDR2020 data are accessible from the <a href='https://www.epa.gov/chemical-data-reporting/access-cdr-data' target='_blank'>Access CDR Data</a> page. The dataset registered here is for the set of chemicals with CAS Registry Numbers and excludes the ~600 chemicals without CASRNs and/or flagged as provisional. (Last Updated 9/16/2022)\r\n\r\n",
          "chemicalCount" : 8033,
          "updatedAt" : "2022-09-16T23:01:42Z"
        }, {
          "id" : 315,
          "listName" : "CHEMINV",
          "label" : "EPA|CHEMINV: EPA Chemical Inventory for ToxCast (20170203)",
          "type" : "federal",
          "shortDescription" : "CHEMINV is full list of unique DSSTox substances mapped to historical chemical inventory of physical samples registered by EPA's ToxCast Chemical Contractor (Evotec) since launch of ToxCast program in 2007. ",
          "longDescription" : "CHEMINV consists of the full list of unique DSSTox substance records mapped to the historical chemical inventory of physical samples registered by EPA's ToxCast Chemical Contractor (Evotec) in their sample tracking database since the launch of the ToxCast program in 2007. The CHEMINV file includes all chemical samples procured by Evotec for possible inclusion in EPA's ToxCast program since the start of the program in 2007, as well as a relatively small set of donated or EPA-supplied samples that were shipped to Evotec to be included in EPA's physical sample library. The list includes all samples received and registered by Evotec, but all samples were not necessarily solubilized or plated for testing, i.e., the full list includes volatiles, DMSO insolubles, depleted chemicals, and discarded chemicals deemed too dangerous for storage and handling.  All physical samples plated for screening in the ToxCast program (TOXCAST), which includes EPA's full contribution to the Tox21 screening program (TOX21SL), are included as a subset of CHEMINV, as is the full list of samples currently available for ToxCast plating. Hence, the CHEMINV inventory file is a snapshot of all past and present samples. The CHEMINV file provides a complete historical record of chemicals that were prioritized for inclusion in EPA's ToxCast and Tox21 screening programs based on multiple criteria (toxicity data, exposure potential, use, etc.), and that were successfully procured by (or provided to) EPA's ToxCast Chemical Contractor (Evotec) for possible inclusion in those programs. The CHEMINV file is a subset of EPA's ChemTrack database (CHEMTRACK), the latter including all chemicals for which ToxCast or Tox21 screening data have been generated. CHEMTRACK additionally includes reference chemicals for which data were provided by ToxCast collaborators, as well as Tox21 chemicals not in EPA's physical inventory that were separately provided by Tox21 federal testing partners (the National Institutes of Health's National Toxicology Program and National Center for Advancing Translational Sciences). A detailed description of EPA's chemical management system and the DSSTox curation associated with chemical registration and mapping of the CHEMINV file is provided in the published document available for download at:\r\n<a href='https://www.epa.gov/chemical-research/toxcast-chemicals-data-management-and-quality-considerations-overview' target='_blank'>https://www.epa.gov/chemical-research/toxcast-chemicals-data-management-and-quality-considerations-overview</a>\r\nFor more information on EPA’s ToxCast program, see:\r\n<a href='https://www.epa.gov/chemical-research/toxicity-forecasting' target='_blank'>https://www.epa.gov/chemical-research/toxicity-forecasting</a>\r\nhttps://www.epa.gov/chemical-research/toxicity-forecasting",
          "chemicalCount" : 5231,
          "updatedAt" : "2019-05-18T20:49:47Z"
        }, {
          "id" : 316,
          "listName" : "CPDATv1",
          "label" : "Chemical and Products Database v1",
          "type" : "federal",
          "shortDescription" : "Chemicals contained in the EPA's Chemical and Products Database: Version 1 (original release February 14th 2017)\r\n\r\n",
          "longDescription" : "This is a list of chemicals reported in the EPA's Chemical and Products Database Version 1 from the supplementary info file associated with the Nature Scientific Data article <a href='here' target='_blank'>https://www.nature.com/articles/sdata2018125</a> (original release February 14th 2017).",
          "chemicalCount" : 45382,
          "updatedAt" : "2025-10-28T09:53:21Z"
        }, {
          "id" : 952,
          "listName" : "ECOTOX_v4",
          "label" : "EPA|ECOTOX: Ecotoxicology knowledgebase version 4",
          "type" : "federal",
          "shortDescription" : "ECOTOXicology knowledgebase (ECOTOX) is a comprehensive, publicly available knowledgebase providing single chemical environmental toxicity data on aquatic life, terrestrial plants and wildlife",
          "longDescription" : "The ECOTOX Knowledgebase is a comprehensive, dynamic, curated database that summarizes chemical environmental toxicity data on aquatic life, terrestrial plants, and wildlife. This publically available database includes curated data from over 47,000 publications and is updated quarterly. For more information on the ECOTOX Knowledgebase and to search the ECOTOX records, see: https://cfpub.epa.gov/ecotox/. This is the data snapshot as of June 30 2020. Curation is an ongoing process.\r\n",
          "chemicalCount" : 13193,
          "updatedAt" : "2022-06-21T18:41:36Z"
        }, {
          "id" : 1611,
          "listName" : "ECOTOX_v5",
          "label" : "EPA|ECOTOX: Ecotoxicology knowledgebase version 5",
          "type" : "federal",
          "shortDescription" : "ECOTOXicology knowledgebase (ECOTOX) is a comprehensive, publicly available knowledgebase providing single chemical environmental toxicity data on aquatic life, terrestrial plants and wildlife.",
          "longDescription" : "The ECOTOX Knowledgebase is a comprehensive, dynamic, curated database that summarizes chemical environmental toxicity data on aquatic life, terrestrial plants, and wildlife. This publically available database includes curated data from over 47,000 publications and is updated quarterly. For more information on the ECOTOX Knowledgebase and to search the ECOTOX records, see: https://cfpub.epa.gov/ecotox/. This is the data snapshot as of September 30 2022. Curation is an ongoing process.",
          "chemicalCount" : 12571,
          "updatedAt" : "2022-11-08T13:10:47Z"
        }, {
          "id" : 1696,
          "listName" : "ECOTOX_v6",
          "label" : "EPA|ECOTOX: Ecotoxicology knowledgebase version 6",
          "type" : "federal",
          "shortDescription" : "ECOTOXicology knowledgebase (ECOTOX) is a comprehensive, publicly available knowledgebase providing single chemical environmental toxicity data on aquatic life, terrestrial plants and wildlife.",
          "longDescription" : "The ECOTOX Knowledgebase is a comprehensive, dynamic, curated database that summarizes chemical environmental toxicity data on aquatic life, terrestrial plants, and wildlife. This publically available database includes curated data from over 47,000 publications and is updated quarterly. For more information on the ECOTOX Knowledgebase and to search the ECOTOX records, see: https://cfpub.epa.gov/ecotox/. This is the data snapshot as of February 5th 2023. Curation is an ongoing process.",
          "chemicalCount" : 12690,
          "updatedAt" : "2023-02-22T08:46:57Z"
        }, {
          "id" : 272,
          "listName" : "EDSPUoC",
          "label" : "EPA|ENDOCRINE: EDSP Universe of Chemicals",
          "type" : "federal",
          "shortDescription" : "This list of EDSP-related chemicals on the EPA CompTox Dashboard is not a complete listing from the EDSP Universe of Chemicals.",
          "longDescription" : "EPA’s <a href=\"https://www.epa.gov/endocrine-disruption\" target=\"_blank\">Endocrine Disruptor Screening Program</a> (EDSP) evaluates chemicals for potential endocrine disruption and there are thousands of chemicals of interest to the program, which make up the EDSP Universe of Chemicals. EPA researchers developed the EDSP Universe of Chemicals Dashboard to provide access to chemical data on over 1,800 chemicals of interest.\r\nThe purpose of the EDSP Dashboard is to help the Endocrine Disruptor Screening Program evaluate chemicals for endocrine-related activity. The data for this version of the Dashboard comes from various sources:<br/><br/>\r\n•\tRapid, automated (or in vitro high-throughput) chemical screening data generated by the EPA’s Toxicity Forecaster (ToxCast) project and the federal Toxicity Testing in the 21st century (Tox21) collaboration.<br/>\r\n•\tChemical exposure data and prediction models (ExpoCastDB).<br/>\r\n•\tHigh quality chemical structures and annotations (DSSTox).<br/>\r\n•\tPhyschem Properties Database (PhysChemDB).<br/><br/>\r\nThe Dashboard displays bioassay information, bioactivity concentrations, estrogen and androgen receptor (ER and AR) model results, predicted physicochemical properties, and more. Current chemical and bioassay data can be accessed at <a href=\"https://comptox.epa.gov/dashboard\" target=\"_blank\">https://comptox.epa.gov/dashboard</a> and <a href=\"https://www.epa.gov/chemical-research/toxicity-forecaster-toxcasttm-data\" target=\"_blank\">https://www.epa.gov/chemical-research/toxicity-forecaster-toxcasttm-data</a> . Published ER (<a href=\"https://www.ncbi.nlm.nih.gov/pubmed/?term=26272952\" target=\"_blank\">PMID 26272952</a>) and AR (<a href=\"https://www.ncbi.nlm.nih.gov/pubmed/?term=27933809\" target=\"_blank\">PMID 27933809</a>) model results are available for citation.<br/><br/>\r\nWhen using the Dashboard, keep in mind:<br/><br/>\r\n•\tThe activity of a chemical in a specific assay does not necessarily mean that it will cause toxicity or an adverse health outcome. There are many factors that determine whether a chemical will cause a specific adverse health outcome. Careful review is required to determine the use of the data in a particular decision context.<br/>\r\n•\tInterpretation of ToxCast data is expected to change over time as both the science and analytical methods improve.<br/>\r\n•\tAdditional substances that are not part of the EDSP’s statutory authority are included since they are relevant to EPA’s ongoing work on the validation of the endocrine and androgen bioactivity models.<br/><br/>\r\nEPA will continuously update chemicals on the EDSP Dashboard to include as much relevant information on chemicals in the EDSP <a href=\"https://www.epa.gov/endocrine-disruption/endocrine-disruptor-screening-program-edsp-universe-chemicals\" target=\"_blank\">Universe of Chemicals</a> as possible. Some “EDSP Universe of Chemicals” do not have bioactivity information in the EDSP Dashboard because of the incompatibility of some chemicals to be tested in ToxCast (e.g., chemical too volatile, chemical not soluble in DMSO, etc.). <br/><br/>\r\nThe <a href=\"https://comptox.epa.gov/dashboard/chemical_lists/edspuoc\" target=\"_blank\">list of the EDSP Universe of Chemicals</a> contains approximately 10,000 chemicals, as defined under FFDCA and SDWA 1996 amendments. \r\nThe Agency has also added test data on as many chemicals as possible to the EDSP Dashboard that were on <a href=\"https://www.epa.gov/endocrine-disruption/overview-first-list-chemicals-tier-1-screening-under-endocrine-disruptor\" target=\"_blank\">EDSP List 1</a> and <a href=\"https://www.epa.gov/endocrine-disruption/overview-second-list-chemicals-tier-1-screening-under-endocrine-disruptor\" target=\"_blank\">EDSP List 2</a>:<br/><br/>\r\n\r\n<a href=\"https://comptox.epa.gov/dashboard/chemical_lists/edsp21list1\" target=\"_blank\">EDSP List 1</a>: The list of chemicals for initial EDSP Tier 1 Screening under the Endocrine Disruptor Screening Program includes chemicals that the Agency, in its discretion, decided should be tested first, based upon exposure potential.  The final EDSP List 1 was announced in a <a href=\"https://www.regulations.gov/document?D=EPA-HQ-OPPT-2004-0109-0080\" target=\"_blank\">Federal Register Notice</a> dated April 15, 2009.<br/><br/>\r\n\r\n<a href=\"https://comptox.epa.gov/dashboard/chemical_lists/edsp21list2\" target=\"_blank\">EDSP List 2</a>: The second list of chemicals for initial EDSP Tier 1 Screening under the Endocrine Disruptor Screening Program includes a large number of pesticides, two perfluorocarbon compounds (PFCs), and four pharmaceuticals (erythromycin, lindane, nitroglycerin, and quinoline).  The final EDSP List 2 was announced in a <a href=\"https://www.regulations.gov/document?D=EPA-HQ-OPPT-2009-0477-0074\" target=\"_blank\">Federal Register Notice</a> dated June 14, 2013.<br/><br/>\r\n\r\nA dynamic table of preliminary <a href=\"https://www.epa.gov/endocrine-disruption/endocrine-disruptor-screening-program-edsp-estrogen-receptor-bioactivity\" target=\"_blank\">ER model scores</a> from the EDSP Dashboard resides in <a href=\"https://www.epa.gov/endocrine-disruption\" target=\"_blank\">EPA's Endocrine Disruption website</a>.\r\n",
          "chemicalCount" : 10047,
          "updatedAt" : "2021-08-07T00:49:38Z"
        }, {
          "id" : 592,
          "listName" : "EPACHEMINV_AVAIL",
          "label" : "EPA|CHEMINV: ToxCast/Tox21 Chemical inventory available as DMSO solutions (20181123)",
          "type" : "federal",
          "shortDescription" : "EPACHEMINV_AVAIL is list of unique DSSTox substances available as DMSO solutions for ToxCast and Tox21 partner projects, managed by EPA Chemical Contract Services.",
          "longDescription" : "EPACHEMINV_AVAIL is a snapshot of the full list of unique DSSTox substances for which DMSO solutions are available through EPA Chemical Contract Services to supply ToxCast and Tox21 cross-partner projects. This inventory includes only those substances deemed soluble in DMSO at 5mM or higher concentrations, and excludes substances marked for volatility or reactivity concerns. EPACHEMINV_AVAIL includes EPA’s previous ToxCast inventory (a subset of (<a href='https://comptox.epa.gov/dashboard/chemical_lists/toxcast' target='_blank'>TOXCAST</a>) as well as approximately 1300 chemicals donated by the National Toxicology Program (NTP) as part of the Tox21 chemical library consolidation effort. This recently added NTP set represents the full portion of NTP’s original contribution to the Tox21 library (<a href='https://comptox.epa.gov/dashboard/chemical_lists/tox21sl' target='_blank'>TOX21SL</a>) that was deemed to be non-overlapping with EPA’s current ToxCast library.  <br/> <br/> \r\nOf the total unique chemicals in EPACHEMINV_AVAIL, approximately 6000 were included in the original TOX21SL library (70% of the total), with the remainder in EPACHEMINV_AVAIL resulting from the continuous expansion of EPA’s ToxCast library. The remaining Tox21 chemicals not included in EPACHEMINV were either discontinued or were drugs originally contributed by the Tox21 NCATS (National Center for Advances in Translational Science) partner; future expansion of EPACHEMINV_AVAIL may include newly procured drugs provided by NCATS. Hence, in addition to supplying new ToxCast projects, EPACHEMINV_AVAIL is intended to serve as the new, consolidated TOX21 library moving forward, as outlined in the recently published Tox21 strategic and operational planning document (available at <a href='https://www.ncbi.nlm.nih.gov/pubmed/29529324') target='_blank'>https://www.ncbi.nlm.nih.gov/pubmed/29529324)</a>. The plan articulates areas of focused scientific investment, both in chemical and biological space, to which new Tox21 cross-partner projects will be directed. <br/> <br/>\r\nFor more information on EPA’s ToxCast program, see:\r\n<a href='https://www.epa.gov/chemical-research/toxicity-forecasting' target='_blank'>https://www.epa.gov/chemical-research/toxicity-forecasting</a><br/><br/>\r\nFor current information on the Tox21 program, see \r\n<a href='https://tox21.gov/page/home' target='_blank'>https://tox21.gov/page/home</a><br/><br/>\r\n",
          "chemicalCount" : 6408,
          "updatedAt" : "2019-05-18T20:55:26Z"
