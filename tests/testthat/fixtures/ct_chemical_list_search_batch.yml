          "shortDescription" : "List of chemicals associated with the article \"Workflow for Defining Reference Chemicals for Assessing Performance of In Vitro Assays\"",
          "longDescription" : "The article <a href='https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6784312/' target='_blank'>\"Workflow for Defining Reference Chemicals for Assessing Performance of In Vitro Assays\"</a> describes a semi-automated process for selecting and annotating reference chemicals, compounds with defined activity against the test system target, across many targets in a standardized form.",
