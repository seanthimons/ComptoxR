        }, {
          "id" : 412,
          "listName" : "MZCLOUD",
          "label" : "MASSPECDB: Thermo's mzCloud Database",
          "type" : "other",
          "shortDescription" : "mzCloud is a state of the art mass spectral database that assists analysts in identifying compounds in areas such as life sciences, metabolomics, pharmaceutical research, toxicology, forensic investigations and environmental analysis.\r\n",
          "longDescription" : "mzCloud is an extensively curated database of high-resolution tandem mass spectra that are arranged into spectral trees. MS/MS and multi-stage MSn spectra were acquired at various collision energies, precursor m/z, and isolation widths using Collision-induced dissociation (CID) and Higher-energy collisional dissociation (HCD). Each raw mass spectrum was filtered and recalibrated giving rise to additional filtered and recalibrated spectral trees that are fully searchable. Besides the experimental and processed data, each database record contains the compound name with synonyms, the chemical structure, computationally and manually annotated fragments (peaks), identified adducts and multiply charged ions, molecular formulas, predicted precursor structures, detailed experimental information, peak accuracies, mass resolution, InChi, InChiKey, and other identifiers. mzCloud is a fully searchable library that allows spectra searches, tree searches, structure and substructure searches, monoisotopic mass searches, peak (m/z) searches, precursor searches, and name searches.",
          "chemicalCount" : 5447,
          "updatedAt" : "2022-06-28T13:50:28Z"
        }, {
          "id" : 1535,
          "listName" : "MZCLOUD0722",
          "label" : "MASSPECDB: Thermo's mzCloud Database",
          "type" : "other",
          "shortDescription" : "mzCloud is a state of the art mass spectral database that assists analysts in identifying compounds in areas such as life sciences, metabolomics, pharmaceutical research, toxicology, forensic investigations and environmental analysis. (Updated 07/05/2022)",
          "longDescription" : "mzCloud is an extensively curated database of high-resolution tandem mass spectra that are arranged into spectral trees. MS/MS and multi-stage MSn spectra were acquired at various collision energies, precursor m/z, and isolation widths using Collision-induced dissociation (CID) and Higher-energy collisional dissociation (HCD). Each raw mass spectrum was filtered and recalibrated giving rise to additional filtered and recalibrated spectral trees that are fully searchable. Besides the experimental and processed data, each database record contains the compound name with synonyms, the chemical structure, computationally and manually annotated fragments (peaks), identified adducts and multiply charged ions, molecular formulas, predicted precursor structures, detailed experimental information, peak accuracies, mass resolution, InChi, InChiKey, and other identifiers. mzCloud is a fully searchable library that allows spectra searches, tree searches, structure and substructure searches, monoisotopic mass searches, peak (m/z) searches, precursor searches, and name searches.(Updated 07/05/2022)",
          "chemicalCount" : 6154,
          "updatedAt" : "2023-04-10T09:24:24Z"
        }, {
          "id" : 333,
          "listName" : "NEMILIST",
          "label" : "MASSPECDB: National Environmental Methods Index ",
          "type" : "other",
          "shortDescription" : "The National Environment Methods Index (NEMI) is a searchable database of environmental methods, protocols, statistical and analytical methods.",
          "longDescription" : "The National Environment Methods Index (NEMI) is a searchable database of environmental methods, protocols, statistical and analytical methods, and procedures that allows scientists and managers to find and compare methods for all stages of the monitoring process. Submitted methods are reviewed for technical quality and applicability prior to being included in the database. A NEMI Review Committee has final authority for determining if a submitted method meets the criteria for addition to the NEMI database.",
          "chemicalCount" : 1507,
          "updatedAt" : "2020-04-28T14:07:21Z"
        }, {
          "id" : 247,
          "listName" : "NHANES_DKAPRAUN",
          "label" : "LIST: 2009-2010 NHANES compounds",
          "type" : "other",
          "shortDescription" : "List of 2009-2010 chemical compounds from the National Health and Nutrition Examination Survey (NHANES)",
          "longDescription" : "List of 2009-2010 chemical compounds from the National Health and Nutrition Examination Survey (NHANES). The work is published in \"<a href='https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5801475/' target='_blank'>A Method for Identifying Prevalent Chemical Combinations in the U.S. Population</a>\"  which identified 90 chemical combinations consisting of relatively few chemicals that occur in at least 30% of the U.S. population, as well as three super combinations consisting of relatively many chemicals that occur in a small but non-negligible proportion of the U.S. population.\r\n\r\n",
          "chemicalCount" : 106,
          "updatedAt" : "2022-08-19T13:16:22Z"
