          "longDescription" : "The Multimedia Monitoring Database (MMDB) was developed by EPA’s Office and Research and Development and reported in the paper \"<a href='https://www.nature.com/articles/s41597-022-01365-8' target='_blank'>A Harmonized Chemical Monitoring Database for Support of Exposure Assessments</a>\" by Isaacs et al. Data from 20 individual public monitoring data sources were extracted and curated to harmonized chemical identifiers (DTXSID) and media categories for support of exposure assessments and development of high-throughput models. This list includes chemicals that have been curated as being detected in <a href='https://comptox.epa.gov/dashboard/chemical-lists/MMDBV1' target='_blank'>MMDBV1</a>. Curation of MMDB data records and detected chemicals is ongoing.  \r\n\r\nThis subset of data relates to the Wildlife (terrestrial invertebrates/worms) subset of the MMDB dataset.\r\n",
