        }, {
          "id" : 200,
          "listName" : "TSCAWP",
          "label" : "EPA|TSCA: Work Plan Chemicals (2014)",
          "type" : "federal",
          "shortDescription" : "EPA Toxic Substance Control Act (TSCA) Work Plan chemical list (2014 update) ",
          "longDescription" : "The EPA Toxic Substance Control Act (TSCA) Work Plan chemical list (2014 update) is a list of existing chemicals for TSCA assessment, based on industry data submitted to EPA\r\nthrough the Toxics Release Inventory (TRI) in 2011 and the TSCA Chemical Data Reporting (CDR)\r\nrequirements in 2012 on chemical releases and potential exposures. This is the first update to the TSCA Work Plan for Chemical Assessments, which EPA presented in early 2012. As newer data from TRI and CDR become available, EPA will update the TSCA Work Plan for Chemical Assessments. The Agency uses this Work Plan to focus the activities of the Existing Chemicals Program in the Office of Pollution Prevention and Toxics (OPPT) so that existing chemicals having the highest potential for exposure and hazard are assessed, and, if warranted, are subject to risk reduction actions. For more information, \r\n\r\n<a href='https://www.epa.gov/assessing-and-managing-chemicals-under-tsca/tsca-work-plan-chemicals' target='_blank'>visit this website</a>.",
          "chemicalCount" : 90,
          "updatedAt" : "2022-08-19T13:24:45Z"
        }, {
          "id" : 839,
          "listName" : "CANADADSL",
          "label" : "Canadian Domestic Substances List 2019",
          "type" : "international",
          "shortDescription" : "The domestic substances list (DSL) is the sole standard against which a substance is judged to be \"new\" to Canada.\r\n",
          "longDescription" : "On May 4, 1994, Environment and Climate Change Canada published the domestic substances list (DSL) in Part II of the Canada Gazette. The DSL is an inventory of approximately 23 000 substances manufactured in, imported into or used in Canada on a commercial scale. It is based on substances present in Canada, under certain conditions, between January 1, 1984 and December 31, 1986.\r\n\r\nThe DSL is the sole standard against which a substance is judged to be \"new\" to Canada. With few exemptions, all substances not on this list are considered new and must be reported prior to importation or manufacture in order that they can be assessed to determine if they are toxic or could become toxic to the environment or human health.",
          "chemicalCount" : 23300,
          "updatedAt" : "2024-05-06T11:25:56Z"
        }, {
          "id" : 1995,
          "listName" : "ECHASVHC",
          "label" : "ECHA Candidate List of Substances of Very High Concern  for Authorization",
          "type" : "international",
          "shortDescription" : "ECHA Candidate List of Substances of Very High Concern for Authorization",
          "longDescription" : "Substances with the following hazard properties may be identified as SVHCs:\r\n\r\nSubstances meeting the criteria for classification as carcinogenic, mutagenic or toxic for reproduction (CMR) category 1A or 1B in accordance with the CLP Regulation.\r\nSubstances which are persistent, bioaccumulative and toxic (PBT) or very persistent and very bioaccumulative (vPvB) according to REACH Annex XIII.\r\nSubstances on a case-by-case basis, that cause an equivalent level of concern as CMR or PBT/vPvB substances.<br/><br/>\r\n\r\nMore details regarding substances of very high concern and their identification are described <a href='https://echa.europa.eu/substances-of-very-high-concern-identification-explained' target='_blank'>here</a> and the latest list is posted <a href='https://echa.europa.eu/candidate-list-table' target='_blank'>here</a>.",
          "chemicalCount" : 446,
          "updatedAt" : "2024-02-11T15:38:58Z"
        }, {
          "id" : 366,
          "listName" : "EFSAOFT",
          "label" : "FOOD: EFSA OpenFoodTox",
          "type" : "international",
          "shortDescription" : "The European Food Safety Authority has produced risk assessments for more than 4,000 substances in over 1,600 scientific opinions,",
          "longDescription" : "The European Food Safety Authority has produced risk assessments for more than 4,000 substances in over 1,600 scientific opinions, statements and conclusions through the work of its scientists. For individual substances, a summary of human health and – depending on the relevant legislation and intended uses – animal health and ecological hazard assessments has been collected and structured into EFSA’s chemical hazards database: OpenFoodTox. OpenFoodTox provides open source data for the substance characterisation, the links to EFSA’s related output, background European legislation, and a summary of the critical toxicological endpoints and reference values.",
          "chemicalCount" : 4264,
          "updatedAt" : "2020-05-30T13:33:20Z"
        }, {
          "id" : 169,
          "listName" : "EINECS",
          "label" : "European INventory of Existing Commercial chemical Substances",
          "type" : "international",
          "shortDescription" : "European INventory of Existing Commercial chemical Substances",
          "longDescription" : "In the EU regulatory framework, Existing Chemical substances are those substances listed in EINECS (European INventory of Existing Commercial chemical Substances), an inventory of substances that were deemed to be on the European Community market between 1 January 1971 and 18 September 1981. EINECS was drawn up by the European Commission in the application of Article 13 of Directive 67/548/EEC, as amended by Directive 79/831/EEC, and in accordance with the detailed provisions of Commission Decision 81/437/EEC. In 1993 the Council adopted Council Regulation (EEC) 793/93, more commonly known as the ESR (Existing Substances Regulation), thereby introducing a comprehensive framework for the evaluation and control of existing chemical substances",
          "chemicalCount" : 37692,
          "updatedAt" : "2024-10-14T23:34:49Z"
