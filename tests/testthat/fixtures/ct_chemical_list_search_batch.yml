          "type" : "federal",
          "shortDescription" : "TSCA Active Inventory non-confidential portion (Updated May 24th 2024). The content of the list will change over time as both the non-confidential active TSCA inventory is updated and more substances are curated.",
          "longDescription" : "Section 8 (b) of the Toxic Substances Control Act (TSCA) requires EPA to compile, keep current and publish a list of each chemical substance that is manufactured or processed, including imports, in the United States for uses under TSCA. Information about what types of substances are on the TSCA inventory can be found here. The Toxic Substances Control Act (TSCA), as amended by the Frank R. Lautenberg Chemical Safety for the 21st Century Act, requires EPA to designate chemical substances on the TSCA Chemical Substance Inventory as either “active” or “inactive” in U.S. commerce. To accomplish this, EPA finalized a rule requiring industry reporting of chemicals manufactured (including imported) or processed in the U.S.. This reporting is used to identify which chemical substances on the TSCA Inventory are active in U.S. commerce and help inform the prioritization of chemicals for risk evaluation. This is the TSCA Active Non-Confidential Subset (Updated May 24th 2024)\r\n",
          "chemicalCount" : 36338,
          "updatedAt" : "2024-11-09T23:47:44Z"
