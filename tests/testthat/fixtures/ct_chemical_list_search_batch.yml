          "label" : "LIST: Overlap of the Blood Exposome with the February 2022 TSCA ACTIVE non-confidential list ",
          "type" : "other",
          "shortDescription" : "This list is the intersection between the BLOODEXPOSOME list and the 2022 TSCA ACTIVE non-confidential list.\r\n\r\n\r\n\r\n",
          "longDescription" : "This list is the intersection of the blood exposome list (<a href='https://comptox.epa.gov/dashboard/chemical-lists/BLOODEXPOSOME' target='_blank'>https://comptox.epa.gov/dashboard/chemical-lists/BLOODEXPOSOME</a>) derived from the Barupal et al report on Generating the Blood Exposome Database Using a Comprehensive Text Mining and Database Fusion Approach and the 2022 TSCA non-confidential active inventory (<a href='https://comptox.epa.gov/dashboard/chemical-lists/TSCA_INACTIVE_NCTI_0222' target='_blank'>https://comptox.epa.gov/dashboard/chemical-lists/TSCA_INACTIVE_NCTI_0222</a>).  The list is intended to represent the subset of potential exogenous chemicals in the blood exposome. ",
