          "id" : 1455,
          "listName" : "CAMEOV1",
          "label" : "CAMEO Hazardous Chemical Datasheets",
          "type" : "other",
          "shortDescription" : "CAMEO Chemicals is a database of hazardous chemical datasheets (Last updated May 9th 2022)",
          "longDescription" : "<a href='https://cameochemicals.noaa.gov/' target='_blank'>CAMEO Chemicals</a> is a database of hazardous chemical datasheets that emergency responders and planners can use to get response recommendations and predict hazards. (Last updated May 9th 2022)\r\n\r\n",
          "chemicalCount" : 4540,
          "updatedAt" : "2022-08-18T15:58:42Z"
        }, {
          "id" : 943,
          "listName" : "CASMI2014",
          "label" : "MASSSPEC: CASMI2014",
          "type" : "other",
          "shortDescription" : "The 2014 Critical Assessment of Small Molecules (CASMI) contest dataset",
          "longDescription" : "The Critical Assessment of Small Molecules (CASMI) contests were initiated in 2012 to provide a means to evaluate compound identification tools on standardized sets of MS/MS data. In the publication “Revisiting Five Years of CASMI Contests with EPA Identification Tools” by McEachran et al, compound identification was performed on all 5 CASMI contest datasets using Dashboard tools and data in order to critically evaluate Dashboard performance relative to that of other applications. CASMI data were accessed via <a href='http://casmi-contest.org/' target='_blank'>http://casmi-contest.org/</a> and processed for use in our spectral matching and identification workflow. We conducted an in-depth review of the CASMI structure sets which sometimes resulted in edits to structures as described in the publication and we are providing these edited datasets via the Dashboard as reference data. This is the CASMI2014 dataset.",
          "chemicalCount" : 54,
          "updatedAt" : "2020-06-19T18:25:25Z"
        }, {
          "id" : 1512,
          "listName" : "CECTOYS",
          "label" : "NORMAN|Chemicals of Emerging Concern (CECs) in plastic toys",
          "type" : "other",
          "shortDescription" : "A list of Chemicals of Concern (CECs) found in plastic toys",
          "longDescription" : "A list of Chemicals of Concern (CoCs) found in plastic toys described in Aurisano et. Al. The list is categorized into four based on being included in regulatory lists of concern as well as reported hazard index (HI) and child cancer risk (CCR) based criteria. DOI: <a href='https://doi.org/10.1016/j.envint.2020.106194' target='_blank'>10.1016/j.envint.2020.106194</a>\r\nDataset DOI : <a href='https://doi.org/10.5281/zenodo.5933615' target='_blank'>10.5281/zenodo.5933615</a>. Data hosted on the <a href='https://www.norman-network.com/nds/SLE/' target='_blank'>NORMAN Suspect List Exchange</a>.\r\n",
          "chemicalCount" : 126,
          "updatedAt" : "2022-06-05T23:09:26Z"
        }, {
          "id" : 431,
          "listName" : "CERAPP",
          "label" : "ARTICLE: Collaborative Estrogen Receptor Activity Prediction Project (CERAPP)",
          "type" : "other",
          "shortDescription" : "CERAPP uses predictive computational models trained on HTS data to evaluate thousands of chemicals for ER-related activity.",
          "longDescription" : "CERAPP (Collaborative Estrogen Receptor Activity Prediction Project) is a large-scale modeling project demonstrate the efficacy of using predictive computational models trained on high-throughput screening data to evaluate thousands of chemicals for ER-related activity and prioritize them for further testing. CERAPP combined multiple models developed in collaboration with 17 groups in the United States and Europe to predict ER activity of a common set of 32,464 chemical structures. Quantitative structure–activity relationship models and docking approaches were employed, mostly using a common training set of 1,677 chemical structures provided by the U.S. EPA, to build a total of 40 categorical and 8 continuous models for binding, agonist, and antagonist ER activity. All predictions were evaluated on a set of 7,522 chemicals curated from the literature. To overcome the limitations of single models, a consensus was built by weighting models on scores based on their evaluated accuracies. The work is described in this peer-reviewed publication: <a href='https://ehp.niehs.nih.gov/doi/10.1289/ehp.1510267' target='_blank'>https://ehp.niehs.nih.gov/doi/10.1289/ehp.1510267</a>",
          "chemicalCount" : 32320,
          "updatedAt" : "2025-11-18T08:03:34Z"
        }, {
          "id" : 1344,
          "listName" : "CHLORINETPS",
          "label" : "NORMAN|List of chlorination byproducts of 137 CECs and small disinfection byproducts",
          "type" : "other",
          "shortDescription" : "List of chlorination byproducts of emerging concern (CECs) and small molecular weight disinfection byproducts",
          "longDescription" : "A list of chlorination byproducts of 137 contaminants of emerging concern (CECs) and small molecular weight disinfection byproducts from the CHLORINE_TPs database, described in <a href=\"https://doi.org/10.1016/j.teac.2021.e00148\" target=\"_blank\">Postigo et al</a>. 91% are amenable to LC-ESI-HRMS. \r\nDataset DOI: <a href=\"https://doi.org/10.5281/zenodo.5767356\" target=\"_blank\">10.5281/zenodo.5767356</a>. Data hosted on the <a href=\"http://www.norman-network.com/?q=node/236\" target=\"_blank\">NORMAN Suspect List Exchange</a>.\r\n\r\n\r\n\r\n",
          "chemicalCount" : 329,
