          "listName" : "KEMIMARKET",
          "label" : "NORMAN: KEMI List of Substances on the Market",
          "type" : "other",
          "shortDescription" : "The KEMI Market List contains chemicals expected to be on the market. Complied by Stellan Fischer, KEMI (Swedish Chemicals Agency) from various regulatory databases, including hazard and exposure scores to support the identification of unknowns. ",
          "longDescription" : "The KEMI Market List contains chemicals expected to be on the market, with a focus on the EU market. Substances with well-defined structures were selected from various regulatory databases and complied by Stellan Fischer, <a href=\"http://www.kemi.se/en\" target=\"_blank\">KEMI</a> (Swedish Chemicals Agency). The original list on the <a href=\"http://www.norman-network.com/?q=node/236\" target=\"_blank\">NORMAN Suspect List Exchange</a> includes hazard and exposure scores and further documentation about the sources and data in the list. The exposure score (water) is a way of providing “use information” while still maintaining business confidentiality; the hazard score (ecological, chronic) has been included to support the identification of potentially emerging substances. \r\nAll chemical types (industrial chemicals, pharmaceuticals, pesticides etc.) are included in this list, which will be updated continuously as more structural information becomes available. \r\n",
