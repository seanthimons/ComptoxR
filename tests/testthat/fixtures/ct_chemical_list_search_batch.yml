          "longDescription" : "This list represents a collection of bisphenols available at <a href='https://www.nilu.no/en/' target='_blank'>NILU</a> (Pawel Rostkowski) and from <a href='https://www.kemi.se/en/global/rapporter/2017/rapport-5-17-bisfenoler-en-kartlaggning-och-analys.pdf' target='_blank'>Table 3 of report 5/17 by KEMI</a> (Swedish Chemicals Agency, in Swedish with English summary), hosted on the <a href='https://www.norman-network.com/nds/SLE/' target='_blank'>NORMAN Suspect List Exchange</a> (https://www.norman-network.com/nds/SLE/). Dataset DOI: <a href='https://doi.org/10.5281/zenodo.3779854' target='_blank'>10.5281/zenodo.3779854</a>\r\n\r\n\r\n\r\n\r\n\r\n",
