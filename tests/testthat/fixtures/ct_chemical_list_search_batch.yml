          "longDescription" : "<a href='http://exposome-explorer.iarc.fr/' target='_blank'>Exposome-Explorer</a>is a database dedicated to biomarkers of exposure to environmental risk factors for diseases. It contains detailed information on the nature of biomarkers, populations and subjects in which biomarkers have been measured, samples analysed, methods used for biomarker analyses, concentrations in biospecimens, correlations with external exposure measurements, and biological reproducibility over time. This list contains mappings to all discrete chemicals in the Exposome-Explorer. The methods are detailed in <a href='http://doi.org/10.1093/nar/gkw980' target='_blank'>Neveu et al 2017</a>.\r\n\r\n\r\n",
