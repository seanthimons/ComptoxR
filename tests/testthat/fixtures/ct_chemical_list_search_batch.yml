          "shortDescription" : "ELSIE:  Extractables and Leachables Safety Information Exchange",
          "longDescription" : "The Extractables and Leachables Safety Information Exchange (ELSIE: https://www.elsiedata.org/) was established by scientists in pharmaceuticals companies to advance the concept of sharing pre-competitive safety information on extractables and leachables, among industry. The vision was that such a collaborative effort would reduce duplicative safety studies across companies, streamline development projects, and allow industry and other stakeholders to share experiences and information to help advance the practice and science of extractables, leachables and materials evaluation. ",
