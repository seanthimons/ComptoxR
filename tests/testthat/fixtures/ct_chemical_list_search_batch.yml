          "id" : 406,
          "listName" : "EPAHPV",
          "label" : "EPA: High Production Volume List ",
          "type" : "federal",
          "shortDescription" : "The United States High Production Volume (USHPV) database contains information about chemicals that are included in the High Production Volume (HPV) Challenge Program.",
          "longDescription" : "The United States High Production Volume (USHPV) database contains information about chemicals that are included in the High Production Volume (HPV) Challenge Program. Chemicals considered to be HPV are those that are manufactured in or imported into the United States in amounts equal to or greater than one million pounds per year. The goal of the HPV Challenge Program is to complete baseline testing on HPV chemicals by the year 2004. The Environmental Protection Agency (EPA) is challenging the chemical industry to undertake testing on HPV chemicals voluntarily. However, EPA will mandate testing of all HPV chemicals by law under the testing authority of Section 4 of the Toxic Substance Control Act (TSCA).",
          "chemicalCount" : 4297,
          "updatedAt" : "2018-11-18T21:50:19Z"
        }, {
          "id" : 1693,
          "listName" : "EPASRS2022V4",
          "label" : "EPA|EPA Substance Registry Service (January 2023)",
          "type" : "federal",
          "shortDescription" : "The Substance Registry Services (SRS) is an EPA resource for information about chemicals, biological organisms, and other substances tracked or regulated by EPA. (Updated January 2023)",
          "longDescription" : "Substance Registry Services (SRS) is the Environmental Protection Agency's (EPA) central system for information about substances that are tracked or regulated by EPA or other sources. It is the authoritative resource for basic information about chemicals, biological organisms, and other substances of interest to EPA and its state and tribal partners.\r\n\r\nThe SRS makes it possible to identify which EPA data systems, environmental statutes, or other sources have information about a substance and which synonym is used by that system or statute. It becomes possible therefore to map substance data across EPA programs regardless of synonym.\r\n\r\nThe system provides a common basis for identification of, and information about:\r\n\r\nChemicals\r\nBiological organisms\r\nPhysical properties\r\nMiscellaneous objects\r\n\r\n(Updated January 2023)",
