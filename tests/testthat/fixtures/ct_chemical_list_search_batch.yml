        }, {
          "id" : 685,
          "listName" : "LITMINEDNEURO",
          "label" : "NEURO: Neurotoxicants from PubMed",
          "type" : "other",
          "shortDescription" : "Chemicals associated with neurotoxicity via PubMed Literature Mining",
          "longDescription" : "This is a list of chemicals associated with neurotoxicity compiled through automated literature mining of PubMed using MeSH terms and associating these with single chemical substances (where possible). Articles were identified in which a nervous system disease was annotated with the MeSH node C10 with disease subheading “chemically induced” and subheading “toxicity”, “poisoning”, or “adverse effects”.  We identified nervous system diseases through a look-up in the <a href='https://meshb.nlm.nih.gov/treeView' target='_blank'>MeSH tree</a>. Nerve diseases caused by trauma and manually identified “common English terms” that could not be associated with any specific chemicals (e.g. “particulate matter”, “contrast media”) were omitted. In total 4,528 chemicals were identified; this list contains 1243 chemicals associated with 5 or more literature references, all of which have been registered in the Dashboard. The details of this work are reported in “<a href='https://doi.org/10.1039/C9EM00068B'target='_blank'>Connecting environmental exposure and neurodegeneration using cheminformatics and high resolution mass spectrometry: potential and challenges</a>” by Schymanski et al, DOI: <a href='https://doi.org/10.1039/C9EM00068B'target='_blank'>10.1039/c9em00068b</a> \r\n\r\n\r\n",
          "chemicalCount" : 1243,
          "updatedAt" : "2022-10-25T12:24:47Z"
        }, {
          "id" : 444,
          "listName" : "LSERDDB",
          "label" : "LIST: Linear Solvation Energy Relationship Database",
          "type" : "other",
          "shortDescription" : "LSERD is a free online platform, which enables the prediction of partition coefficients based on the linear solvation energy relationship approach.",
          "longDescription" : "The free online platform LSERD enables the prediction of partition coefficients based on the linear solvation energy relationship approach. The platform includes about 200 different partitioning systems (e.g. solvent-water, solvent-air, bio materials, technical sorbents) and several tools for the application of these predicted partition coefficients. The tools are:\r\n\r\n1) permeability tool (for prediction of a compound’s membrane permeability) \r\n2) Cfree tool (for the determination of the freely dissolved concentration of a chemical in an cell assay)\r\n3) biopartitioning tool (for the description of the partitioning behavior in an organism)\r\n4) extraction tool (for optimization of sample preparation)\r\n5) blow-down tool (for calculation of analytes loss during preconcentration of extracts with nitrogen stream) \r\n6) thermodesorption tool (for the calculation of optimal parameters for thermodesorption experiments) \r\n7) Freundlich Koc tool (for the prediction of non-linear sorption isotherms for soil organic carbon/water partitioning)\r\n",
          "chemicalCount" : 6463,
          "updatedAt" : "2021-04-27T10:49:44Z"
