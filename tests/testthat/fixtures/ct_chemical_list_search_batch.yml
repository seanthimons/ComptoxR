          "type" : "other",
          "shortDescription" : "Chemical list derived from the Agilent Water Screening Personal Compound Database and Library (PCDL)",
          "longDescription" : "Chemical list derived from the Agilent Water Screening Personal Compound Database and Library (PCDL).  Agilent’s curated accurate-mass water screening compound database contains over 1400 compounds including contaminants of emerging concern and compounds present in major water regulations. Details are available here:<a href='https://www.agilent.com/en/products/liquid-chromatography-mass-spectrometry-lc-ms/lc-ms-application-solutions/environmental/environmental-water-screening-pcdl'>Water Screening PCDL</a>.",
          "chemicalCount" : 1431,
