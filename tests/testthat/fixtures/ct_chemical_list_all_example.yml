          "shortDescription" : "REACH Appendix 8: aromatic amines associated with azocolourants. ",
          "longDescription" : "Substances Restricted Under Reach as represented by <a href='https://echa.europa.eu/substances-restricted-under-reach' target='_blank'>Annex XVII to REACH</a> includes all the restrictions adopted in the framework of REACH and the previous legislation, Directive 76/769/EEC. <a href='https://echa.europa.eu/appendix-8-list-of-aromatic-amines' target='_blank'>Appendix 8 lists aromatic amines associated with azocolourants</a>.\r\n",
