        }, {
          "id" : 813,
          "listName" : "PESTACTIVES",
          "label" : "PESTICIDES|EPA: List of Active Ingredients UPDATED 10/25/2019",
          "type" : "other",
          "shortDescription" : "List of active ingredients in pesticides UPDATED 10/25/2019",
          "longDescription" : "Active pesticide ingredients, <a href='https://www.epa.gov/ingredients-used-pesticide-products/basic-information-about-pesticide-ingredients' target='_blank'>as defined by EPA</a> are the chemicals in a pesticide product that act to control the pests. There are several categories of active ingredients:<br/><br/>\r\n\r\nConventional, which are all ingredients other than biological pesticides and antimicrobial pesticides.<br/><br/>\r\nAntimicrobial, which are substances or mixtures of substances used to destroy or suppress the growth of harmful microorganisms whether bacteria, viruses, or fungi on inanimate objects and surfaces.<br/><br/>\r\nBiopesticides, which are types of ingredients derived from certain natural materials.<br/><br/>\r\n\r\nThis list is maintained with every release.<br/><br/>\r\n\r\nA related list is the <a href='https://comptox.epa.gov/dashboard/chemical_lists/PESTINERTS' target='_blank'>List of Pesticide Inerts</a>.\r\n\r\n\r\n\r\n",
          "chemicalCount" : 510,
