          "listName" : "EPAPFAS75S2",
          "label" : "PFAS|EPA: List of 75 Test Samples (Set 2)",
          "type" : "federal",
          "shortDescription" : "PFAS list corresponds to a second set of 75 samples (Set 2) submitted for testing screens conducted by EPA researchers in collaboration with researchers at the National Toxicology Program.",
          "longDescription" : "Per- and Polyfluoroalkyl Substances (PFAS) list corresponds to a second set of 75 samples (Set 2) submitted for the testing screens conducted by EPA researchers in collaboration with researchers at the National Toxicology Program. The list of the first set of 75 samples (Set 1) can be accessed at <a href='https://comptox.epa.gov/dashboard/chemical_lists/epapfas75s1' target='_blank'>EPAPFAS75S1</a>. Substances for both Set 1 and Set 2 were selected based on a prioritization scheme that considered EPA Agency priorities, exposure/occurrence considerations, availability of animal or <i>in vitro</i> toxicity data, and ability to procure in non-gaseous form and solubilize samples in DMSO. For more information, see:\r\n<a href='https://ehp.niehs.nih.gov/doi/full/10.1289/EHP4555' target='_blank'>https://ehp.niehs.nih.gov/doi/full/10.1289/EHP4555</a><br/><br/>Update (20Mar2019): Due to concerns for corrosivity and reactivity, the following 2 PFAS chemicals were removed from Set 2 and were not submitted for testing and analysis: DTXSID9041578, Trifluoroacetic acid, 76-05-1 and DTXSID2044397 Trifluoromethanesulfonic acid, 1493-13-6.  \r\n\r\n",
          "chemicalCount" : 76,
          "updatedAt" : "2021-09-28T22:49:25Z"
        }, {
          "id" : 929,
          "listName" : "EPAPFASCAT",
          "label" : "PFAS|EPA Structure-based Categories",
          "type" : "federal",
          "shortDescription" : "List of registered DSSTox “category substances” representing PFAS categories created using ChemAxon’s Markush structure-based query representations.",
          "longDescription" : "List of registered DSSTox “category substances” representing Per- and Polyfluoroalkyl Substances (PFAS) categories created using ChemAxon’s Markush structure-based query representations. Markush categories can be broad and inclusive of more specific categories or can represent a unique category not overlapping with other registered categories.  Each PFAS category registered with a unique DTXSID is considered a generalized substance or “parent ID” that can be associated with one or many “child IDs” (i.e. many parent-child mappings) within the full DSSTox database.  These category DTXSIDs can be used to search and retrieve all currently registered DSSTox substances within the category group, and offer an objective, transparent and reproducible structure-based means of defining a category of chemicals. This list and the corresponding category mappings are undergoing continuous curation and expansion.",
          "chemicalCount" : 112,
          "updatedAt" : "2021-06-15T17:25:54Z"
