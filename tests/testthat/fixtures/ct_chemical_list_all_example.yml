          "label" : "NORMAN: Combined 2000/2006 EU Cosmetic Ingredients Inventory ",
          "type" : "international",
          "shortDescription" : "EUCOSMETICS contains the Combined Inventory of Ingredients Employed in Cosmetic Products (2000, SCCNFP/0389/00 Final) and Revised Inventory (2006, Decision 2006/257/EC), prepared for NORMAN by P. von der Ohe (UBA) and R. Aalizadeh (Uni. Athens). ",
          "longDescription" : "EUCOSMETICS contains the Combined Inventory of Ingredients Employed in Cosmetic Products (2000, <a href=\"http://www.norman-network.com/sites/default/files/files/suspectListExchange/SCCNFP038900_INCI-2000.pdf\" target=\"_blank\">SCCNFP/0389/00 Final</a>) and Revised Inventory (2006, <a href=\"http://www.norman-network.com/sites/default/files/files/suspectListExchange/Decision_2006_257_EC.pdf\" target=\"_blank\">Decision 2006/257/EC</a>). The first document was prepared by the scientific committee on cosmetic products and non-food products Intended for consumers, the second list came from European Commission Decision 2006/257/EC, amending the Decision 96/335/EC. Files were prepared for the NORMAN Network by P. von der Ohe (Federal Environmental Agency, Germany - UBA) and R. Aalizadeh (University of Athens). The original data is available on the <a href=\"http://www.norman-network.com/?q=node/236\" target=\"_blank\">NORMAN Suspect List Exchange</a>. \r\nThis list is undergoing continuous curation/extension.  \r\n",
