          "id" : 549,
          "listName" : "ToxCast_invitroDB_v3_0",
          "label" : "EPA ToxCast invitrodb v3.0 (October 2018)",
          "type" : "federal",
          "shortDescription" : "This list of chemicals corresponds to chemicals with bioactivity assay data in EPA's ToxCast Database, referred to as invitrodb (v3 public release, October 2018).",
          "longDescription" : "This list of chemicals corresponds to chemicals with bioactivity assay data in EPA's ToxCast Database, referred to as invitrodb (v3 public release, October 2018). Invitrodb contains data for chemicals in the ToxCast and Tox21 programs, with more information available <a href='https://www.epa.gov/chemical-research/exploring-toxcast-data-downloadable-data' target='_blank'>here</a>. This list is provided as a resource to support the October 2018 version of the bioactivity data in invitrodb v3.0 and can be downloaded and cited as follows: EPA National Center for Computational Toxicology. (2018). Invitrodb version 3.0. <a href='https://doi.org/10.23645/epacomptox.6062623.v2' target='_blank'>https://doi.org/10.23645/epacomptox.6062623.v2</a>",
          "chemicalCount" : 9403,
