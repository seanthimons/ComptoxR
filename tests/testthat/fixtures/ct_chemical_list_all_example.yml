        }, {
          "id" : 200,
          "listName" : "TSCAWP",
          "label" : "EPA|TSCA: Work Plan Chemicals (2014)",
          "type" : "federal",
          "shortDescription" : "EPA Toxic Substance Control Act (TSCA) Work Plan chemical list (2014 update) ",
          "longDescription" : "The EPA Toxic Substance Control Act (TSCA) Work Plan chemical list (2014 update) is a list of existing chemicals for TSCA assessment, based on industry data submitted to EPA\r\nthrough the Toxics Release Inventory (TRI) in 2011 and the TSCA Chemical Data Reporting (CDR)\r\nrequirements in 2012 on chemical releases and potential exposures. This is the first update to the TSCA Work Plan for Chemical Assessments, which EPA presented in early 2012. As newer data from TRI and CDR become available, EPA will update the TSCA Work Plan for Chemical Assessments. The Agency uses this Work Plan to focus the activities of the Existing Chemicals Program in the Office of Pollution Prevention and Toxics (OPPT) so that existing chemicals having the highest potential for exposure and hazard are assessed, and, if warranted, are subject to risk reduction actions. For more information, \r\n\r\n<a href='https://www.epa.gov/assessing-and-managing-chemicals-under-tsca/tsca-work-plan-chemicals' target='_blank'>visit this website</a>.",
          "chemicalCount" : 90,
          "updatedAt" : "2022-08-19T13:24:45Z"
        }, {
          "id" : 483,
          "listName" : "UCMR1",
          "label" : "WATER: First Unregulated Contaminant Monitoring Rule",
          "type" : "federal",
          "shortDescription" : "The 1996 Safe Drinking Water Act (SDWA) amendments require that once every five years EPA issue a new list of no more than 30 unregulated contaminants. This list was published on 2001.",
          "longDescription" : "The 1996 Safe Drinking Water Act (SDWA) amendments require that once every five years EPA issue a new list of no more than 30 unregulated contaminants to be monitored by public water systems (PWSs). The second Unregulated Contaminant Monitoring Rule (UCMR 2) was published in 2001. UCMR 1 required monitoring for 25 contaminants between 2001 and 2005 using analytical methods developed by EPA, consensus organizations, or both. This monitoring provides a basis for future regulatory actions to protect public health.",
          "chemicalCount" : 23,
          "updatedAt" : "2018-11-16T22:10:28Z"
        }, {
          "id" : 480,
          "listName" : "UCMR2",
          "label" : "WATER: Second Unregulated Contaminant Monitoring Rule",
          "type" : "federal",
          "shortDescription" : "The 1996 Safe Drinking Water Act (SDWA) amendments require that once every five years EPA issue a new list of no more than 30 unregulated contaminants. This list was published on January 4, 2007.",
          "longDescription" : "The 1996 Safe Drinking Water Act (SDWA) amendments require that once every five years EPA issue a new list of no more than 30 unregulated contaminants to be monitored by public water systems (PWSs). The second Unregulated Contaminant Monitoring Rule (UCMR 2) was published on January 4, 2007. UCMR 2 required monitoring for 25 contaminants between 2008 and 2010 using analytical methods developed by EPA, consensus organizations, or both. This monitoring provides a basis for future regulatory actions to protect public health.",
          "chemicalCount" : 25,
          "updatedAt" : "2018-11-16T22:11:11Z"
        }, {
          "id" : 678,
          "listName" : "UCMR3",
          "label" : "WATER: Third Unregulated Contaminant Monitoring Rule",
          "type" : "federal",
          "shortDescription" : "The 1996 Safe Drinking Water Act (SDWA) amendments require that once every five years EPA issue a new list of no more than 30 unregulated contaminants. This list was published on May 2, 2012.",
          "longDescription" : "The 1996 Safe Drinking Water Act (SDWA) amendments require that once every five years EPA issue a new list of no more than 30 unregulated contaminants to be monitored by public water systems (PWSs). The third Unregulated Contaminant Monitoring Rule (<a href='https://www.epa.gov/dwucmr/third-unregulated-contaminant-monitoring-rule' target='_blank'>UCMR 3</a>\r\n) was published in 2012. UCMR 3 required monitoring for 28 chemical contaminants between 2013 and 2015 using analytical methods developed by EPA, consensus organizations, or both. This monitoring provides a basis for future regulatory actions to protect public health. \r\n\r\n\r\n",
          "chemicalCount" : 28,
          "updatedAt" : "2020-04-23T14:51:52Z"
        }, {
          "id" : 679,
          "listName" : "UCMR4",
          "label" : "WATER: Fourth Unregulated Contaminant Monitoring Rule",
          "type" : "federal",
          "shortDescription" : "The 1996 Safe Drinking Water Act (SDWA) amendments require that once every five years EPA issue a new list of no more than 30 unregulated contaminants. This list was published on December 20, 2016.",
          "longDescription" : "The 1996 Safe Drinking Water Act (SDWA) amendments require that once every five years EPA issue a new list of no more than 30 unregulated contaminants to be monitored by public water systems (PWSs). The fourth Unregulated Contaminant Monitoring Rule (<a href='https://www.epa.gov/dwucmr/fourth-unregulated-contaminant-monitoring-rule' target='_blank'>UCMR 4</a>) was published in 2016. UCMR 4 required monitoring for 30 chemical contaminants between 2018 and 2020 using analytical methods developed by EPA, consensus organizations, or both. This monitoring provides a basis for future regulatory actions to protect public health. Note that for this list the terms HAA5, HAA6BR and HAA9 have been expanded to represent a specific set of chemicals.\r\n",
          "chemicalCount" : 35,
          "updatedAt" : "2020-04-23T15:00:46Z"
        }, {
          "id" : 1351,
          "listName" : "UCMR5",
          "label" : "WATER: Fifth Unregulated Contaminant Monitoring Rule",
          "type" : "federal",
          "shortDescription" : "The 1996 Safe Drinking Water Act (SDWA) amendments require that once every five years EPA issue a new list of no more than 30 unregulated contaminants. This list was published on December 27, 2021.",
          "longDescription" : "The 1996 Safe Drinking Water Act (SDWA) amendments require that once every five years EPA issue a new list of no more than 30 unregulated contaminants to be monitored by public water systems (PWSs). The fifth Unregulated Contaminant Monitoring Rule (<a href='https://www.epa.gov/dwucmr/fifth-unregulated-contaminant-monitoring-rule' target='_blank'>UCMR 5</a>) was published in 2021. UCMR 5 requires monitoring for 30 chemical contaminants between 2023 and 2025 using analytical methods developed by EPA, consensus organizations, or both. This monitoring provides a basis for future regulatory actions to protect public health. Note that UCMR 5 will provide new data that is critically needed to improve EPA’s understanding of the frequency that 29 PFAS (and lithium) are found in the nation’s drinking water systems and at what levels. This list was published on December 27, 2021.",
          "chemicalCount" : 30,
          "updatedAt" : "2022-01-19T12:32:04Z"
