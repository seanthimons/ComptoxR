          "shortDescription" : "This list is a subset of compounds detected in saliva",
          "longDescription" : "This list is a subset of compounds detected in saliva and reported in the peer-reviewed literature and identified in experimental work at US-EPA. The collection is extracted from the article \"The human volatilome: volatile organic compounds (VOCs) in exhaled breath, skin emanations, urine, feces and saliva\" by de Lacy Costello et al in J. Breath Res. 8 (2014) 034001 (DOI:<a href='http://doi.org/10.1088/1752-7155/8/3/034001' target='_blank'>10.1088/1752-7155/8/3/034001</a>).\r\n\r\n",
