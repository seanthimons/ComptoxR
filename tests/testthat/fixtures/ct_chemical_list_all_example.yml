          "longDescription" : "This list contains representative PFAS, triazoles and triazines, the \"Box 1\" substances to kick-off the <a href='https://zeropm.eu' target='_blank'>H2020 project ZeroPM</a>, hosted by the NORMAN Suspect List Exchange (<a href='https://www.norman-network.com/nds/SLE/' target='_blank'>https://www.norman-network.com/nds/SLE/</a>. Dataset DOI: <a href='https://doi.org/10.5281/zenodo.5854251' target='_blank'>10.5281/zenodo.5854251</a>.\r\n",
