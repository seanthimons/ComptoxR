          "type" : "state",
          "shortDescription" : "The CalSAFER data management system maintained by the California Department of Toxic Substances Control (DTSC) operates as the information center for the regulatory activities of the Safer Consumer Products Program (SCP).",
          "longDescription" : "The Safer Consumer Products (SCP) Program implements California’s Green Chemistry law which aims to reduce toxic chemicals in consumer products. The SCP regulations require manufacturers to look for safer alternatives for potentially hazardous products. CalSAFER is a data management system maintained by the Department of Toxic Substances Control (DTSC). It operates as the information center for the regulatory activities of the Safer Consumer Products Program (SCP).",
