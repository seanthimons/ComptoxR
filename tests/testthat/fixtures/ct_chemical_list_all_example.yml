          "label" : "DEA Schedule 3 Drugs",
          "type" : "federal",
          "shortDescription" : "Schedule III drugs, substances, or chemicals are defined as drugs with a moderate to low potential for physical and psychological dependence. ",
          "longDescription" : "Schedule III drugs, substances, or chemicals are defined as drugs with a moderate to low potential for physical and psychological dependence. Schedule III drugs abuse potential is less than Schedule I and Schedule II drugs but more than Schedule IV. Some examples of Schedule III drugs are: products containing less than 90 milligrams of codeine per dosage unit (Tylenol with codeine), ketamine, anabolic steroids, testosterone\r\n\r\nThe Alphabetical listing of Controlled Substances is available online <a href='https://www.dea.gov/drug-information/drug-scheduling' target='_blank'>here</a>.\r\n",
          "chemicalCount" : 108,
          "updatedAt" : "2024-02-08T18:35:04Z"
