          "id" : 2098,
          "listName" : "IEC62474",
          "label" : "Material Declaration for Products of and for the Electrotechnical Industry",
          "type" : "international",
          "shortDescription" : "This database (IEC 62474 DB) specifies to the electrical and electronics industry what substances, substance groups and material classes that need to be included in material declarations\r\n",
          "longDescription" : "The electrical and electronics industry and its supply chain use material declarations to track and declare specific information about the material composition of its products. To harmonize requirements across the supply chain and to improve economic efficiencies, IEC 62474 provides an International Standard for the exchange of material composition data and provide requirements for material declarations. This International Standard benefits the electrotechnical industry by establishing requirements for reporting of substances and materials, standardizing protocols, and facilitating transfer and processing of data.\r\n\r\nThe database (IEC 62474 DB: https://std.iec.ch/iec62474/iec62474.nsf/) specifies to the electrical and electronics industry and its suppliers:\r\n\r\n1. what substances, substance groups and material classes that need to be included in material declarations; and\r\n2. to software developers, specifications on the data format for the exchange of material declaration data.",
          "chemicalCount" : 1180,
          "updatedAt" : "2024-05-18T03:10:28Z"
        }, {
          "id" : 393,
          "listName" : "KWRSJERPS",
          "label" : "WATER|ARTICLE: Drinking Water Suspects, KWR Water, Netherlands",
          "type" : "international",
          "shortDescription" : "KWRSJERPS is a list of prioritized suspects relevant for human health in drinking water from KWR Water in Nieuwegein, The Netherlands. The methods are detailed in Sjerps et al 2016, DOI: 10.1016/j.watres.2016.02.034",
          "longDescription" : "KWRSJERPS is a list of prioritized suspects relevant for human health in drinking water from KWR Water in Nieuwegein, The Netherlands. The methods are detailed in Sjerps et al 2016, DOI: <a href=\"http://dx.doi.org/10.1016/j.watres.2016.02.034\" target=\"_blank\">10.1016/j.watres.2016.02.034</a>. The original data is available on the <a href=\"http://www.norman-network.com/?q=node/236\" target=\"_blank\">NORMAN Suspect List Exchange</a>. ",
