          "id" : 518,
          "listName" : "EPAPFASINV",
          "label" : "PFAS|EPA: ToxCast Chemical Inventory",
          "type" : "federal",
          "shortDescription" : "PFAS chemicals included in EPA’s expanded ToxCast chemical inventory and available for testing.",
          "longDescription" : "Per- and Polyfluoroalkyl Substances (PFAS) included in EPA’s expanded ToxCast chemical inventory and available for testing. These PFAS chemicals were successfully procured from commercial suppliers (with a small number provided by National Toxicology Program partners) and were deemed suitable for testing (i.e., solubilized in DMSO above 5mM, and not gaseous or highly reactive). All or portions of this inventory are being made available to EPA researchers and collaborators to be analyzed and tested in various high-throughput screening (HTS) and high-throughput toxicity (HTT) assays.<br/><br/>The <a href='EPAPFAS75S1' target='_blank'>https://comptox.epa.gov/dashboard/chemical_lists/EPAPFAS75S1</a> list is a prioritized subset of this larger chemical inventory. <br/><br/>The <a href='EPAPFASINSOL' target='_blank'>https://comptox.epa.gov/dashboard/chemical_lists/EPAPFASINSOL</a> list were chemicals procured, but found to be insoluble in DMSO above 5mM.\r\n",
