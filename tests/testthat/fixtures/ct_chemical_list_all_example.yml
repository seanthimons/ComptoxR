        }, {
          "id" : 2224,
          "listName" : "ToxCast_invitroDB_v4_2",
          "label" : "EPA ToxCast invitrodb v4.2 (September 2024)",
          "type" : "federal",
          "shortDescription" : "This list of chemicals corresponds to chemicals with bioactivity assay data in EPA's ToxCast Database, referred to as invitrodb (v4.2 public release, September 2024)",
          "longDescription" : "This list of chemicals corresponds to chemicals with bioactivity assay data in EPA's ToxCast Database, referred to as invitrodb (v4.2 public release, September 2024). Invitrodb contains data for chemicals in the ToxCast and Tox21 programs, with more information available <a href='here' target='_blank'>https://www.epa.gov/comptox-tools/exploring-toxcast-data</a>. This list is provided as a resource to support the September 2024 version of the bioactivity data in invitrodb v4.2 and can be downloaded and cited as follows: EPA Center for Computational Toxicology and Exposure (2024). ToxCast invitrodb version 4.2 <a href='https://doi.org/10.23645/epacomptox.6062623.v13' target='_blank'>https://doi.org/10.23645/epacomptox.6062623.v13</a>.",
          "chemicalCount" : 9614,
          "updatedAt" : "2025-05-05T15:28:12Z"
        }, {
          "id" : 172,
          "listName" : "TOXCAST_ph1v2",
          "label" : "EPA ToxCast Screening Library (ph1v2 subset)",
          "type" : "federal",
          "shortDescription" : "TOXCAST_ph1v2 is the ph1v2 subset of TOXCAST, a reprocured subset of Phase I (ph1v1) chemicals moved into Phase II and later testing phases of the ToxCast program.",
          "longDescription" : "TOXCAST_ph1v2 is the ph1v2 subset of EPA’s ToxCast Screening Library (TOXCAST) chemicals, consisting of 293 reprocured Phase I (TOXCAST_ph1v1) chemicals, consisting of mostly pesticides with guideline in vivo toxicity study data, that were moved into Phase II and later testing phases of the ToxCast program. Th ph1v2 inventory excluded 17 ph1v1 chemicals that were retired from screening after Phase I due to solubility and degradation issues.  \r\n\r\nFor more details, see <a href='https://comptox.epa.gov/dashboard/chemical_lists/TOXCAST'target='_blank'>TOXCAST</a><br/><br/>\r\n",
          "chemicalCount" : 293,
          "updatedAt" : "2022-02-15T13:23:16Z"
        }, {
          "id" : 173,
          "listName" : "TOXCAST_ph2",
          "label" : "EPA ToxCast Screening Library (ph2 subset)",
          "type" : "federal",
          "shortDescription" : "TOXCAST_ph2 is the ph2 subset of TOXCAST, added in Phase II of the ToxCast program to increase chemical diversity and coverage of chemicals of concern to EPA programs.",
          "longDescription" : "TOXCAST_ph2 is the ph2 subset of EPA’s ToxCast Screening Library (TOXCAST) chemicals, entered into testing in Phase II of the ToxCast screening program.  At the close of Phase II testing, this inventory consisted of 768 unique chemicals spanning a wide variety of EPA and public lists, that were chosen to increase the chemical diversity and scope of the TOXCAST library, provide greater coverage of chemicals of concern to EPA programs, and span a broader range of bioactivity and toxicity endpoints. For more details, see <a href='https://comptox.epa.gov/dashboard/chemical_lists/TOXCAST'target='_blank'>TOXCAST</a><br/><br/>",
          "chemicalCount" : 768,
          "updatedAt" : "2022-02-15T13:23:42Z"
        }, {
          "id" : 176,
          "listName" : "TOXCAST_ph3",
          "label" : "EPA ToxCast Screening Library (ph3 subset)",
          "type" : "federal",
          "shortDescription" : "TOXCAST_ph3 is the ph3 subset of TOXCAST, added to the most recent Phase III of the ToxCast program to further increase chemical diversity and coverage of chemicals of concern to EPA programs.",
          "longDescription" : "TOXCAST_ph3 is the ph3 subset of EPA’s ToxCast Screening Library (TOXCAST) chemicals, consisting of the most recently added set of 2678 chemicals entering into Phase III of the ToxCast program, including both newly added chemicals as well as EPA chemicals previously included in the Tox21 library (see <a href=https://comptox.epa.gov/dashboard/chemical_lists/TOX21SL”target=”_blank”>TOX21SL</a>) that were not previously included in Phases I or II of the ToxCast program. The ph3 subset represents a wide variety of EPA and public lists with the aim of further increasing chemical diversity, coverage of chemicals of concern to EPA programs, and representation of bioactivity and toxicity endpoints. Testing Phases I and II of the ToxCast program are closed; hence the inventories associated with those historical data (i.e., ph1v1, ph2v2, e1k) are static and unchanging. ToxCast Phase III is currently underway; hence the ph3 inventory (current as of 4/11/2017) may continue to expand into less well-represented areas of chemistry and biology.  For more details, see <a href='https://comptox.epa.gov/dashboard/chemical_lists/TOXCAST'target='_blank'>TOXCAST</a><br/><br/>",
          "chemicalCount" : 2678,
          "updatedAt" : "2022-02-15T13:30:18Z"
        }, {
          "id" : 180,
          "listName" : "TOXCAST_PhaseI",
          "label" : "EPA ToxCast Screening Library (Phase I subset)",
          "type" : "federal",
          "shortDescription" : "TOXCAST_PhaseI corresponds to the ph1v1 subset of TOXCAST (mostly pesticides) screened in Phase I of the ToxCast program.",
          "longDescription" : "TOXCAST_PhaseI corresponds to the ph1v1 subset of EPA’s ToxCast Screening Library (TOXCAST), consisting of 310 unique chemicals, mostly pesticidal actives for which in vivo guideline study data were available, that were screened in the earliest, Phase I of the ToxCast program. At the conclusion of Phase I screening (public data release, Jan, 2010), the majority of the ph1v1 inventory chemicals were reprocured and moved to expanded Phase II testing, with the exception of a subset of 17 chemicals that were retired from further screening due to solubility and degradation issues (see <a href='https://comptox.epa.gov/dashboard/chemical_lists/TOXCAST_ph1v2'target='_blank'>TOXCAST_ph1v2</a> for the reprocured subset). For more details, see <a href='https://comptox.epa.gov/dashboard/chemical_lists/TOXCAST'target='_blank'>TOXCAST</a><br/><br/>",
          "chemicalCount" : 310,
          "updatedAt" : "2022-02-15T13:31:13Z"
        }, {
          "id" : 181,
          "listName" : "TOXCAST_PhaseII",
          "label" : "EPA ToxCast Screening Library (Phase II subset)",
          "type" : "federal",
          "shortDescription" : "TOXCAST_PhaseII is the full set of chemicals screened in Phase II of the ToxCast program, consisting of TOXCAST_ph1v2, ph2 and e1k sublists.",
          "longDescription" : "TOXCAST_PhaseII is the full set of 1860 chemicals screened in Phase II of the ToxCast screening program, consisting of the reprocured Phase I chemical inventory (TOXCAST_ph1v2), together with the TOXCAST_ph2 and TOXCAST_e1k sublists.  At the time of the initial ToxCast Phase II public data release (Dec 2013), the e1k chemical subset had undergone limited screening in endocrine-related assays, whereas the ph1_v2 and ph2 subsets (totaling 1061 chemicals) were more completely screened in both ToxCast Phase I assays and assays added in Phase II; all Phase II sublists were also included in Tox21 testing.  For more details, see <a href='https://comptox.epa.gov/dashboard/chemical_lists/TOXCAST'target='_blank'>TOXCAST</a>",
          "chemicalCount" : 1864,
          "updatedAt" : "2022-02-15T13:31:34Z"
        }, {
          "id" : 451,
          "listName" : "TOXCAST_PhaseIII",
          "label" : "EPA ToxCast Screening Library (Phase III subset)",
          "type" : "federal",
          "shortDescription" : "TOXCAST_PhaseIII is the full set of chemicals available for screening in Phase III of the ToxCast program, consisting of the majority of chemicals screened in Phase II and newly added ph3 chemicals.",
          "longDescription" : "TOXCAST_PhaseIII is the full set of 4584 chemicals available for screening in the current Phase III of the ToxCast screening program, consisting of the major portion of the Phase II testing library (excluding 37 chemicals due to unavailability or sample problems), and the newly added ph3 chemical subset.  Testing Phases I and II of the ToxCast program are closed; hence the inventories associated with those historical data (i.e., ph1v1, ph2v2, e1k) are static and unchanging. ToxCast Phase III is currently underway; hence, chemicals may be dropped due to depleted stock, and the newly added ph3 inventory (current as of 4/11/2017) may continue to expand into less well-represented areas of chemistry and biology.  In addition, whereas Phase III offers the possibility of screening up to 4584 chemicals, typically far fewer chemicals are undergoing more targeted screening.  For more details, see <a href='https://comptox.epa.gov/dashboard/chemical_lists/TOXCAST'target='_blank'>TOXCAST</a><br/><br/>",
          "chemicalCount" : 4584,
          "updatedAt" : "2022-02-15T13:32:13Z"
        }, {
          "id" : 721,
          "listName" : "TOXREFDB2",
          "label" : "LIST: ToxRefDB v2.0-1 Toxicity Reference Database",
          "type" : "federal",
          "shortDescription" : "The Toxicity Reference Database v2 structures information from over 5000 in vivo toxicity studies",
          "longDescription" : "The Toxicity Reference Database (ToxRefDB) contains in vivo study data from over 5900 guideline or guideline-like studies for training and validation of predictive models, with more information available here. ToxRefDB v2.0 is described in <a href='https://doi.org/10.1016/j.reprotox.2019.07.012' target='_blank'>Watford et al, 2019</a>. ToxRefDB v2.1 is an update to address a compilation error found in ToxRefDB v2.0, as described in <a href='https://doi.org/10.3389/ftox.2023.1260305' target='_blank'>Feshuk et al, 2023</a>. Though effect data has been added in v2.1, no new chemicals were added.",
          "chemicalCount" : 1176,
          "updatedAt" : "2023-10-28T14:05:57Z"
        }, {
          "id" : 416,
          "listName" : "TOXVAL_V5",
          "label" : "EPA: Toxicity Values Version 5 (Aug 2018)",
          "type" : "federal",
          "shortDescription" : "The Toxicity Values database is delivered via the Hazard Tab in the CompTox Chemicals Dashboard.",
          "longDescription" : "The Toxicity Values database is delivered via the Hazard Tab in the CompTox Chemicals Dashboard. As of August 2018 the ToxVal Database contains the following data: 772,721 toxicity values from 29 sources of data, 21,507 sub-sources, 4585 journals cited and 69,833 literature citations.\r\n",
          "chemicalCount" : 58031,
          "updatedAt" : "2019-11-18T11:34:47Z"
        }, {
          "id" : 1359,
          "listName" : "TRIRELEASE",
          "label" : "EPA: Toxics Release Inventory ",
          "type" : "federal",
          "shortDescription" : "Chemicals covered by the TRI Program cause one or more of the following: 1) Cancer or other chronic human health effects; 2) Significant adverse acute human health effects; 3) Significant adverse environmental effects (Last Updated February 15th 2022)",
          "longDescription" : "In general chemicals covered by the TRI Program are those that cause one or more of the following: 1) Cancer or other chronic human health effects; 2) Significant adverse acute human health effects; 3) Significant adverse environmental effects. (The TRI chemicals list in the CompTox Chemicals Dashboard is not the official list of all TRI reportable chemicals as it does not include all chemicals covered by the TRI broad chemical categories such as copper compounds, warfarin and salts, etc.  The complete list of TRI reportable chemicals and chemical categories can be found at: (<a href='https://www.epa.gov/tri/chemicals' target='_blank'>www.epa.gov/tri/chemicals</a>). This list includes PFAS chemicals associated with Section 7321 of the National Defense Authorization Act for Fiscal Year 2020 (P.L. 116-92) (NDAA) and <a href='https://comptox.epa.gov/dashboard/chemical-lists/PFASTRI' target='_blank'>available here </a>. (Last Updated February 15th 2022)",
          "chemicalCount" : 893,
          "updatedAt" : "2022-02-15T14:02:59Z"
        }, {
          "id" : 2186,
          "listName" : "TSCA_ACTIVE_NCTI_0125",
          "label" : "TSCA Active Inventory non-confidential portion (Updated January 19th 2025)",
          "type" : "federal",
          "shortDescription" : "TSCA Active Inventory non-confidential portion (Updated January 19th 2025). The content of the list will change over time as both the non-confidential active TSCA inventory is updated and more substances are curated.",
          "longDescription" : "Section 8 (b) of the Toxic Substances Control Act (TSCA) requires EPA to compile, keep current and publish a list of each chemical substance that is manufactured or processed, including imports, in the United States for uses under TSCA. Information about what types of substances are on the TSCA inventory can be found here. The Toxic Substances Control Act (TSCA), as amended by the Frank R. Lautenberg Chemical Safety for the 21st Century Act, requires EPA to designate chemical substances on the TSCA Chemical Substance Inventory as either “active” or “inactive” in U.S. commerce. To accomplish this, EPA finalized a rule requiring industry reporting of chemicals manufactured (including imported) or processed in the U.S.. This reporting is used to identify which chemical substances on the TSCA Inventory are active in U.S. commerce and help inform the prioritization of chemicals for risk evaluation. This is the TSCA Active Non-Confidential Subset (Updated January 19th 2025)",
          "chemicalCount" : 36417,
          "updatedAt" : "2025-01-19T14:25:45Z"
        }, {
          "id" : 1055,
          "listName" : "TSCA_ACTIVE_NCTI_0221",
          "label" : "TSCA Active Inventory non-confidential portion (updated February 3rd 2021)",
          "type" : "federal",
          "shortDescription" : "TSCA Active Inventory non-confidential portion (updated February 3rd 2021). The content of the list will change over time as both the non-confidential active TSCA inventory is updated and more substances are curated.",
          "longDescription" : "Section 8 (b) of the Toxic Substances Control Act (TSCA) requires EPA to compile, keep current and publish a list of each chemical substance that is manufactured or processed, including imports, in the United States for uses under TSCA. Information about what types of substances are on the TSCA inventory can be found here. The Toxic Substances Control Act (TSCA), as amended by the Frank R. Lautenberg Chemical Safety for the 21st Century Act, requires EPA to designate chemical substances on the TSCA Chemical Substance Inventory as either “active” or “inactive” in U.S. commerce. To accomplish this, EPA finalized a rule requiring industry reporting of chemicals manufactured (including imported) or processed in the U.S.. This reporting is used to identify which chemical substances on the TSCA Inventory are active in U.S. commerce and help inform the prioritization of chemicals for risk evaluation. The list contained in the dashboard includes the active TSCA inventory based on notifications through Feb. 7th 2018 and substances reported from Feb 8, 2018 – March 30, 2018 that have been unambiguously mapped to DSSTox using CASRN and chemical names. The curation of the non-confidential portion of active TSCA inventory is an ongoing process involving trained chemists to validate the correctness of DSSTox structural and identifier data. The content of the list will change over time as the non-confidential active TSCA inventory is updated and more substances are curated. (Updated February 3rd 2021)",
          "chemicalCount" : 33604,
