          "id" : 516,
          "listName" : "EPAPFAS75S1",
          "label" : "PFAS|EPA: List of 75 Test Samples (Set 1)",
          "type" : "federal",
          "shortDescription" : "PFAS list corresponds to 75 samples (Set 1) submitted for initial testing screens conducted by EPA researchers in collaboration with researchers at the National Toxicology Program.",
          "longDescription" : "Per- and Polyfluoroalkyl Substances (PFAS) list corresponds to 75 samples (Set 1) submitted for the initial testing screens conducted by EPA researchers in collaboration with researchers at the National Toxicology Program. The set of 75 samples consists of 74 unique substances (DTXSID3037709, Potassium perfluorohexanesulfonate duplicated in set, procured from 2 different suppliers). Substances were selected based on a prioritization scheme that considered EPA Agency priorities, exposure/occurrence considerations, availability of animal or <i>in vitro</i> toxicity data, and ability to procure in non-gaseous form and solubilize samples in DMSO. For more information, see:\r\n<a href='https://ehp.niehs.nih.gov/doi/full/10.1289/EHP4555' target='_blank'>https://ehp.niehs.nih.gov/doi/full/10.1289/EHP4555</a>\r\n",
