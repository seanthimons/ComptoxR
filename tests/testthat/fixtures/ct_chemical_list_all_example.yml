          "id" : 1503,
          "listName" : "EPASRS2022V2",
          "label" : "EPA Substance Registry Service (May 2022)",
          "type" : "federal",
          "shortDescription" : "The Substance Registry Services (SRS) is an EPA resource for information about chemicals, biological organisms, and other substances tracked or regulated by EPA. (Updated May 2022)\r\n",
          "longDescription" : "Substance Registry Services (SRS) is the Environmental Protection Agency's (EPA) central system for information about substances that are tracked or regulated by EPA or other sources. It is the authoritative resource for basic information about chemicals, biological organisms, and other substances of interest to EPA and its state and tribal partners.\r\n\r\nThe SRS makes it possible to identify which EPA data systems, environmental statutes, or other sources have information about a substance and which synonym is used by that system or statute. It becomes possible therefore to map substance data across EPA programs regardless of synonym.\r\n\r\nThe system provides a common basis for identification of, and information about:\r\n\r\nChemicals\r\nBiological organisms\r\nPhysical properties\r\nMiscellaneous objects\r\n\r\n(Updated May 2022)",
          "chemicalCount" : 31354,
          "updatedAt" : "2022-10-03T09:08:20Z"
        }, {
