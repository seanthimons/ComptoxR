          "shortDescription" : "List of quaternary ammonium compounds (QACs) with nomenclature assigned based on latest convention",
          "longDescription" : "This is a list of quaternary ammonium compounds (QACs) that were found in personal care and cleaning products. These QACs have been assigned harmonized names according to a nomenclature described in the manuscript \"<a href='https://doi.org/10.1093/inteam/vjaf117' target='_blank'>Quaternary ammonium compounds: a standardized nomenclature approach to enhance understanding of an understudied class of compounds</a>\" (Doherty et al. ). The development of this nomenclature and subsequent incorporation into the EPA chemical substance database has been a collaboration between US-EPA and California's Department of Toxic Substances Control. This list will continually be updated with new substances as substances are assigned harmonized names according to this system.\r\n\r\n",
