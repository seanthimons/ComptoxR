          "id" : 387,
          "listName" : "NORMANCT15",
          "label" : "MASSPECDB|NORMAN: Collaborative Trial 2015 Target and Suspects ",
          "type" : "other",
          "shortDescription" : "NORMANCT15 is a compilation of all target and suspect substances reported by participants in the NORMAN Collaborative Trial on Non-target Screening, run by the NORMAN Network and described in Schymanski et al 2015, DOI: 10.1007/s00216-015-8681-7",
          "longDescription" : "NORMANCT15 is a compilation of all target and suspect substances reported by participants in the NORMAN Collaborative Trial on Non-target Screening, run by the <a href=\"http://www.norman-network.net/\" target=\"_blank\">NORMAN Network</a> and described in Schymanski et al 2015, DOI: <a href=\"http://dx.doi.org/10.1007/s00216-015-8681-7\" target=\"_blank\">10.1007/s00216-015-8681-7</a>. The original data is available on the <a href=\"http://www.norman-network.com/?q=node/236\" target=\"_blank\">NORMAN Suspect List Exchange</a>. This list contains those substances registered in the Dashboard. ",
          "chemicalCount" : 732,
          "updatedAt" : "2019-05-18T21:11:28Z"
        }, {
          "id" : 359,
          "listName" : "NORMANews",
          "label" : "NORMAN: NormaNEWS: Norman Early Warning System",
          "type" : "other",
          "shortDescription" : "The NORMAN Early Warning System (NormaNEWS) is a collaborative activity run by the NORMAN Network to investigate newly identified contaminants of emerging concern via retrospective screening on HRMS data.",
          "longDescription" : "The Norman Early Warning System (<a href=\"http://www.norman-network.com/?q=node/244\" target=\"_blank\">NormaNEWS</a>) is a pilot network designed to investigate the spatial and temporal distribution of newly identified contaminants of emerging concern in environmental samples through performing retrospective suspect screening on HRMS data acquired using different instrumental platforms and data processing software. \r\nThe NormaNEWS pilot study was performed through recruiting eight reference laboratories with available archived HRMS data with the goal of exploring the potential of an early warning network to rapidly establish the occurrence of newly-identified contaminants of emerging concern across Europe and beyond, through the use of retrospective suspect screening employing HRMS. The pilot study was referred to as the Norman Early Warning System, abbreviated to NormaNEWS.\r\n",
          "chemicalCount" : 131,
          "updatedAt" : "2018-11-16T21:48:12Z"
        }, {
          "id" : 880,
          "listName" : "NORMANEWS2",
          "label" : "NORMAN: NormaNEWS2 Retrospective Screening of New Emerging Contaminants",
          "type" : "other",
          "shortDescription" : "NormaNEWS2 Retrospective Screening of New Emerging Contaminants (NORMANEWS2 on the NORMAN Suspect List Exchange)",
          "longDescription" : "This is the collection associated with list S62 NormaNEWS2 on the <a href='https://www.norman-network.com/nds/SLE/' target='_blank'>NORMAN Suspect List Exchange</a>. List of suspects provided by many contributors to NormaNEWS2, collated by Kevin Thomas and colleagues at the University of Queensland. The Norman Early Warning System (NormaNEWS) is a collaborative activity aimed at members active in non-target analysis. The concept of NormaNEWS is that when one group identifies a new contaminant of emerging concern identification criteria are sent to other members of the group who use retrospective analysis techniques to check their own samples. This way we can rapidly establish the occurrence of newly identified compounds of emerging concern across Europe and beyond. NormaNEWS is lead by Kevin Thomas at NIVA (Norway) / University of Queensland (Australia) as part of the Non-target screening cross-working group activity of the NORMAN network. This is a partial mapping until the next release.\r\n\r\n\r\n\r\n\r\n\r\n",
          "chemicalCount" : 271,
          "updatedAt" : "2020-04-21T16:17:08Z"
