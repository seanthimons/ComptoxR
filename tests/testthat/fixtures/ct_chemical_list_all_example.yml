          "listName" : "ASPECT",
          "label" : "EPA|ASPECT: EPA’s Airborne Spectral Photometric Environmental Collection Technology (ASPECT)",
          "type" : "federal",
          "shortDescription" : "EPA's ASPECT is the nation’s only airborne real-time chemical and radiological detection, infrared and photographic imagery platform. ",
          "longDescription" : "Based near Dallas, Texas, and able to deploy within one hour of notification, ASPECT is the nation’s only airborne real-time chemical and radiological detection, infrared and photographic imagery platform. ASPECT is available to assist local, national, and international agencies supporting hazardous substance response, radiological incidents, and situational awareness. ASPECT is available 24/7/365 and can begin collecting data at any site in the continental US within nine hours.",
