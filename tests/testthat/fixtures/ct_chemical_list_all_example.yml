          "longDescription" : "This is the 2022 Update of the Minnesota Department of Health (MDH) Chemicals of High Concern List. The Toxic Free Kids Program published the fourth update of the Chemicals of High Concern list July 1, 2022. During the 2009 legislative session, the Toxic Free Kids Act (Minn. Stat. 2010 116.9401 – 116.9407), was passed and signed into law by the governor. MDH is required to review and revise the Chemicals of High Concern list at least every three years. A report describing this process as well as public education efforts can be found on the Reports page. The fifth update of the Chemicals of High Concern list is scheduled for July 2025. <br/> <br/>\r\n\r\nThrough the Toxic Free Kids (TFK) program, MDH is working to identify and communicate the potential for hazardous chemical exposures which could be harmful to human health, particularly to vulnerable or susceptible populations, such as children and pregnant women. <br/> <br/>\r\n\r\nURL for original data: <a href='https://www.health.state.mn.us/communities/environment/childenvhealth/tfka/index.html' target='_blank'>https://www.health.state.mn.us/communities/environment/childenvhealth/tfka/index.html</a> <br/> <br/>\r\n\r\n(Last updated January 27th 2023) ",
