          "listName" : "TOXCAST_E1K",
          "label" : "TOXCAST_e1k is the e1k subset of TOXCAST, selected for screening in endocrine-related assays.",
          "type" : "federal",
          "shortDescription" : "TOXCAST_e1k is the e1k subset of TOXCAST, selected for screening in endocrine-related assays.",
          "longDescription" : "TOXCAST_e1k is the e1k subset of EPA’s ToxCast Screening Library (TOXCAST), consisting of 799 unique chemicals added in Phase II of EPA’s ToxCast program (non-overlapping with the ph1v2, ph2 subsets in Phase II) that were specifically introduced for screening in endocrine-related assays (e.g., ER - estrogen receptor and AR - androgen receptor) in support of EPA's Endocrine Disruption Screening Program. For more details, see <a href=https://comptox.epa.gov/dashboard/chemical_lists/toxcast”target=”_blank”>TOXCAST</a>",
