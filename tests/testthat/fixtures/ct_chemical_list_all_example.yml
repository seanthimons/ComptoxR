          "shortDescription" : "EPAPFASRL is a manually curated listing of mainly straight-chain and branched PFAS (Per- & Poly-fluorinated alkyl substances) compiled from various internal, literature and public sources by EPA researchers and program office representatives.",
          "longDescription" : "EPAPFASRL is a manually curated listing of mainly straight-chain and branched PFAS (Per- & Poly-fluorinated alkyl substances) compiled from various internal, literature and public sources by EPA researchers and program office representatives. Note that this list includes a number of parent, salt and anionic forms of PFAS, the latter being the form detected by mass spectroscopic methods. These different forms are assigned unique DTXSIDs, with a unique structure, CAS (if available) and name, but will collapse to a single form in the MS-ready (or QSAR-ready) structure representations.  ",
