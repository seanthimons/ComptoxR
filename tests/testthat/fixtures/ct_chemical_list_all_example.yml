          "type" : "federal",
          "shortDescription" : "List of PFAS chemicals that meets the TSCA section 8(a)(7) rule structural definition of PFAS (last updated April 24th 2024)",
          "longDescription" : "EPA promulgated a reporting and recordkeeping rule for perfluoroalkyl and polyfluoroalkyl substances (PFAS) under the <a href='https://www.govinfo.gov/content/pkg/FR-2023-10-11/pdf/2023-22094.pdf' target='_blank'> Toxic Substances Control Act (TSCA) section 8(a)(7)</a>. Any entity who has manufactured a PFAS that is a TSCA chemical substance for commercial purposes in any year since January 1, 2011, is required to submit certain information to EPA. For the purpose of this TSCA section 8(a)(7) rule, EPA defines PFAS to include at least one of these three structures: 1) R-(CF<sub>2</sub>)-CF(R’)R”, where both the CF<sub>2</sub> and CF moieties are saturated carbons; 2) R-CF<sub>2</sub>OCF<sub>2</sub>-R’, where R and R’ can either be F, O, or saturated carbons; 3) CF<sub>3</sub>C(CF<sub>3</sub>)R’R’’, where R’ and R” can either be F or saturated carbons.</br> </br>\r\nThe list below is a subset of reportable substances and includes chemicals on the EPA Comptox Chemicals Dashboard that meet this rule’s structural definition of PFAS, including chemical substances from the publicly available TSCA Inventory and Low-Volume Exemption submissions that would meet the structural definition (~10% of the total number of compounds). While this list includes substances beyond the known TSCA universe to provide as comprehensive a list as possible to potential reporting entities, it is not exhaustive and does not contain polymers or <a href='https://www.epa.gov/tsca-inventory/chemical-substances-unknown-or-variable-composition-complex-reaction-products-and' target='_blank'>UVCBs (Unknown or Variable compositions, Complex reaction products, and Biological materials)</a> which may be covered by the rule. Substances that meet the rule’s structural definition but are not found on this list may be found on the <a href='https://cdxapps.epa.gov/oms-substance-registry-services/substance-list-details/490' target='_blank'>TSCA 8(a)(7) PFAS Chemicals list in the System of Registries</a>. </br> </br>\r\nNote that the list could change as the chemicals included on the CompTox Chemicals Dashboard are expanded or otherwise as modified. Such changes will be noted and curated in a transparent manner. </br> </br>\r\nThis list is associated with the work reported in \"<a href='https://doi.org/10.1016/j.comtox.2024.100327' target='_blank'>Development of chemical categories for per- and polyfluoroalkyl substances (PFAS) and the proof-of-concept approach to the identification of potential candidates for tiered toxicological testing and human health assessment</a>\". The associated supplementary data for the paper are available <a href='https://ars.els-cdn.com/content/image/1-s2.0-S246811132400029X-mmc2.zip' target='_blank'>here</a> and the associated <a href='https://github.com/patlewig/nts_pfas' target='_blank'>GitHub repository</a> with workflows and associated code.\r\n\r\n</br>\r\n(last updated April 24th 2024)",
          "chemicalCount" : 13054,
          "updatedAt" : "2025-06-02T20:53:22Z"
        }, {
          "id" : 517,
          "listName" : "PFASMARKUSH",
          "label" : "PFAS|Markush Structures",
          "type" : "federal",
          "shortDescription" : "List of all registered DSSTox PFAS substances represented by Markush structures, created using ChemAxon’s Markush query representations; includes PFAS category, mixture and polymer types.",
          "longDescription" : "List of all registered DSSTox Per- and Polyfluoroalkyl Substances (PFAS) created using ChemAxon’s Markush structure-based query representations.  Markush structures can be broad and represent typical PFAS categories or they can represent mixtures or polymers containing ambiguous or generalized structural elements (s.a., unknown location of substituent, or variable chain length).  Each PFAS Markush registered with a unique DTXSID is considered a generalized substance or “parent ID” that can be associated with one or many “child IDs” (i.e., many parent-child mappings) within the full DSSTox database.  These mixture or category DTXSIDs can be used to search and retrieve all currently registered DSSTox substances within the group, and offer an objective, transparent and reproducible structure-based means of defining a generalized set of chemicals. This list encompasses the content of another registered list (EPAPFASCAT), the latter containing only the subset representing category mappings. ",
          "chemicalCount" : 326,
          "updatedAt" : "2021-12-07T07:29:17Z"
        }, {
          "id" : 1252,
          "listName" : "PFASPACKAGING",
          "label" : "PFAS|EPA  PFAS Substances in Pesticide Packaging",
          "type" : "federal",
          "shortDescription" : "PFAS chemicals detected in fluorinated HDPE containers",
          "longDescription" : "On March 5, 2021, EPA released testing data showing PFAS contamination from the fluorinated HDPE containers used to store and transport a mosquito control pesticide product. A description of the project is <a href='https://www.epa.gov/pesticides/pfas-packaging' target='_blank'>given here.</a>",
          "chemicalCount" : 8,
          "updatedAt" : "2021-08-04T22:37:33Z"
        }, {
          "id" : 787,
          "listName" : "PFASSTRUCTV2",
          "label" : "PFAS|EPA: PFAS structures in DSSTox (update November 2019)",
          "type" : "federal",
          "shortDescription" : "List consists of all records with a structure assigned, and using a set of substructural filters. ",
          "longDescription" : "THIS LIST HAS BEEN RETIRED IN FAVOR OF TWO SEPARATE LISTS - <a href='https://comptox.epa.gov/dashboard/chemical-lists/PFASSTRUCT' target='_blank'>PFASSTRUCT</a> (EXPLICIT STRUCTURES) AND <a href='https://comptox.epa.gov/dashboard/chemical-lists/PFASDEV' target='_blank'>PFASDEV</a> (UVCB CHEMICALS). Always refer to the latest version of the list for the most up to date data, especially as curation efforts may have corrected chemicals previously classed as PFAS to non-PFAS.<br/> \r\n************RETIRED***********<br/>\r\nList consists of all DTXSID records with a structure assigned, and where the structure contains the substructure RCF2CFR'R\" (R cannot be H). The substructure filter is designed to be simple, reproducible and transparent, yet general enough to encompass the largest set of structures having sufficient levels of fluorination to potentially impart PFAS-type properties (update November 2019).",
          "chemicalCount" : 6648,
          "updatedAt" : "2025-09-10T08:30:25Z"
        }, {
          "id" : 1262,
          "listName" : "PFASSTRUCTV4",
          "label" : "PFAS|EPA: PFAS structures in DSSTox (update Aug 2021)",
          "type" : "federal",
          "shortDescription" : "List consists of all records with a structure assigned and using a set of substructural filters. ",
          "longDescription" : "THIS LIST HAS BEEN RETIRED IN FAVOR OF TWO SEPARATE LISTS - <a href='https://comptox.epa.gov/dashboard/chemical-lists/PFASSTRUCT' target='_blank'>PFASSTRUCT</a> (EXPLICIT STRUCTURES) AND <a href='https://comptox.epa.gov/dashboard/chemical-lists/PFASDEV' target='_blank'>PFASDEV</a> (UVCB CHEMICALS). Always refer to the latest version of the list for the most up to date data, especially as curation efforts may have corrected chemicals previously classed as PFAS to non-PFAS.<br/> \r\n************RETIRED***********<br/>\r\nList consists of all DTXSID records with a structure assigned and using a set of substructural filters based on community input. The substructural filters (<a href='https://www.epa.gov/system/files/images/2022-05/PFAS_structures_based_on_Substructural_Elements_August_2021.jpg' target='_blank'>visible here</a>) are designed to be simple, reproducible and transparent, yet general enough to encompass the largest set of structures having sufficient levels of fluorination to potentially impart PFAS-type properties. Relative to the previous list (<a href='https://comptox.epa.gov/dashboard/chemical_lists/PFASSTRUCTV3' target='_blank'>PFASSTRUCTV3</a>) the trifluoroacetate substructure has been removed from the substructure filters.",
          "chemicalCount" : 10776,
          "updatedAt" : "2025-09-10T08:35:11Z"
        }, {
          "id" : 1603,
          "listName" : "PFASSTRUCTV5",
          "label" : "PFAS|EPA: PFAS structures in DSSTox (update August 2022)",
          "type" : "federal",
          "shortDescription" : "List consists of all records with a structure assigned, and using a set of substructural filters and percent of fluorine in the molecular formula. ",
          "longDescription" : "List consists of all records with a structure assigned, and using a combination of a set of substructural filters and percent of fluorine in the molecular formula ignoring all hydrogen atoms. For example, for a compound with the molecular formula C6HF9O6, the percent of fluorine excluding hydrogen contained in the formula would be 9F/(6C + 9F + 6O) = 42%. A threshold of 30% fluorine without hydrogen allows for inclusion of some of the complex highly fluorinated structures. The combination of the set of substructural filters (<a href='https://www.epa.gov/system/files/images/2022-10/PFAS%20substructure%20image_PFASSTRUCTv5.jpg' target='_blank'>visible here, where the heteroatom Q can be B, O, N, P, S, or Si</a>) are designed to be simple, reproducible and transparent, yet general enough to encompass the largest set of structures having sufficient levels of fluorination to potentially impart PFAS-type properties. The combination of substructural filters and threshold of percentage of fluorination were identified in the development of the manuscript \"<a href='https://onlinelibrary.wiley.com/doi/full/10.1002/ieam.4735' target='_blank'>A Proposed approach to defining per- and polyfluoroalkyl substances (PFAS) based on molecular structure and formula</a>\" by Gaines et al. ",
          "chemicalCount" : 14735,
          "updatedAt" : "2025-03-24T13:03:18Z"
        }, {
          "id" : 1244,
          "listName" : "PFASTDB",
          "label" : "WATER|PFAS: PFAS Chemicals contained in the EPA Drinking Water Treatability Database",
          "type" : "federal",
          "shortDescription" : "The Drinking Water Treatability Database (TDB) presents referenced information on the control of contaminants in drinking water. This list is a subset of PFAS chemicals contained in the TDB.",
          "longDescription" : "The <a href='https://tdb.epa.gov/tdb/home' target='_blank'>Drinking Water Treatability Database (TDB)</a> presents referenced information on the control of contaminants in drinking water. It provides users—including drinking water utilities, primacy agencies, first responders to spills or emergencies, treatment process designers, research organizations, academicians, and others—with current information on more than 30 treatment processes and over 120 regulated and unregulated contaminants, including 26 PFAS chemicals, a total of 38 chemicals when considering salt and acid forms. The referenced information in the TDB comprises bench-, pilot-, and full-scale studies of surface, ground, and laboratory waters gathered from thousands of literature sources, including peer-reviewed journals and conferences, other conferences and symposia, research reports, theses, and dissertations.",
          "chemicalCount" : 38,
          "updatedAt" : "2021-08-01T17:41:02Z"
        }, {
