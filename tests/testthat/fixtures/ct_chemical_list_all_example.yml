          "label" : "List of CERCLA Hazardous Substances (40 CFR 302)",
          "type" : "federal",
          "shortDescription" : "List of CERCLA Hazardous Substances associated with 40CFR302",
          "longDescription" : "40CFR302 designates under section 102(a) of the Comprehensive Environmental Response, Compensation, and Liability Act of 1980 (“the Act”) those substances in the statutes referred to in section 101(14) of the Act, identifies reportable quantities for these substances, and sets forth the notification requirements for releases of these substances. This regulation also sets forth reportable quantities for hazardous substances designated under section 311(b)(2)(A) of the Clean Water Act. The regulation is at <a href='https://www.ecfr.gov/current/title-40/chapter-I/subchapter-J/part-302'target='_blank'>40 CFR 302</a>.\r\n\r\n\r\n",
