          "shortDescription" : "NIST Standard Reference Material (SRM1950), \"Metabolites in Frozen Human Plasma\"",
          "longDescription" : "This Standard Reference Material (SRM1950), \"Metabolites in Frozen Human Plasma\" is intended primarily for validation of methods for determining metabolites such as fatty acids, electrolytes, vitamins, hormones, and amino acids in human plasma and similar materials. Details regarding the Standard Reference Material are available on the <a href='https://www-s.nist.gov/srmors/view_detail.cfm?srm=1950' target='_blank'>NIST website here</a>.",
          "chemicalCount" : 304,
