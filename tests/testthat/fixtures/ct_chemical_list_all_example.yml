          "type" : "other",
          "shortDescription" : "This is a set of mycotoxins, initiated by the contribution of spectra of 90 mycotoxins to MassBank.EU by Justin Renaud and colleagues from Agriculture and Agri-Food Canada, Government of Canada",
          "longDescription" : "This is a set of mycotoxins, initiated by the contribution of spectra of 90 mycotoxins to <a href=\"http://massbank.eu/MassBank/\" target=\"_blank\">MassBank.EU</a> by Justin Renaud and colleagues from Agriculture and Agri-Food Canada, Government of Canada. This list is also a part of the <a href=\"https://comptox.epa.gov/dashboard/chemical_lists/massbankref\" target=\"_blank\">MASSBANKREF</a> list and the <a href=\"http://www.norman-network.com/?q=node/236\" target=\"_blank\">NORMAN Suspect Exchange</a> and will be expanded as new contributions arrive. ",
          "chemicalCount" : 88,
