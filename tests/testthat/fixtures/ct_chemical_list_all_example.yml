          "type" : "international",
          "shortDescription" : "FRENCHLIST contains substances for prospective monitoring activities in France, developed in cooperation with the NORMAN Network Working Group 1 on Prioritization. Provided by Valeria Dulio, INERIS, France. Further details on the website. ",
          "longDescription" : "FRENCHLIST contains substances for prospective monitoring activities in France, developed in cooperation with the NORMAN Network <a href=\"http://www.norman-network.net/?q=node/50\" target=\"_blank\">Working Group 1</a> on Prioritization. Provided by Valeria Dulio, INERIS, France. Further details on the <a href=\"http://www.norman-network.net/?q=node/100\" target=\"_blank\">website</a>. \r\nThe original data is available on the <a href=\"http://www.norman-network.com/?q=node/236\" target=\"_blank\">NORMAN Suspect List Exchange</a>. \r\nThis list is undergoing continuous curation/extension.  \r\n",
