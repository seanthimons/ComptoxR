          "listName" : "TSCAHIGHPRI",
          "label" : "EPA|TSCA: List of Chemicals Undergoing Prioritization: High Priority Candidates March 2019 release",
          "type" : "federal",
          "shortDescription" : "High Priority List of 20 chemicals undergoing prioritization as of March 2019.",
          "longDescription" : "On March 20, 2019, EPA released a list of 40 chemicals to begin the prioritization process. TSCA requires EPA to publish this list of chemicals to begin the prioritization process and designate 20 chemicals as “high-priority” for subsequent risk evaluation and to designate 20 chemicals as “low-priority,” meaning that risk evaluation is not warranted at this time. Publication in the Federal Register activates a statutory requirement for EPA to complete the prioritization process in the next nine to twelve months, allowing EPA to designate 20 chemicals as high priority and 20 chemicals as low priority by December 2019.  The chemicals in the list below are the 20 high priority candidates released in March 2019.",
