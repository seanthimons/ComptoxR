          "listName" : "PFASLCMSGCMS",
          "label" : "PFAS: Collection of GC-MS and LC-MS standards: Food Contact Materials",
          "type" : "other",
          "shortDescription" : "List of PFAS standards reported in an article regarding food contact materials.",
          "longDescription" : "List of PFAS standards reported in the article \"The Determination of Trace Per- and Polyfluoroalkyl Substances and Their Precursors Migrated into Food Simulants from Food Contact Materials by LC–MS/MS and GC–MS/MS\" by Li at al regarding food contact materials. It should be noted that multiple edits had to be made to the names and mapped CASRNs in order to create this list. (<a href=\"http://www.chromatographyonline.com/determination-trace-and-polyfluoroalkyl-substances-and-their-precursors-migrated-food-simulants-food?pageID=2\" target=\"_blank\">Link to Article</a>)\r\n",
