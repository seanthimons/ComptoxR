        }, {
          "id" : 406,
          "listName" : "EPAHPV",
          "label" : "EPA: High Production Volume List ",
          "type" : "federal",
          "shortDescription" : "The United States High Production Volume (USHPV) database contains information about chemicals that are included in the High Production Volume (HPV) Challenge Program.",
          "longDescription" : "The United States High Production Volume (USHPV) database contains information about chemicals that are included in the High Production Volume (HPV) Challenge Program. Chemicals considered to be HPV are those that are manufactured in or imported into the United States in amounts equal to or greater than one million pounds per year. The goal of the HPV Challenge Program is to complete baseline testing on HPV chemicals by the year 2004. The Environmental Protection Agency (EPA) is challenging the chemical industry to undertake testing on HPV chemicals voluntarily. However, EPA will mandate testing of all HPV chemicals by law under the testing authority of Section 4 of the Toxic Substance Control Act (TSCA).",
          "chemicalCount" : 4297,
          "updatedAt" : "2018-11-18T21:50:19Z"
        }, {
          "id" : 165,
          "listName" : "EPAMOA",
          "label" : "EPA: Mechanism of Action (MoA) for aquatic toxicity",
          "type" : "federal",
          "shortDescription" : "MOAtox: A Comprehensive Mode of Action and Acute Aquatic Toxicity Database for Predictive Model Development",
          "longDescription" : "The mode of toxic action (MOA) has been recognized as a key determinant of chemical toxicity andas an alternative to chemical class-based predictive toxicity modeling. However, the development of quantitative structure activity relationship (QSAR) and other models has been limited by the avail-ability of comprehensive high quality MOA and toxicity databases. A study developed a dataset of MOA assignments for 1213 chemicals that included a diversity of metals, pesticides, and other organic compounds that encompassed six broad and 31 specific MOAs. MOA assignments were made using a combination of high confidence approaches that included international consensus classifications, QSAR predictions, and weight of evidence professional judgment based on an assessment of structure and literature information. ",
          "chemicalCount" : 1227,
          "updatedAt" : "2018-11-18T22:00:30Z"
        }, {
          "id" : 743,
          "listName" : "EPAOPPIN",
          "label" : "EPA Office of Pesticide Programs Information Network  (OPPIN)",
          "type" : "federal",
          "shortDescription" : "EPA's Office of Pesticide Programs Information Network (OPPIN)",
          "longDescription" : "The Office of Pesticide Programs has migrated all of its major data systems including regulatory and scientific data, workflow tracking and electronic document management into one integrated system, the Office of Pesticide Programs Information Network (OPPIN). OPPIN consolidates information now stored on the mainframe, the OPP LAN, on stand alone computers and in paper copy.",
          "chemicalCount" : 4071,
          "updatedAt" : "2023-07-30T13:38:13Z"
        }, {
          "id" : 764,
          "listName" : "EPAPALS",
          "label" : "EPA: Provisional Advisory Levels",
          "type" : "federal",
          "shortDescription" : "Provisional Advisory Levels (PALs) for high priority chemicals including toxic industrial chemicals and chemical warfare agents.",
          "longDescription" : "The unanticipated, emergency release of chemicals can cause harm to emergency responders and bystanders. EPA/ORD’s National Homeland Security Research Center (NHSRC) develops health-based Provisional Advisory Levels (PALs) for high priority chemicals including toxic industrial chemicals and chemical warfare agents.These help emergency responders decide whether and for how long humans can be temporarily exposed to unanticipated, uncontrolled chemical releases such as accidents, terrorist attacks and natural disasters. The values are derived using peer reviewed risk assessment methods, and they are specifically tailored to the short term human exposures most associated with emergency releases and clean-up operations. ",
          "chemicalCount" : 54,
          "updatedAt" : "2019-11-16T09:47:22Z"
        }, {
          "id" : 423,
          "listName" : "EPAPCS",
          "label" : "PESTICIDES|EPA: Pesticide Chemical Search Database",
          "type" : "federal",
          "shortDescription" : "The entries in this list have been classified in the U.S. as pesticidal “active ingredients” (conventional, antimicrobial, or biopesticidal agents), and were sourced from the Pesticide Chemical Search database.",
          "longDescription" : "The entries in this list have been classified in the U.S. as pesticidal “active ingredients” (conventional, antimicrobial, or biopesticidal agents), and were sourced from the Pesticide Chemical Search database (<a href=\"https://iaspub.epa.gov/apex/pesticides/f?p=chemicalsearch:1\" target=\"_blank\">https://iaspub.epa.gov/apex/pesticides/f?p=chemicalsearch:1</a>) created by EPA’s Office of Pesticide Programs. <br/><br/>\r\nChemical Search provides a single point of reference for easy access to information previously published in a variety of locations, including various EPA web pages and Regulations.gov. Chemical search contains the following: <br/>1) More than 20,000 regulatory documents; <br/>2) Links to over 800 dockets in Regulations.gov <br/>3) Links to pesticide tolerance (or maximum residue levels) information; <br/>4) A variety of web services providing easy access to other scientific and regulatory information on particular chemicals from other EPA programs and federal government sources.<br/><br/>\r\nIt should be noted that the Pesticide Chemical Search site is not actively maintained and the various chemicals can be out of date in terms of status.\r\n\r\n\r\n",
          "chemicalCount" : 4039,
          "updatedAt" : "2019-10-25T22:10:41Z"
