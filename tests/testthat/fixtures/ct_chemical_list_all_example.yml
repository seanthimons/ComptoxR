        }, {
          "id" : 819,
          "listName" : "SFEIWATER",
          "label" : "WATER: Regional Monitoring Program for Water Quality in San Francisco Bay",
          "type" : "state",
          "shortDescription" : "Chemicals monitored in the Regional Monitoring Program for Water Quality in San Francisco Bay (RMP)",
          "longDescription" : "The Regional Monitoring Program for Water Quality in San Francisco Bay (RMP) provides the information that regulators and decision-makers need to manage the Bay effectively. The RMP is an innovative collaborative effort between the <a href='https://www.sfei.org/'target='_blank'>San Francisco Estuary Institute (SFEI)</a>, the <a href='https://www.waterboards.ca.gov/sanfranciscobay/'target='_blank'>Regional Water Quality Control Board</a>, and the regulated discharger community. \r\n\r\nThe RMP has produced a world-class dataset on estuarine contaminants. Monitoring performed in the RMP determines spatial patterns and long-term trends in contamination through sampling of water, sediment, bivalves, bird eggs, and fish, and evaluates toxic effects on sensitive organisms and chemical loading to the Bay. The Program combines RMP data with data from other sources to provide for comprehensive assessment of chemical contamination in the Bay.\r\n\r\nFor more information, visit <a href='https://www.sfei.org/programs/sf-bay-regional-monitoring-program'target='_blank'>https://www.sfei.org/programs/sf-bay-regional-monitoring-program</a>.",
