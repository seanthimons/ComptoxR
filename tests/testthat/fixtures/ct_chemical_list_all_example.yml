          "longDescription" : "The PARIS III database of the physical and chemical properties of solvents and their potential environmental impacts is contained within the EPA’s Solvent Substitution Software Tools, PARIS III.  This software tool is open source and has an easy-to-use friendly graphical user interface.  It can be downloaded and installed without difficulty on most laptop and desktop personal computers.  More information about the PARIS III software tool can be found at <a href='https://www.epa.gov/chemical-research/program-assisting-replacement-industrial-solvents-paris-iii' target='_blank'>EPA’s PARIS III website</a>.\r\n\r\n\r\n\r\n\r\n\r\n",
