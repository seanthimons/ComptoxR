          "label" : "DEA Schedule 1 Drugs",
          "type" : "federal",
          "shortDescription" : "Schedule I drugs, substances, or chemicals are defined as drugs with no currently accepted medical use and a high potential for abuse. ",
          "longDescription" : "Schedule I drugs, substances, or chemicals are defined as drugs with no currently accepted medical use and a high potential for abuse. Some examples of Schedule I drugs are: heroin, lysergic acid diethylamide (LSD), marijuana (cannabis), 3,4-methylenedioxymethamphetamine (ecstasy), methaqualone, and peyote.\r\n\r\nThe Alphabetical listing of Controlled Substances is available online <a href='https://www.dea.gov/drug-information/drug-scheduling' target='_blank'>here</a>.",
          "chemicalCount" : 277,
          "updatedAt" : "2024-02-07T20:21:22Z"
        }, {
          "id" : 1987,
          "listName" : "DEASCHED2",
          "label" : "DEA Schedule 2 Drugs",
          "type" : "federal",
          "shortDescription" : "Schedule II drugs, substances, or chemicals are defined as drugs with a high potential for abuse, with use potentially leading to severe psychological or physical dependence.",
          "longDescription" : "Schedule II drugs, substances, or chemicals are defined as drugs with a high potential for abuse, with use potentially leading to severe psychological or physical dependence. These drugs are also considered dangerous. Some examples of Schedule II drugs are: combination products with less than 15 milligrams of hydrocodone per dosage unit (Vicodin), cocaine, methamphetamine, methadone, hydromorphone (Dilaudid), meperidine (Demerol), oxycodone (OxyContin), fentanyl, Dexedrine, Adderall, and Ritalin\r\n\r\nThe Alphabetical listing of Controlled Substances is available online <a href='https://www.dea.gov/drug-information/drug-scheduling' target='_blank'>here</a>.",
          "chemicalCount" : 58,
          "updatedAt" : "2024-02-07T20:31:52Z"
        }, {
