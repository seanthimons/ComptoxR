          "id" : 842,
          "listName" : "FDAORANGE",
          "label" : "FDA Orange Book: Approved Drug Products with Therapeutic Equivalence Evaluations",
          "type" : "federal",
          "shortDescription" : "The FDA Orange Book: \"Approved Drug Products with Therapeutic Equivalence Evaluations\" ",
          "longDescription" : "The publication \"Approved Drug Products with Therapeutic Equivalence Evaluations\" (commonly known as the Orange Book) identifies drug products approved on the basis of safety and effectiveness by the Food and Drug Administration (FDA) under the Federal Food, Drug, and Cosmetic Act (the Act) and related patent and exclusivity information.  Chemical names were collected from the ingredients listed in the product.txt file contained within the zipfile available on the \"Orange Book Data Files (compressed)\" link available on <a href='https://www.fda.gov/drugs/drug-approvals-and-databases/approved-drug-products-therapeutic-equivalence-evaluations-orange-b' target='_blank'>this page</a>.",
          "chemicalCount" : 2039,
          "updatedAt" : "2023-11-22T08:23:03Z"
        }, {
          "id" : 1206,
          "listName" : "FDAUNII0421",
          "label" : "LIST: FDA UNII List April 12th 2021 Download",
          "type" : "federal",
          "shortDescription" : "FDA’s Global Substance Registration System Unique Ingredient Identifiers (UNIIs) file: April 12th 2021 download subset of chemicals with CASRN and/or structure SMILES",
          "longDescription" : "FDA’s Global Substance Registration System Unique Ingredient Identifiers (UNIIs) file: April 12th 2021 download subset of chemicals with CASRN and/or structure SMILES\r\n\r\nTo this end, FDA’s Health Informatics team, NIH's National Center for Advancing Translational Sciences (NCATS), and the European Medicines Agency (EMA) have collaborated to create a Global Substance Registration System (GSRS) that will enable the efficient and accurate exchange of information on what substances are in regulated products.\r\n\r\nInstead of relying on names--which vary across regulatory domains, countries, and regions—the GSRS knowledge base makes it possible for substances to be defined by standardized, scientific descriptions. It classifies substances as chemical, protein, nucleic acid, polymer, structurally diverse, or mixture as detailed in the ISO 11238  (International Organization for Standardization)  and ISO DTS 19844. FDA’s GSRS generates Unique Ingredient Identifiers (UNIIs) used in electronic listings.",
          "chemicalCount" : 61269,
          "updatedAt" : "2023-12-30T11:52:55Z"
        }, {
          "id" : 961,
          "listName" : "GLOBALWARMING",
          "label" : "GlobalWarming_Title40Part98",
          "type" : "federal",
          "shortDescription" : "Chemicals with global warming potentials listed in Table A-1 to Subpart A of Part 98 of the electronic code of Federal Regulations (e-CFR)",
          "longDescription" : "Chemicals listed in Table A-1 to Subpart A of <a href='https://ecfr.io/Title-40/Part-98/Appendix#40:23.0.1.1.3.1.1.10.11' target='_blank'>Part 98 - Global Warming Potentials [100-Year Time Horizon] in the electronic code of Federal Regulations (e-CFR)</a>.",
          "chemicalCount" : 165,
          "updatedAt" : "2024-03-14T20:11:29Z"
        }, {
          "id" : 1052,
          "listName" : "HBSL",
          "label" : "Health-Based Screening Levels for Evaluating Water-Quality Data",
          "type" : "federal",
          "shortDescription" : "Health-Based Screening Levels (HBSLs) are non-enforceable water-quality benchmarks",
          "longDescription" : "Health-Based Screening Levels (HBSLs) are non-enforceable water-quality benchmarks that can be used to (1) supplement U.S. Environmental Protection Agency (USEPA) Maximum Contaminant Levels (MCLs) and Human Health Benchmarks for Pesticides (HHBPs), (2) determine whether contaminants found in surface-water or groundwater sources of drinking water may indicate a potential human-health concern, and (3) help prioritize monitoring efforts. HBSLs were developed by the U.S. Geological Survey (USGS) National Water-Quality Assessment (NAWQA) Project for contaminants without USEPA MCLs or HHBPs.",
          "chemicalCount" : 802,
          "updatedAt" : "2021-02-02T08:37:41Z"
        }, {
          "id" : 318,
          "listName" : "HEROMAP",
          "label" : "EPA; Chemicals mapped to HERO  ",
          "type" : "federal",
          "shortDescription" : "The Health and Environmental Research Online (HERO) database provides an easy way to access and influence the scientific literature behind EPA science assessments.",
          "longDescription" : "The Health and Environmental Research Online (HERO) database provides an easy way to access and influence the scientific literature behind EPA science assessments.\r\n\r\nThe database includes more than 600,000 scientific references and data from the peer-reviewed literature used by EPA to develop its regulations for the following: Integrated Science Assessments (ISA) that feed into the <a href=\"http://www.epa.gov/air/criteria.html\" target=\"_blank\">NAAQS</a> review, Provisional Peer Reviewed Toxicity Values (<a href=\"http://hhpprtv.ornl.gov/quickview/pprtv_papers.php\" target=\"_blank\">PPRTV</a>) that represent human health toxicity values for the Superfund, and the Integrated Risk Information System (IRIS), a database that supports critical agency policymaking for chemical regulation. These assessments supported by HERO characterize the nature and magnitude of health risks to humans and the ecosystem from pollutants and chemicals in the environment.\r\n\r\nHERO is an EVERGREEN database, this means that new studies are continuously added so scientists can keep abreast of current research. Imported references are systematically sorted, classified and made available for search and citation. \r\n\r\nHERO is part of the <a href=\"http://epa.gov/open\" target=\"_blank\">open government directive</a> to conduct business with transparency, participation, and collaboration. Every American has the right to know the data behind EPA's regulatory process. With HERO, the public can participate in the decision-making process.",
          "chemicalCount" : 495,
          "updatedAt" : "2018-11-16T21:29:55Z"
        }, {
          "id" : 761,
          "listName" : "HTPP2019_REFSET",
          "label" : "EPA HTPP Reference Set - Nyffeler et al. 2019",
          "type" : "federal",
          "shortDescription" : "List of chemicals used by EPA researchers to identify reference chemicals for high-throughput phenotypic profiling in U-2 OS cells. ",
          "longDescription" : "List of chemicals used by EPA researchers to identify reference chemicals for high-throughput phenotypic profiling in U-2 OS cells. List includes 14 reference chemicals from Gustafsdottir et al. 2013 [Gustafsdottir, S. M., et al. \"Multiplex cytological profiling assay to measure diverse cellular states.\" PloS one 8.12 (2013): e80999.], two negative controls and two cytotoxic chemicals. For more information, see: Nyffeler et al., Bioactivity screening of environmental chemicals using high-throughput phenotypic profiling (submitted for publication). See also <a href='https://comptox.epa.gov/dashboard/chemical-lists/HTPP2019_SCREEN' target='_blank'>HTPP2019_SCREEN</a>.",
          "chemicalCount" : 18,
          "updatedAt" : "2022-05-12T05:08:19Z"
