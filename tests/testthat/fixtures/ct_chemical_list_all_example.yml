          "shortDescription" : "Schedule IV drugs, substances, or chemicals are defined as drugs with a low potential for abuse and low risk of dependence. ",
          "longDescription" : "Schedule IV drugs, substances, or chemicals are defined as drugs with a low potential for abuse and low risk of dependence. Some examples of Schedule IV drugs are: Xanax, Soma, Darvon, Darvocet, Valium, Ativan, Talwin, Ambien, Tramadol.\r\n\r\nThe Alphabetical listing of Controlled Substances is available online <a href='https://www.dea.gov/drug-information/drug-scheduling' target='_blank'>here</a>.\r\n",
