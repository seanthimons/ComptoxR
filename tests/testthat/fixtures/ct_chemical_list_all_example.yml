          "type" : "federal",
          "shortDescription" : "The National Defense Authorization Act (2020) added PFAS chemicals to the Toxics Release Inventory (TRI)",
          "longDescription" : "Section 7321 of the National Defense Authorization Act for Fiscal Year 2020 (P.L. 116-92) (NDAA) added certain Per- and Polyfluoroalkyl Substances (PFAS) to the <a href=' https://comptox.epa.gov/dashboard/chemical-lists/TRIRELEASE' target='_blank'>TRI list of reportable chemicals</a>. The chemicals listed here are reportable to the Toxics Release Inventory (TRI). (Last updated: February 15th, 2022)\r\n\r\n",
