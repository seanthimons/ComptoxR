        }, {
          "id" : 1604,
          "listName" : "PFASSTRUCT",
          "label" : "Navigation Panel to PFAS Structure Lists",
          "type" : "other",
          "shortDescription" : "PFAS Structure lists are versioned iteratively and this panel navigates between the various versions",
          "longDescription" : "PFAS Structure lists are versioned iteratively and this description navigates between the various versions of the structure lists. The list of structures displayed below represents the latest iteration of structures (PFASSTRUCTV5 - August 2022). For the versioned lists please use the hyperlinked lists below.<br/><br/> A separate list (<a href='https://comptox.epa.gov/dashboard/chemical_lists/PFASDEV' target='_blank'>PFASDEV</a>) manages PFAS chemicals which do not have explicit chemical structures (i.e., polymers, mixtures and categories). <br/><br/>   \r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/PFASSTRUCTV5' target='_blank'>PFASSTRUCTV5 - August 2022</a> This list <br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/PFASSTRUCTV4' target='_blank'>PFASSTRUCTV4 - August 2021</a> <br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/PFASSTRUCTV3' target='_blank'>PFASSTRUCTV3 - August 2020</a> <br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/PFASSTRUCTV2' target='_blank'>PFASSTRUCTV2 - November 2019</a><br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/PFASSTRUCTV1' target='_blank'>PFASSTRUCTV1 - March 2018</a><br/><br/>\r\n\r\n\r\n",
          "chemicalCount" : 14735,
          "updatedAt" : "2023-09-26T12:57:53Z"
        }, {
          "id" : 717,
          "listName" : "PFASSTRUCTV1",
          "label" : "PFAS|EPA: PFAS structures in DSSTox (update March 2018)",
          "type" : "other",
          "shortDescription" : "List of all structures contained in DSSTox bounded by a set of structure filters used to identify PFAS (per- and polyfluorinated substances): LIST DEFINITION AS OF March 2018 ",
          "longDescription" : "THIS LIST HAS BEEN RETIRED IN FAVOR OF TWO SEPARATE LISTS - <a href='https://comptox.epa.gov/dashboard/chemical-lists/PFASSTRUCT' target='_blank'>PFASSTRUCT</a> (EXPLICIT STRUCTURES) AND <a href='https://comptox.epa.gov/dashboard/chemical-lists/PFASDEV' target='_blank'>PFASDEV</a> (UVCB CHEMICALS). Always refer to the latest version of the list for the most up to date data, especially as curation efforts may have corrected chemicals previously classed as PFAS to non-PFAS.<br/> \r\n************RETIRED***********<br/>\r\nList consists of all DTXSID records with a structure assigned, and where the structure satisfies a set of filter conditions that are designed to broadly identify PFAS (per- and polyfluorinated substances). The filter conditions listed below are designed to be simple, reproducible and transparent, yet general enough to encompass the largest set of structures having sufficient levels of fluorination to potentially impart PFAS-type properties. Some structures contained in other published DSSTox PFAS lists (e.g., PFASOECD) will not satisfy these criteria (e.g., chemicals with large organic moieties and small fluoroethyl side chains), and over 1000 structures from the larger DSSTox inventory are included that have not previously been assigned to a published “PFAS” list. 1) Formula must contain 4 -1000 Fluorine atoms; 2) Structure must contain two adjacent CF2 groups, either in a chain or in a ring system; 3) Fluorine to Carbon ratio (#F/#C) = or > 0.5; 4) Remove Markush structures, charged species (e.g., anions), radicals, and deuterium- and C13-labeled chemicals (LIST DEFINITION AS OF March 2018).",
          "chemicalCount" : 4357,
          "updatedAt" : "2025-09-10T08:30:04Z"
        }, {
          "id" : 1162,
          "listName" : "PFASSTRUCTV3",
          "label" : "PFAS|EPA: PFAS structures in DSSTox (update August 2020)",
          "type" : "other",
          "shortDescription" : "List of all structures contained in DSSTox bounded by multiple substructure filters used to identify PFAS (per- and polyfluorinated substances): August 2020 update",
          "longDescription" : "THIS LIST HAS BEEN RETIRED IN FAVOR OF TWO SEPARATE LISTS - <a href='https://comptox.epa.gov/dashboard/chemical-lists/PFASSTRUCT' target='_blank'>PFASSTRUCT</a> (EXPLICIT STRUCTURES) AND <a href='https://comptox.epa.gov/dashboard/chemical-lists/PFASDEV' target='_blank'>PFASDEV</a> (UVCB CHEMICALS). Always refer to the latest version of the list for the most up to date data, especially as curation efforts may have corrected chemicals previously classed as PFAS to non-PFAS.<br/> \r\n************RETIRED***********<br/>\r\nList consists of all DTXSID records with a structure assigned, and using a set of substructural filters based on community input. The substructural filters (<a href='https://gaftp.epa.gov/COMPTOX/Sustainable_Chemistry_Data/Chemistry_Dashboard/PFAS_Structure_list/PFAS_structures_based%20on%20Substructural_Elements_August_14_2020.jpg' target='_blank'>visible here</a>) are designed to be simple, reproducible and transparent, yet general enough to encompass the largest set of structures having sufficient levels of fluorination to potentially impart PFAS-type properties.",
          "chemicalCount" : 8163,
          "updatedAt" : "2025-09-10T08:34:42Z"
