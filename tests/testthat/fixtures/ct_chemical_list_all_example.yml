        }, {
          "id" : 1039,
          "listName" : "INERTNONFOOD",
          "label" : "PESTICIDES: InertFinder",
          "type" : "federal",
          "shortDescription" : "List of chemicals listed in InertFinder as Non-Food Use Chemicals\r\n",
          "longDescription" : "InertFinder is a database that allows pesticide formulators and other interested parties to easily identify chemicals approved for use as inert ingredients in pesticide products. It will allow registrants developing new products or new product formulations to readily determine which inert ingredients may be acceptable for use and make the same information more readily available to the public. This subset list is the <a href='https://iaspub.epa.gov/apex/pesticides/f?p=INERTFINDER:2::::::' target='_blank'>Non-Food Use chemicals available on InertFinder</a>.",
          "chemicalCount" : 5484,
          "updatedAt" : "2023-12-29T13:35:01Z"
        }, {
          "id" : 303,
          "listName" : "IRIS",
          "label" : "EPA: IRIS Chemicals",
          "type" : "federal",
          "shortDescription" : "EPA’s IRIS Program identifies and characterizes the health hazards of chemicals found in the environment. Each IRIS assessment can cover a chemical, a group of related chemicals, or a complex mixture.",
          "longDescription" : "The IRIS Program is located within EPA’s Center for Public Health and Environmental Assessment (CPHEA) in the Office of Research and Development (ORD). EPA’s IRIS Program identifies and characterizes the health hazards of chemicals found in the environment. Each IRIS assessment can cover a chemical, a group of related chemicals, or a complex mixture. IRIS assessments provide the following toxicity values for health effects resulting from chronic exposure to chemical: Reference Concentration (RfC), Reference Dose (RfD), Cancer descriptors, Oral slope factors (OSF) and Inhalation unit risk (IUR).",
          "chemicalCount" : 603,
          "updatedAt" : "2023-02-21T16:35:04Z"
        }, {
          "id" : 1708,
          "listName" : "IRISNONCANCER",
          "label" : "EPA: IRIS current non-cancer assessments (as of February 21st 2023)",
          "type" : "federal",
          "shortDescription" : "IRIS list containing chemicals with current (non-archived) non-cancer assessments containing reference dose (RfD) and reference concentrations (RfC).",
          "longDescription" : "The IRIS Program is located within EPA’s Center for Public Health and Environmental Assessment (CPHEA) in the Office of Research and Development (ORD). EPA’s IRIS Program identifies and characterizes the health hazards of chemicals found in the environment. Each IRIS assessment can cover a chemical, a group of related chemicals, or a complex mixture. IRIS assessments provide toxicity values and slope factors for health effects resulting from chronic exposure to chemicals. This list contains chemicals with current (non-archived) non-cancer assessments containing reference dose (RfD) and reference concentrations (RfC).",
          "chemicalCount" : 396,
          "updatedAt" : "2023-02-21T16:29:26Z"
        }, {
          "id" : 454,
          "listName" : "NATADB",
          "label" : "EPA: National-Scale Air Toxics Assessment (NATA)",
          "type" : "federal",
          "shortDescription" : "The National-Scale Air Toxics Assessment (NATA) is EPA's ongoing comprehensive evaluation of air toxics in the United States.",
          "longDescription" : "The National-Scale Air Toxics Assessment (NATA) is EPA's ongoing comprehensive evaluation of air toxics in the United States. EPA developed the NATA as a state-of-the-science screening tool for State/Local/Tribal Agencies to prioritize pollutants, emission sources and locations of interest for further study in order to gain a better understanding of risks.  NATA assessments do not incorporate refined information about emission sources but, rather, use general information about sources to develop estimates of risks which are more likely to overestimate impacts than underestimate them.\r\n\r\nNATA provides estimates of the risk of cancer and other serious health effects from breathing (inhaling) air toxics in order to inform both national and more localized efforts to identify and prioritize air toxics, emission source types and locations which are of greatest potential concern in terms of contributing to population risk.  This in turn helps air pollution experts focus limited analytical resources on areas and or populations where the potential for health risks are highest.  Assessments include estimates of cancer and non-cancer health effects based on chronic exposure from outdoor sources, including assessments of non-cancer health effects for Diesel Particulate Matter (PM). Assessments provide a snapshot of the outdoor air quality and the risks to human health that would result if air toxic emissions levels remained unchanged.",
          "chemicalCount" : 163,
          "updatedAt" : "2018-11-16T21:42:01Z"
        }, {
          "id" : 716,
          "listName" : "NHANES2019",
          "label" : "LIST: National Health and Nutrition Examination Survey (NHANES) data",
          "type" : "federal",
          "shortDescription" : "U.S. Centers for Disease Control and Prevention (CDC) conducts the National Health and Nutrition Examination Survey (NHANES) data",
          "longDescription" : "The U.S. Centers for Disease Control and Prevention (CDC) conducts the National Health and Nutrition Examination Survey (NHANES), which has determined representative blood, serum, or urine values for the U.S. population of the chemicals on this list at least once in past twenty years.",
          "chemicalCount" : 412,
          "updatedAt" : "2019-09-15T19:50:18Z"
        }, {
          "id" : 399,
          "listName" : "NIOSHICSC",
          "label" : "NIOSH: International Chemical Safety Cards",
          "type" : "federal",
          "shortDescription" : "The International Chemical Safety Cards (ICSC) summarize essential health and safety information on chemicals.",
          "longDescription" : "The International Chemical Safety Cards (ICSC) summarize essential health and safety information on chemicals for their use at the \"shop floor\" level by workers and employers in factories, agriculture, construction and other work places. ICSC summarize health and safety information collected, verified, and peer reviewed by internationally recognized experts, taking into account advice from manufacturers and Poison Control Centres.\r\n\r\n",
          "chemicalCount" : 1609,
          "updatedAt" : "2018-11-16T21:45:03Z"
        }, {
          "id" : 404,
          "listName" : "NIOSHIDLH",
          "label" : "NIOSH: Immediately Dangerous To Life or Health Values",
          "type" : "federal",
          "shortDescription" : "The immediately dangerous to life or health (IDLH) values are used by the National Institute for Occupational Safety and Health (NIOSH) as respirator selection criteria.",
          "longDescription" : "The immediately dangerous to life or health (IDLH) values used by the National Institute for Occupational Safety and Health (NIOSH) as respirator selection criteria were first developed in the mid-1970's. The original IDLH values were developed as part of a joint effort by OSHA and NIOSH called the Standard Completion Program (SCP). The goal of the SCP was to develop substance-specific draft standards with supporting documentation that contained technical information and recommendations needed for the promulgation of new occupational health regulations, such as the IDLH values. The Documentation for Immediately Dangerous to Life or Health (IDLH) Concentrations is a compilation of the rationale and sources of information used by NIOSH during the original determination of 387 SCP IDLH values.",
          "chemicalCount" : 372,
          "updatedAt" : "2018-11-16T21:45:44Z"
        }, {
          "id" : 401,
          "listName" : "NIOSHNPG",
          "label" : "NIOSH: Pocket Guide to Chemical Hazards",
          "type" : "federal",
          "shortDescription" : "The NIOSH Pocket Guide to Chemical Hazards (NPG) informs workers, employers, and occupational health professionals about workplace chemicals and their hazards.",
          "longDescription" : "The NIOSH Pocket Guide to Chemical Hazards (NPG) informs workers, employers, and occupational health professionals about workplace chemicals and their hazards. The NPG gives general industrial hygiene information for hundreds of chemicals/classes. The NPG clearly presents key data for chemicals or substance groupings (such as cyanides, fluorides, manganese compounds) that are found in workplaces. The guide offers key facts, but does not give all relevant data. The NPG helps users recognize and control workplace chemical hazards.",
          "chemicalCount" : 615,
          "updatedAt" : "2018-11-16T21:45:25Z"
        }, {
          "id" : 379,
          "listName" : "NIOSHSKIN",
          "label" : "NIOSH: Skin Notation Profiles",
          "type" : "federal",
          "shortDescription" : "NIOSH skin notations relies on multiple skin notations to provide warnings re. direct, systemic, and sensitizing effects of exposures to chemicals. ",
          "longDescription" : "The NIOSH skin notations relies on multiple skin notations to provide users a warning on the direct, systemic, and sensitizing effects of exposures of the skin to chemicals. Historically, skin notations have been published in the NIOSH Pocket Guide to Chemical Hazards. This practice will continue with the NIOSH skin notation assignments for each evaluated chemical being integrated as they become available. A support document called a Skin Notation Profile will be developed for each evaluated chemical. The Skin Notation Profile for a chemical will provide information supplemental to the skin notation, including a summary of all relevant data used to aid in determining the hazards associated with skin exposures .",
          "chemicalCount" : 57,
          "updatedAt" : "2018-11-18T19:17:01Z"
        }, {
          "id" : 487,
          "listName" : "NRTCHEMICALS",
          "label" : "US National Response Team Chemical Set",
          "type" : "federal",
          "shortDescription" : "The U.S. National Response Team (NRT) is an organization of 15 Federal departments and agencies responsible for coordinating emergency preparedness and response to oil and hazardous substance pollution incidents.",
          "longDescription" : "The U.S. National Response Team (NRT) is an organization of 15 Federal departments and agencies responsible for coordinating emergency preparedness and response to oil and hazardous substance pollution incidents. The Environment Protection Agency (EPA) and the U.S. Coast Guard (USCG) serve as Chair and Vice Chair respectively. The National Oil and Hazardous Substances Pollution Contingency Plan (NCP) and the Code of Federal Regulations (40 CFR part 300) outline the role of the NRT and Regional Response Teams (RRTs). The response teams are also cited in various federal statutes, including Superfund Amendments and Reauthorization Act (SARA) – Title III and the Hazardous Materials Transportation Act [HMTA]. The chemicals list here is sourced from the <a href='https://www.nrt.org/main/Resources.aspx?ResourceType=Hazards&ResourceSection=2'target=\"_blank\">Chemical Hazards Page</a>\r\n\r\n",
          "chemicalCount" : 18,
          "updatedAt" : "2018-08-15T09:24:16Z"
        }, {
          "id" : 481,
          "listName" : "NWATRQHHC",
          "label" : "WATER: National Recommended Water Quality Criteria - Human Health Criteria Table",
          "type" : "federal",
          "shortDescription" : "Human health ambient water quality criteria represent specific levels of chemicals or conditions in a water body that are not expected to cause adverse effects to human health. ",
          "longDescription" : "Human health ambient water quality criteria represent specific levels of chemicals or conditions in a water body that are not expected to cause adverse effects to human health. EPA provides recommendations for “water + organism” and “organism only” human health criteria for states and authorized tribes to consider when adopting criteria into their water quality standards. These human health criteria are developed by EPA under Section 304(a) of the Clean Water Act. Details are at <a href=\"https://www.epa.gov/wqc/national-recommended-water-quality-criteria-human-health-criteria-table\" target=\"_blank\">https://www.epa.gov/wqc/national-recommended-water-quality-criteria-human-health-criteria-table</a> \r\n\r\n",
          "chemicalCount" : 116,
          "updatedAt" : "2018-11-16T21:51:14Z"
        }, {
          "id" : 849,
          "listName" : "ORNLRSL",
          "label" : "EPA Regional Screening Levels Data Chemicals List",
          "type" : "federal",
          "shortDescription" : "Chemicals associated with the Regional Screening Levels (RSLs) Generic Tables",
          "longDescription" : "The Regional Screening Levels (RSLs) Generic Tables contain chemical-specific parameters necessary for the calculation of Regional screening Levels (RSLs) for Superfund sites. The RSL tables provide comparison values for residential and commercial/industrial exposures to soil, air, and water. The RSLs are primarily used to determine contaminants of potential concern (COPCs). A more expansive description of the Regional Screening Levels (RSLs) Generic Tables is given <a href='https://www.epa.gov/risk/regional-screening-levels-rsls-generic-tables' target='_blank'>here</a>.",
          "chemicalCount" : 1706,
          "updatedAt" : "2020-02-19T11:53:36Z"
        }, {
          "id" : 2183,
          "listName" : "OSHAV2",
          "label" : "LIST: OSHA Chemicals (Version 2)",
          "type" : "federal",
          "shortDescription" : "List of chemicals from the OSHA Occupational Chemical Database (Version 2)",
          "longDescription" : "This list represents the union of chemicals identified in two datasets maintained by the U.S. Occupational Safety and Health Administration (OSHA): the United States Information System (USIS) and the Chemical Exposure Health Data (CEHD). The USIS aggregates information from two sources: the legacy Integrated Management Information System (IMIS), which includes records from 1971 to 2015, and its next-generation replacement, the OSHA Information System (OIS), which includes records from 2011 to 2021. The CEHD dataset includes all OSHA chemical exposure measurements analyzed by the Salt Lake Technical Center, spanning data from 1984 through 2024. (Last Updated 1/22/2025)",
          "chemicalCount" : 1119,
          "updatedAt" : "2025-01-22T09:23:48Z"
