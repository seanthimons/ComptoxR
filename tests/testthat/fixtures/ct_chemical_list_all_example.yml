          "updatedAt" : "2019-12-26T13:36:46Z"
        }, {
          "id" : 2128,
          "listName" : "TSCARISK",
          "label" : "Ongoing and Completed Chemical Risk Evaluations under TSCA",
          "type" : "federal",
          "shortDescription" : "Ongoing and Completed Chemical Risk Evaluations under TSCA which have either undergone or are currently undergoing risk evaluation\r\n\r\n",
          "longDescription" : "The chemicals in <a href='https://www.epa.gov/assessing-and-managing-chemicals-under-tsca/ongoing-and-completed-chemical-risk-evaluations-under' target='_blank'>this page</a> have either undergone or are currently undergoing risk evaluation as part of EPA’s existing chemical process under the Toxic Substances Control Act (TSCA) to determine whether they present an unreasonable risk to public health or the environment.\r\n\r\n\r\n\r\n\r\n",
          "chemicalCount" : 37,
          "updatedAt" : "2024-07-28T22:53:10Z"
        }, {
          "id" : 365,
          "listName" : "TSCASTEP2",
          "label" : "EPA|TSCA:  TSCA Workplan Step 2 Chemicals",
          "type" : "federal",
          "shortDescription" : "As part of EPA’s chemical safety program, EPA has identified a work plan of chemicals for further assessment under the Toxic Substances Control Act (TSCA). EPA's TSCA Work Plan helps focus and direct the activities of its Existing Chemicals Program.",
          "longDescription" : "As part of EPA’s chemical safety program, EPA has identified a work plan of chemicals for further assessment under the Toxic Substances Control Act (TSCA). EPA's TSCA Work Plan helps focus and direct the activities of its Existing Chemicals Program.\r\n\r\nOriginally released in March 2012, EPA's TSCA Work Plan helps focus and direct the activities of its Existing Chemicals Program. The Work Plan was updated in October 2014. The changes to the TSCA Work Plan reflect updated data submitted to EPA by chemical companies on chemical releases and potential exposures.\r\n\r\nAfter gathering input from stakeholders, EPA developed criteria used for identifying chemicals for further assessment. The criteria focused on chemicals that meet one or more of the following factors:\r\n\r\nPotentially of concern to children’s health (for example, because of reproductive or developmental effects)\r\n\r\nNeurotoxic effects\r\nPersistent, Bioaccumulative, and Toxic (PBT)\r\nProbable or known carcinogens\r\nUsed in children’s products\r\nDetected in biomonitoring programs\r\n\r\nUsing this process, EPA in 2012 identified  chemicals in the TSCA Work Plan as candidates for assessment over the next several years, as they all scored high in this screening process based on their combined hazard, exposure, and persistence and bioaccumulation characteristics. In 2014, using new information submitted to the Agency, EPA updated the TSCA Work Plan.",
          "chemicalCount" : 344,
          "updatedAt" : "2018-11-16T22:05:52Z"
        }, {
          "id" : 397,
          "listName" : "TSCASURF",
          "label" : "EPA|TSCA|NORMAN: Surfactant List (subset)",
          "type" : "federal",
          "shortDescription" : "TSCASURF contains information on surfactants compiled by James Little (while at Eastman Chemical) from the TSCA Database. This is being progressively curated and extended. ",
          "longDescription" : "TSCASURF contains information on surfactants compiled by James Little (while at Eastman Chemical) from the TSCA Database. This is being progressively curated and extended. Extensive information and more details on the surfactants and other strategies for identifying “known unknowns” are available on the website of James Little <a href=\"https://littlemsandsailing.wordpress.com/2011/05/01/identification-of-surfactants-in-commercial-products-by-mass-spectrometry/\" target=\"_blank\">here</a>. ",
