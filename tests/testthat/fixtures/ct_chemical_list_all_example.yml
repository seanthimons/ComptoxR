          "shortDescription" : "A set of chemicals listed in the article \"Developmental Neurotoxicity of Industrial Chemicals\"",
          "longDescription" : "A set of chemicals listed in the article \"Developmental Neurotoxicity of Industrial Chemicals\"  by Grandjean and Landrigan, The Lancet, Volume 368, No. 9553, p2167–2178, 16 December 2006 <a href=\" https://doi.org/10.1016/S0140-6736(06)69665-7\" target=\"_blank\">(https://doi.org/10.1016/S0140-6736(06)69665-7)</a>. This list of chemicals were used to source information from the literature regarding their potential to be neurotoxicants. Please note that being a member of the list does not define their activity as neurotoxicants. The authors list 5 of these chemicals as developmental neurotoxins (arsenic and arsenic compounds; lead and lead compounds; methylmercury, toluene; polychlorinated biphenyls).",
