          "updatedAt" : "2021-05-10T17:23:01Z"
        }, {
          "id" : 1892,
          "listName" : "WCIT",
          "label" : "LIST: Water Contaminant Information Tool (WCIT)",
          "type" : "federal",
          "shortDescription" : "List of chemicals contained in the Water Contaminant Information Tool",
          "longDescription" : "This list is the list of chemicals contained in the Water Contaminant Information Tool. The Water Contaminant Information Tool (WCIT) is used by the water sector to prepare for, respond to or recover from drinking water and wastewater contamination incidents. WCIT includes comprehensive information about contaminants that could be introduced into a water system following a natural disaster, vandalism, accident or act or terrorism. There are currently over 800 priority contaminants of concern listed in WCIT. The tool is available online here: https://www.epa.gov/waterdata/water-contaminant-information-tool-wcit ",
