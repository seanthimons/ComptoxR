        }, {
          "id" : 1279,
          "listName" : "IARC1",
          "label" : "IARC: Group 1: Carcinogenic to humans",
          "type" : "international",
          "shortDescription" : "This is the list of chemicals identified by the International Agency for Research on Cancer (IARC), in their monographs, as Carcinogenic to humans",
          "longDescription" : "This is the list of chemicals identified by the International Agency for Research on Cancer (IARC), in their <a href=' https://monographs.iarc.who.int/home/iarc-monographs-general-information/' target='_blank'>monographs</a>, as Carcinogenic to humans. The IARC Monographs identify environmental factors that are carcinogenic hazards to humans. These include chemicals, complex mixtures, occupational exposures, physical agents, biological agents, and lifestyle factors. National health agencies can use this information as scientific support for their actions to prevent exposure to potential carcinogens. Interdisciplinary working groups of expert scientists review the published studies and assess the strength of the available evidence that an agent can cause cancer in humans. The principles, procedures, and scientific criteria that guide the evaluations are described in the Preamble to the IARC Monographs. Since 1971, more than 1000 agents have been evaluated, of which more than 500 have been identified as carcinogenic, probably carcinogenic, or possibly carcinogenic to humans. <br/> <br/>\r\nIt should be noted that it is not possible to map every chemical listed in the IARC monographs to a substance on the Dashboard as many of these are extremely ambiguous. Examples include alcohol beverages, carpentry and joinery and ceramic implants. <br/> <br/>\r\nThere are four lists in total on the Dashboard <br/>\r\n<a href=' https://comptox.epa.gov/dashboard/chemical_lists/IARC1' target='_blank'>Group 1: Carcinogenic to humans</a> This list <br/>\r\n<a href=' https://comptox.epa.gov/dashboard/chemical_lists/IARC2A' target='_blank'>Group 2A: Probably carcinogenic to humans</a> <br/>\r\n<a href=' https://comptox.epa.gov/dashboard/chemical_lists/IARC2B' target='_blank'>Group 2B: Possibly carcinogenic to humans</a> <br/>\r\n<a href=' https://comptox.epa.gov/dashboard/chemical_lists/IARC3' target='_blank'>Group 3: Not classifiable as to its carcinogenicity to humans</a> <br/>\r\n",
          "chemicalCount" : 54,
          "updatedAt" : "2021-08-13T10:50:19Z"
        }, {
          "id" : 1280,
          "listName" : "IARC2A",
          "label" : "IARC: Group 2A: Probably carcinogenic to humans",
          "type" : "international",
          "shortDescription" : "This is the list of chemicals identified by the International Agency for Research on Cancer (IARC), in their monographs, as Probably carcinogenic to humans",
          "longDescription" : "This is the list of chemicals identified by the International Agency for Research on Cancer (IARC), in their <a href=' https://monographs.iarc.who.int/home/iarc-monographs-general-information/' target='_blank'>monographs</a>, as Probably carcinogenic to humans. The IARC Monographs identify environmental factors that are carcinogenic hazards to humans. These include chemicals, complex mixtures, occupational exposures, physical agents, biological agents, and lifestyle factors. National health agencies can use this information as scientific support for their actions to prevent exposure to potential carcinogens. Interdisciplinary working groups of expert scientists review the published studies and assess the strength of the available evidence that an agent can cause cancer in humans. The principles, procedures, and scientific criteria that guide the evaluations are described in the Preamble to the IARC Monographs. Since 1971, more than 1000 agents have been evaluated, of which more than 500 have been identified as carcinogenic, probably carcinogenic, or possibly carcinogenic to humans. <br/> <br/>\r\nIt should be noted that it is not possible to map every chemical listed in the IARC monographs to a substance on the Dashboard as many of these are extremely ambiguous. Examples include alcohol beverages, carpentry and joinery and ceramic implants. <br/> <br/>\r\nThere are four lists in total on the Dashboard <br/>\r\n<a href=' https://comptox.epa.gov/dashboard/chemical_lists/IARC1' target='_blank'>Group 1: Carcinogenic to humans</a> <br/>\r\n<a href=' https://comptox.epa.gov/dashboard/chemical_lists/IARC2A' target='_blank'>Group 2A: Probably carcinogenic to humans</a> This list <br/>\r\n<a href=' https://comptox.epa.gov/dashboard/chemical_lists/IARC2B' target='_blank'>Group 2B: Possibly carcinogenic to humans</a> <br/>\r\n<a href=' https://comptox.epa.gov/dashboard/chemical_lists/IARC3' target='_blank'>Group 3: Not classifiable as to its carcinogenicity to humans</a> <br/>\r\n",
          "chemicalCount" : 70,
