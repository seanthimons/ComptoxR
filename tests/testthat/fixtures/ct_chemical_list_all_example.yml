        }, {
          "id" : 431,
          "listName" : "CERAPP",
          "label" : "ARTICLE: Collaborative Estrogen Receptor Activity Prediction Project (CERAPP)",
          "type" : "other",
          "shortDescription" : "CERAPP uses predictive computational models trained on HTS data to evaluate thousands of chemicals for ER-related activity.",
          "longDescription" : "CERAPP (Collaborative Estrogen Receptor Activity Prediction Project) is a large-scale modeling project demonstrate the efficacy of using predictive computational models trained on high-throughput screening data to evaluate thousands of chemicals for ER-related activity and prioritize them for further testing. CERAPP combined multiple models developed in collaboration with 17 groups in the United States and Europe to predict ER activity of a common set of 32,464 chemical structures. Quantitative structure–activity relationship models and docking approaches were employed, mostly using a common training set of 1,677 chemical structures provided by the U.S. EPA, to build a total of 40 categorical and 8 continuous models for binding, agonist, and antagonist ER activity. All predictions were evaluated on a set of 7,522 chemicals curated from the literature. To overcome the limitations of single models, a consensus was built by weighting models on scores based on their evaluated accuracies. The work is described in this peer-reviewed publication: <a href='https://ehp.niehs.nih.gov/doi/10.1289/ehp.1510267' target='_blank'>https://ehp.niehs.nih.gov/doi/10.1289/ehp.1510267</a>",
          "chemicalCount" : 32320,
          "updatedAt" : "2025-11-18T08:03:34Z"
        }, {
          "id" : 975,
          "listName" : "CHEMWEAPONS",
          "label" : "WEAPONS: Chemical Weapons Convention (CWC)",
          "type" : "other",
          "shortDescription" : "The Chemical Weapons Convention (CWC) is an international treaty that poses a complete ban on chemical weapons.",
          "longDescription" : "The Chemical Weapons Convention (CWC) is an international treaty that poses a complete ban on chemical weapons. The purpose of the CWC schedules is to support the treaty’s verification regime and declaration requirements. The schedules should not be construed as an exhaustive compilation of chemical warfare agents and precursors. Indeed, the CWC includes in its definition of chemical weapons  “any chemical (emphasis added) which through its chemical action on life processes can cause death, temporary incapacitation or permanent harm to humans or animals.” Hence, any weapon designed to bring about death, temporary incapacitation, or permanent harm through the toxic properties of chemicals is to be considered a chemical weapon, and any toxic chemical at the basis of such weapons is to be considered a chemical warfare agent.\r\n\r\nThis data collection is sourced from the <a href='https://costanziresearch.com/cw-nonproliferation/cw-control-lists/cwc-schedules/' target='_blank'>Constanzi Research group</a>.",
          "chemicalCount" : 63,
          "updatedAt" : "2021-08-07T10:41:11Z"
