          "id" : 2143,
          "listName" : "ARTICLE95",
          "label" : "European Article 95 list of active biocides",
          "type" : "international",
          "shortDescription" : "European Article 95 list of active biocides",
          "longDescription" : "The list contains the active biocides included under European Article 95. As of 1 September 2015, a biocidal product consisting of, containing, or generating a relevant substance, cannot be made available on the EU market unless the substance supplier or product supplier is included in the list for the product type(s) to which the product belongs. This is referred to as the Article 95 list of active biocidal substance and product suppliers.<a href='https://echa.europa.eu/information-on-chemicals/active-substance-suppliers' target='_blank'>The list was downloaded on September 30, 2024</a>.\r\n\r\n\r\n \r\n",
          "chemicalCount" : 199,
          "updatedAt" : "2024-10-11T08:51:22Z"
        }, {
          "id" : 839,
          "listName" : "CANADADSL",
          "label" : "Canadian Domestic Substances List 2019",
          "type" : "international",
          "shortDescription" : "The domestic substances list (DSL) is the sole standard against which a substance is judged to be \"new\" to Canada.\r\n",
          "longDescription" : "On May 4, 1994, Environment and Climate Change Canada published the domestic substances list (DSL) in Part II of the Canada Gazette. The DSL is an inventory of approximately 23 000 substances manufactured in, imported into or used in Canada on a commercial scale. It is based on substances present in Canada, under certain conditions, between January 1, 1984 and December 31, 1986.\r\n\r\nThe DSL is the sole standard against which a substance is judged to be \"new\" to Canada. With few exemptions, all substances not on this list are considered new and must be reported prior to importation or manufacture in order that they can be assessed to determine if they are toxic or could become toxic to the environment or human health.",
          "chemicalCount" : 23300,
          "updatedAt" : "2024-05-06T11:25:56Z"
        }, {
          "id" : 875,
          "listName" : "DIOXINS",
          "label" : "LIST: Dioxins and dioxin-like compounds",
          "type" : "international",
          "shortDescription" : "Dioxins and dioxin-like compounds (DLCs) are compounds that are highly toxic environmental persistent organic pollutants. ",
          "longDescription" : "Dioxins and dioxin-like compounds (DLCs) are compounds that are highly toxic environmental persistent organic pollutants. Dioxins have different toxicity depending on the number and position of the chlorine atoms. Because dioxins refer to such a broad class of compounds that vary widely in toxicity, the concept of toxic equivalency factor (TEF) has been developed to facilitate risk assessment and regulatory control. Toxic equivalence factors (TEFs) exist for seven congeners of dioxins, ten furans and twelve PCBs as identified in a <a href='https://academic.oup.com/toxsci/article/93/2/223/1707690' target='_blank'>World Health Organization Report</a>. The reference congener is the most toxic dioxin 2,3,7,8-tetrachlorodibenzo-p-dioxin (TCDD) which per definition has a TEF of one. This compound is extremely stable and consequently tends to accumulate in the food chain having a half-life of 7 to 9 years in humans. This list of DLCs are those for which TEFs were reported in the WHO report.\r\n\r\n\r\n",
          "chemicalCount" : 29,
          "updatedAt" : "2020-04-20T12:31:25Z"
        }, {
          "id" : 655,
          "listName" : "ECHAPLASTICS",
          "label" : "PLASTICS|NORMAN: A list from the Plastic Additives Initiative Mapping Exercise by ECHA",
          "type" : "international",
          "shortDescription" : "List with several categories released on <a href='https://echa.europa.eu/mapping-exercise-plastic-additives-initiative' target='_blank'>ECHA's \"Mapping exercise – Plastic additives initiative\"</a>",
          "longDescription" : "List with several categories released on <a href='https://echa.europa.eu/mapping-exercise-plastic-additives-initiative' target='_blank'>ECHA's \"Mapping exercise – Plastic additives initiative\"</a> and mapped to substances by CAS Registry Number and chemical name by E. Schymanski (Luxembourg Center for Systems Bioology) for the <a href='https://www.norman-network.com/?q=suspect-list-exchange' target='_blank'>NORMAN Suspect List Exchange</a>.\r\n\r\n",
