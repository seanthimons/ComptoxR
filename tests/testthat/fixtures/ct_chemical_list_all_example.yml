          "type" : "federal",
          "shortDescription" : "The Contaminant Candidate List (CCL) is a list of contaminants that are known or anticipated to occur in public water systems. Version 3 is known as CCL 3.\r\n\r\n",
          "longDescription" : "The Contaminant Candidate List (CCL) is a list of contaminants that, at the time of publication, are not subject to any proposed or promulgated national primary drinking water regulations, but are known or anticipated to occur in public water systems. Contaminants listed on the CCL may require future regulation under the Safe Drinking Water Act (SDWA). EPA announced the <a href='https://www.epa.gov/ccl/contaminant-candidate-list-3-ccl-3' target='_blank'>third Drinking Water Contaminant Candidate List (CCL 3)</a> on October 8, 2009. The CCL Chemical Candidate Lists are versioned iteratively and this description navigates between the various versions of the lists. The list of substances displayed below represents only the chemical CCL 3 contaminants. CCL 3 includes 103 individually listed chemicals and 1 chemical group (cyanotoxins). For the versioned lists, please use the hyperlinked lists below.<br/><br/> \r\n\r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL5' target='_blank'>CCL5 - November 2022</a> <br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL4' target='_blank'>CCL4 - November 2016</a><br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL3' target='_blank'>CCL3 - October 2009</a> This list<br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL2' target='_blank'>CCL2 - February 2005</a><br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL1' target='_blank'>CCL1 - March 1998</a><br/><br/> ",
