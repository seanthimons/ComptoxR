          "updatedAt" : "2022-04-22T18:21:21Z"
        }, {
          "id" : 922,
          "listName" : "PALSINHALATION",
          "label" : "EPA: Provisional Advisory Levels (Inhalation)",
          "type" : "federal",
          "shortDescription" : "INHALATION Provisional Advisory Levels (PALs) for high priority chemicals including toxic industrial chemicals and chemical warfare agents.",
          "longDescription" : "To support emergency response decisions and ensure the safety of responders and the public after an unanticipated chemical release, EPA researchers developed Provisional Advisory Levels (PALs). PALs are tiered risk values developed for oral and inhalation exposures to high priority chemicals, including toxic industrial chemicals and chemical warfare agents.  They are not “safe” levels of exposure – PALs represent exposure scenarios wherein effects of varying severity should be expected to occur; similar to Acute Exposure Guideline Levels (AEGLs).\r\n \r\nPALs are derived using peer reviewed risk assessment methods; they specifically address short term oral and inhalation exposures associated with emergency situations. Three tiers (PAL1, PAL2, and PAL3), distinguished by the severity of expected health outcomes, are developed for 24-hour, 30-day, and 90-day durations of exposure. These risk values can be requested from EPA ORD’s Center for Environmental Solutions and Emergency Response. The PALs <a href='https://cfpub.epa.gov/si/si_public_record_report.cfm?Lab=NHSRC&dirEntryId=336979' target='_blank'>Technical Brief</a> and <a href= 'https://cfpub.epa.gov/si/si_public_file_download.cfm?p_download_id=536782&Lab=NHSRC' target='_blank'>Standing Operating Procedure</a> are available for download. \r\n\r\nThis set of chemicals represents the list for which INHALATION PALs values are available.\r\n\r\n\r\n",
          "chemicalCount" : 71,
          "updatedAt" : "2020-05-15T16:53:00Z"
        }, {
          "id" : 921,
          "listName" : "PALSORAL",
          "label" : "EPA: Provisional Advisory Levels (Oral)",
          "type" : "federal",
          "shortDescription" : "ORAL Provisional Advisory Levels (PALs) for high priority chemicals including toxic industrial chemicals and chemical warfare agents.",
          "longDescription" : "To support emergency response decisions and ensure the safety of responders and the public after an unanticipated chemical release, EPA researchers developed Provisional Advisory Levels (PALs). PALs are tiered risk values developed for oral and inhalation exposures to high priority chemicals, including toxic industrial chemicals and chemical warfare agents.  They are not “safe” levels of exposure – PALs represent exposure scenarios wherein effects of varying severity should be expected to occur; similar to Acute Exposure Guideline Levels (AEGLs).\r\n \r\nPALs are derived using peer reviewed risk assessment methods; they specifically address short term oral and inhalation exposures associated with emergency situations. Three tiers (PAL1, PAL2, and PAL3), distinguished by the severity of expected health outcomes, are developed for 24-hour, 30-day, and 90-day durations of exposure. These risk values can be requested from EPA ORD’s Center for Environmental Solutions and Emergency Response. The PALs <a href='https://cfpub.epa.gov/si/si_public_record_report.cfm?Lab=NHSRC&dirEntryId=336979' target='_blank'>Technical Brief</a> and <a href= 'https://cfpub.epa.gov/si/si_public_file_download.cfm?p_download_id=536782&Lab=NHSRC' target='_blank'>Standing Operating Procedure</a> are available for download. \r\n\r\nThis set of chemicals represents the list for which ORAL PALs values are available.\r\n\r\n\r\n",
          "chemicalCount" : 46,
          "updatedAt" : "2020-05-15T15:14:19Z"
        }, {
          "id" : 1705,
          "listName" : "PESTHHBS",
          "label" : "EPA|PESTICIDES: 2021 Human Health Benchmarks for Pesticides",
          "type" : "federal",
          "shortDescription" : "EPA has developed human health benchmarks for 430 pesticides.",
          "longDescription" : "Advanced testing methods now allow for the detection of pesticides in water at very low levels. Small amounts of pesticides detected in drinking water or source water for drinking water do not necessarily indicate a health risk to consumers. EPA has developed human health benchmarks for 430 pesticides to provide information to enable Tribes, states, and water systems to evaluate: (1) whether the detection level of a pesticide in drinking water or sources of drinking water may indicate a potential health risk; and (2) to help to prioritize water monitoring efforts.\r\n\r\nThe HHBPs Table includes noncancer benchmarks for exposure to pesticides that may be found in surface or ground water sources of drinking water. Noncancer benchmarks for acute (one-day) and chronic (lifetime) drinking water exposures to each pesticide were derived for the most sensitive life stage, based on the available information. The table also includes cancer benchmarks for 48 of the pesticides that have toxicity information that indicates the potential to lead to cancer. The HHBP table includes pesticides for which EPA’s Office of Pesticide Programs has available toxicity data but for which EPA has not yet developed either enforceable National Primary Drinking Water Regulations (i.e., MCLs) or non-enforceable HAs. The list of 2021 Human Health Benchmarks is available <a href='https://www.epa.gov/sdwa/2021-human-health-benchmarks-pesticides' target='_blank'>here</a>.\r\n",
          "chemicalCount" : 448,
          "updatedAt" : "2023-02-17T18:52:40Z"
        }, {
          "id" : 2084,
          "listName" : "PFAS8a7",
          "label" : "PFAS|Toxic Substances Control Act Reporting and Recordkeeping Requirements for Perfluoroalkyl and Polyfluoroalkyl Substances: Section 8(a)(7) Rule List of Chemicals",
          "type" : "federal",
          "shortDescription" : "List of PFAS chemicals that meets the TSCA section 8(a)(7) rule structural definition of PFAS",
          "longDescription" : "EPA promulgated a reporting and recordkeeping rule for perfluoroalkyl and polyfluoroalkyl substances (PFAS) under the <a href='https://www.govinfo.gov/content/pkg/FR-2023-10-11/pdf/2023-22094.pdf' target='_blank'> Toxic Substances Control Act (TSCA) section 8(a)(7)</a>. Any entity who has manufactured a PFAS that is a TSCA chemical substance for commercial purposes in any year since January 1, 2011, is required to submit certain information to EPA. For the purpose of this TSCA section 8(a)(7) rule, EPA defines PFAS to include at least one of these three structures: 1) R-(CF<sub>2</sub>)-CF(R’)R”, where both the CF<sub>2</sub> and CF moieties are saturated carbons; 2) R-CF<sub>2</sub>OCF<sub>2</sub>-R’, where R and R’ can either be F, O, or saturated carbons; 3) CF<sub>3</sub>C(CF<sub>3</sub>)R’R’’, where R’ and R” can either be F or saturated carbons.</br> </br>\r\nThe list below is a subset of reportable substances and includes chemicals on the EPA Comptox Chemicals Dashboard that meet this rule’s structural definition of PFAS, including chemical substances from the publicly available TSCA Inventory and Low-Volume Exemption submissions that would meet the structural definition (~10% of the total number of compounds). While this list includes substances beyond the known TSCA universe to provide as comprehensive a list as possible to potential reporting entities, it is not exhaustive and does not contain polymers or <a href='https://www.epa.gov/tsca-inventory/chemical-substances-unknown-or-variable-composition-complex-reaction-products-and' target='_blank'>UVCBs (Unknown or Variable compositions, Complex reaction products, and Biological materials)</a> which may be covered by the rule. Substances that meet the rule’s structural definition but are not found on this list may be found on the <a href='https://cdxapps.epa.gov/oms-substance-registry-services/substance-list-details/490' target='_blank'>TSCA 8(a)(7) PFAS Chemicals list in the System of Registries</a>. </br> </br>\r\nNote that the list could change as the chemicals included on the CompTox Chemicals Dashboard are expanded or otherwise as modified. Such changes will be noted and curated in a transparent manner. Last Updated (April 24th 2024).  For the versioned lists please use the hyperlinked lists below.<br/><br/>\r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/PFAS8a7V3' target='_blank'>PFAS8a7v3 - April 24th 2024</a> This List <br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/PFAS8a7V2' target='_blank'>PFAS8a7v2 - March 29th 2024</a> <br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/PFAS8a7V1' target='_blank'>PFAS8a7V1 - December 6th 2023</a> <br/><br/>\r\n",
          "chemicalCount" : 13054,
          "updatedAt" : "2024-04-24T10:06:27Z"
        }, {
          "id" : 1890,
