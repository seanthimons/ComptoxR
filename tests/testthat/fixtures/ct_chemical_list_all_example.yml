          "listName" : "PPRTVVALS",
          "label" : "LIST: Chemicals with PPRTV and Appendix Values",
          "type" : "other",
          "shortDescription" : "Chemical list with either a Provisional Peer-Reviewed Toxicity Value or an appendix value manually curated from the PPRTV pdf document.",
          "longDescription" : "PPRTVs are developed for use in the EPA Superfund Program. Requests to try and derive a PPRTV are generally filtered through the EPA Regional Superfund Program, in which the site subject to the request is located. However, Regions typically request PPRTVs regardless of what party is considered the lead agency or is funding response actions on the (Superfund) site, including Fund-lead sites, potential responsible party (PRP) lead sites, State-lead sites, and sites where other Federal agencies may be identified as the lead agency. This list was developed by downloading the list of chemicals from the <a href='https://www.epa.gov/pprtv/provisional-peer-reviewed-toxicity-values-pprtvs-assessments' target='_blank'>PPRTV website</a> and manually curating the list of chemicals to include those with either a final PPRTV (as seen on the main chemical page) or an appendix value from the PPRTV pdf document. Some chemicals on the PPRTV web site list are not included here because no PPRTV or appendix values were developed. The main reasons for a missing value are (1) there is already an IRIS value or one provided by Office or Pesticide Programs, referred to on the web site, or (2) neither a PPRTV nor an appendix value could be created because of lack of sufficient information \r\n\r\n\r\n\r\n",
