          "label" : "DEA Schedule 5 Drugs",
          "type" : "federal",
          "shortDescription" : "Schedule V drugs, substances, or chemicals are defined as drugs with lower potential for abuse than Schedule IV and consist of preparations containing limited quantities of certain narcotics. ",
          "longDescription" : "Schedule V drugs, substances, or chemicals are defined as drugs with lower potential for abuse than Schedule IV and consist of preparations containing limited quantities of certain narcotics. Schedule V drugs are generally used for antidiarrheal, antitussive, and analgesic purposes. Some examples of Schedule V drugs are: cough preparations with less than 200 milligrams of codeine or per 100 milliliters (Robitussin AC), Lomotil, Motofen, Lyrica, Parepectolin.\r\n\r\nThe Alphabetical listing of Controlled Substances is available online <a href='https://www.dea.gov/drug-information/drug-scheduling' target='_blank'>here</a>.",
