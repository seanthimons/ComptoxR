          "type" : "international",
          "shortDescription" : "European active plant protection substances, safeners and synergists",
          "longDescription" : "The list contains the approved subset of the active substances, safeners, and synergists used in plant protection products from the European Union Pesticides database.  The list does not include microorganisms or associated isolates. <a href='https://ec.europa.eu/food/plant/pesticides/eu-pesticides-database/start/screen/active-substances' target='_blank'>The list was downloaded on September 30, 2024.<br/><br/>\r\n\r\n\r\n\r\n",
