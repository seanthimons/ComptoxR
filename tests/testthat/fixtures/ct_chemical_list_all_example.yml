          "id" : 791,
          "listName" : "SCILFULL",
          "label" : "EPA|SCIL: Safer Chemicals Full List",
          "type" : "federal",
          "shortDescription" : "Safer Chemical Ingredients List (SCIL) 2019 ",
          "longDescription" : "The Safer Chemical Ingredients List (SCIL) is a list of chemical ingredients, arranged by functional-use class, that the Safer Choice Program has evaluated and determined to be safer than traditional chemical ingredients. This list is designed to help manufacturers find safer chemical alternatives that meet the criteria of the Safer Choice Program.\r\nBefore Safer Choice decides to include a chemical on the SCIL, a third-party profiler (i.e., NSF, International or ToxServices) gathers hazard information from a broad set of resources, including the identification and evaluation of all available toxicological and environmental fate data. The third party profiler submits a report to Safer Choice, with a recommendation on whether the chemical passes the Criteria for Safer Chemical Ingredients. Safer Choice staff performs due diligence by reviewing the submission for completeness, consistency, and compliance with the Safer Choice Criteria. If more than one third-party has evaluated the chemical, Safer Choice also checks for differences in the profiles and resolves any conflicts. In some cases, Safer Choice may also perform additional literature reviews and consider data from confidential sources, such as EPA's New Chemicals Program. Safer Choice does not typically examine primary literature (original studies) as part of its review and listing decisions.\r\nThe list is not intended to be exclusive. Chemicals may be submitted as part of a formulation that the program has yet to review or a chemical manufacturer may develop a chemical to meet the Safer Choice criteria. If these chemicals meet our criteria, they may be approved for use in Safer Choice-labeled products and added to the SCIL. Chemicals may be removed from the list or have their status changed based on new data or innovations that raise the safer-chemistry bar. Safer Choice will ensure that no confidential or trade secret information appears in this list.",
          "chemicalCount" : 965,
          "updatedAt" : "2020-04-23T06:43:39Z"
        }, {
          "id" : 790,
          "listName" : "SCILGREENCIRCLE",
          "label" : "SCIL: Safer Chemicals List Green Circle List",
          "type" : "federal",
          "shortDescription" : "Safer Chemical Ingredients List (SCIL)  2019 Green Circle Subset",
          "longDescription" : "The Safer Chemical Ingredients List (SCIL) is a list of chemical ingredients, arranged by functional-use class, that the Safer Choice Program has evaluated and determined to be safer than traditional chemical ingredients. This list is designed to help manufacturers find safer chemical alternatives that meet the criteria of the Safer Choice Program.<br>\r\n\r\n<br>This subset is the Green circle list - the chemical has been verified to be of low concern based on experimental and modeled data. The other related subsets are: <br><br>\r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/SCILGREENHALFCIRCLE' target='_blank'>Green half-circle</a>  - The chemical is expected to be of low concern based on experimental and modeled data. Additional data would strengthen our confidence in the chemical’s safer status.<br><br>\r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/SCILYELLOWTRIANGLE' target='_blank'>Yellow triangle</a> - The chemical has met Safer Choice Criteria for its functional ingredient-class, but has some hazard profile issues. Specifically, a chemical with this code is not associated with a low level of hazard concern for all human health and environmental endpoints. While it is a best-in-class chemical and among the safest available for a particular function, the function fulfilled by the chemical should be considered an area for safer chemistry innovation.<br><br>\r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/SCILGREYSQUARE' target='_blank'>Grey square</a>  - This chemical will not be acceptable for use in products that are candidates for the Safer Choice label and currently labeled products that contain it must reformulate per Safer Choice Compliance Schedules.<br><br>\r\n\r\n",
          "chemicalCount" : 631,
