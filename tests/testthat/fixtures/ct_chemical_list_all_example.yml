          "longDescription" : "<a href='https://www.epa.gov/superfund/designation-perfluorooctanoic-acid-pfoa-and-perfluorooctanesulfonic-acid-pfos-cercla' target='_blank'>Perfluorooctanesulfonic acid (PFOS), Perfluorooctanoic acid (PFOA), and their salts and structural isomers designated as hazardous substances</a> pursuant to the Comprehensive Environmental Response, Compensation, and Liability Act (“CERCLA” or “Superfund”) [EPA-HQ-OLEM-2019-0341; FRL-7204-03-OLEM]. This list also includes ions as they have their own CASRN.\r\n\r\nNote that the list could change as the chemicals included on the CompTox Chemicals Dashboard are expanded or otherwise as modified. Such changes will be noted and curated in a transparent manner.\r\n\r\n(First Published 4/30/2024)\r\n",
