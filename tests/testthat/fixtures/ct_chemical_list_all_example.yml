          "longDescription" : "EPA PFAS Research: The list of PFAS EPA is currently researching using various scientific approaches. \r\n<br/><br/>  <a href='https://comptox.epa.gov/dashboard/chemical_lists/EPAPFASLITSEARCH' target='_blank'>PFAS|EPA: Literature Search Completed:</a> EPA completed a literature review of published toxicity studies for these PFAS. <br/><br/>  \r\n<a href=' https://comptox.epa.gov/dashboard/chemical_lists/EPAPFASINVIVO'  target='_blank'>PFAS|EPA: In Vivo Studies Available:</a> These PFAS have published animal toxicity studies available in the online HERO database. <br/><br/>\r\n<a href=' https://comptox.epa.gov/dashboard/chemical_lists/EPAPFASTOX'  target='_blank'>PFAS|EPA: Toxicity Assessments:</a> EPA is in the process of developing toxicity assessments for the PFAS on this list. <br/><br/>\r\n<a href=' https://comptox.epa.gov/dashboard/chemical_lists/EPAPFASDW537' target='_blank'>PFAS|EPA: Existing EPA DW Method 537.1:</a> EPA has recently revised method 537.1 for the PFAS on this list to detect them in drinking water. <br/><br/>\r\n<a href=' https://comptox.epa.gov/dashboard/chemical_lists/EPAPFASNONDW'  target='_blank'>PFAS|EPA: New EPA Method Non-Drinking Water:</a> EPA is developing and validating a new method for detecting these PFAS in non-drinking water sources. <br/><br/>\r\n<a href=' https://comptox.epa.gov/dashboard/chemical_lists/EPAPFASDW'  target='_blank'>PFAS|EPA: New EPA Method Drinking Water:</a> EPA is developing and validating a new method for detecting these PFAS in drinking water sources. <br/><br/>\r\n<a href=' https://comptox.epa.gov/dashboard/chemical_lists/EPAPFASDWTREAT' target='_blank'>PFAS|EPA: Drinking Water Treatment Technology:</a> EPA is gathering and evaluating treatment effectiveness and cost data for removing these PFAS from drinking water systems.<br/><br/>\r\n<a href=' https://comptox.epa.gov/dashboard/chemical_lists/EPAPFAS75S1' target='_blank'>PFAS|EPA: List of 75 Test Samples (Set 1):</a> corresponds to 75 samples (Set 1) submitted for initial testing screens conducted by EPA researchers in collaboration with researchers at the National Toxicology Program.<br/><br/>\r\n<a href=' https://comptox.epa.gov/dashboard/chemical_lists/EPAPFAS75S2 ' target='_blank'>PFAS|EPA: List of 75 Test Samples (Set ):</a> corresponds to a second set of 75 samples (Set 2) submitted for testing screens conducted by EPA researchers in collaboration with researchers at the National Toxicology Program.<br/><br/>",
