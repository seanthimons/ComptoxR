          "id" : 492,
          "listName" : "PFASOECD",
          "label" : "PFAS: Listed in OECD Global Database",
          "type" : "international",
          "shortDescription" : "OECD released a New Comprehensive Global Database of Per- and Polyfluoroalkyl Substances, (PFASs) listing more than 4700 new PFAS",
          "longDescription" : "OECD released a New Comprehensive Global Database of Per- and Polyfluoroalkyl Substances (PFASs) listing more than 4700 new PFAS, including several new groups of PFASs that fulfill the common definition of PFASs (i.e. they contain at least one perfluoroalkyl moiety) but have not yet been commonly regarded as PFASs. The list can be used in conjunction with the methodology report summarising the major findings with respect to the total numbers and types of PFASs identified, the limitations, gaps and challenges identified, and opportunities for improving the future understanding of PFASs production, use on the global market, and presence in the environment, biota, and other matrices. <br/><br/>Source website: <a href='http://www.oecd.org/chemicalsafety/portal-perfluorinated-chemicals/' target='_blank'>http://www.oecd.org/chemicalsafety/portal-perfluorinated-chemicals</a><br/><br/>A major effort was undertaken to register this list within DSSTox, adding chemical structures for as many PFAS entries as possible using both manual and auto-mapping (structures using CAS-matching) curation methods. The result is that approximately 1/3 of the list is curated at the highest two curation levels (DSSTox_High or DSSTox_Low) currently, whereas more than half of this list is registered at the Public_Low curation level (based on PubChem content).The PFASOECD list is undergoing continuous registration and curation.\r\n",
          "chemicalCount" : 4729,
          "updatedAt" : "2018-11-17T13:46:08Z"
        }, {
          "id" : 660,
          "listName" : "REACH2017",
          "label" : "NORMAN: REACH Chemicals List Provided to NORMAN Network",
          "type" : "international",
          "shortDescription" : "This REACH list of 57760 REACH chemicals from the <a href='https://www.norman-network.com/?q=suspect-list-exchange' target='_blank'>NORMAN Suspect List Exchange</a>",
          "longDescription" : "A REACH list of >68,600 REACH chemicals from the <a href='https://www.norman-network.com/?q=suspect-list-exchange' target='_blank'>NORMAN Suspect List Exchange</a> includes InChIKeys and spectral information, was provided by N. Alygizakis and J. Slobodnik (Environmental Institute at the University of Athens) and has been mapped to DTXSIDs by CAS Registry Number only (by E. Schymanski) for inclusion on the Dashboard. The total mappings is ~ 57760. Other REACH lists are undergoing curation by the Dashboard team and will be available in due course.",
