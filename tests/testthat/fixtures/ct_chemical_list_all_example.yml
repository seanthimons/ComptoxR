        }, {
          "id" : 1164,
          "listName" : "WATERQUALCRIT",
          "label" : "WATER: National Recommended Water Quality Criteria Aquatic Life chemical list",
          "type" : "federal",
          "shortDescription" : "The National Recommended Water Quality Criteria Aquatic Life chemical table contains criteria for aquatic life ambient water quality criteria.",
          "longDescription" : "The National Recommended Water Quality Criteria Aquatic Life chemical table contains criteria for aquatic life ambient water quality criteria. Aquatic life criteria for toxic chemicals are the highest concentration of specific pollutants or parameters in water that are not expected to pose a significant risk to the majority of species in a given environment or a narrative description of the desired conditions of a water body being \"free from\" certain negative conditions. The table of values is available at <a href='https://www.epa.gov/wqc/national-recommended-water-quality-criteria-aquatic-life-criteria-table' target='_blank'>https://www.epa.gov/wqc/national-recommended-water-quality-criteria-aquatic-life-criteria-table</a>\r\n",
