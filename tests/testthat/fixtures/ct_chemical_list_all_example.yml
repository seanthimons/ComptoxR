          "type" : "other",
          "shortDescription" : "List of PFAS chemicals without explicit structures - polymers and other UVCB chemicals",
          "longDescription" : "THIS LIST HAS BEEN RETIRED IN FAVOR OF TWO SEPARATE LISTS - <a href='https://comptox.epa.gov/dashboard/chemical-lists/PFASSTRUCT' target='_blank'>PFASSTRUCT</a> (EXPLICIT STRUCTURES) AND <a href='https://comptox.epa.gov/dashboard/chemical-lists/PFASDEV' target='_blank'>PFASDEV</a> (UVCB CHEMICALS). Always refer to the latest version of the list for the most up to date data, especially as curation efforts may have corrected chemicals previously classed as PFAS to non-PFAS.<br/> \r\n************RETIRED***********<br/>\r\nList of PFAS chemicals without explicit structures - polymers and other UVCB chemicals. The list was assembled by searching on the following substring list: Perfluoro, Polyfluoro, Fluoroethylene, Fluoropropylene, Fluorobutene, Fluoropolymer, \"Ethene, 1,1,2,2-tetrafluoro\" (the PTFE monomer unit), Chlorotrifluoroethylene, Difluoromethylene, Vinyl fluoride, Tetrafluoro, Pentafluoro, Hexafluoro, Heptafluoro, Octafluoro, Nonafluoro and Decafluoro and filtering out distinct chemical structures. This will retain Markush structure representations. This list remains under constant curation and expansion. <br/><br/> \r\n\r\nPlease note that curation may change the representation of a chemical in the list and, specifically, chemicals listed with no structure at some point in time may be enhanced with a structural representation.<br/><br/>\r\n\r\nLast Updated (August 8th 2021)",
          "chemicalCount" : 1263,
