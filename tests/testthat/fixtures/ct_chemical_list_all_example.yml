          "id" : 331,
          "listName" : "ATSDRLST",
          "label" : "ATSDR: Toxic Substances Portal Chemical List ",
          "type" : "federal",
          "shortDescription" : "The Agency for Toxic Substances and Disease Registry (ATSDR) is a federal public health agency of the U.S. Department of Health and Human Services.",
          "longDescription" : "The Agency for Toxic Substances and Disease Registry (ATSDR) is a federal public health agency of the U.S. Department of Health and Human Services. This list provides direct access to the ATSDR Toxic Substances Portal.",
          "chemicalCount" : 200,
          "updatedAt" : "2021-06-15T19:28:20Z"
        }, {
          "id" : 1902,
          "listName" : "ATSDRMRLS",
          "label" : "ATSDR: Minimal Risk Levels (MRLs) for Hazardous Substances NAVIGATION",
          "type" : "federal",
          "shortDescription" : "The ATSDR Minimal Risk Levels (MRLs) were developed as an initial response to the Comprehensive Environmental Response, Compensation, and Liability Act (CERCLA) (NAVIGATION)",
          "longDescription" : "The Comprehensive Environmental Response, Compensation, and Liability Act (CERCLA) [<a href='https://www.govinfo.gov/app/details/USCODE-2010-title42/USCODE-2010-title42-chap103-subchapI-sec9604' target='_blank'>42 U.S.C. 9604 et seq.</a>], as amended by the Superfund Amendments and Reauthorization Act (SARA) [Pub. L. 99 499], requires that the <a href='https://www.atsdr.cdc.gov/' target='_blank'>Agency for Toxic Substances and Disease Registry</a> (ATSDR) develop jointly with the U.S. Environmental Protection Agency (EPA), in order of priority, a list of hazardous substances most commonly found at facilities on the CERCLA National Priorities List (NPL) (<a href='https://www.govinfo.gov/app/details/USCODE-2010-title42/USCODE-2010-title42-chap103-subchapI-sec9604\r\n' target='_blank'>42 U.S.C. 9604(i)(2)</a>); prepare toxicological profiles for each substance included on the priority list of hazardous substances, and to ascertain significant human exposure levels (SHELs) for hazardous substances in the environment, and the associated acute, subacute, and chronic health effects (42 U.S.C. 9604(i)(3)); and assure the initiation of a research program to fill identified data needs associated with the substances (42 U.S.C. 9604(i)(5)). The ATSDR Minimal Risk Levels (MRLs) were developed as an initial response to the mandate. An MRL is an estimate of the amount of a chemical a person can eat, drink, or breathe each day without a detectable risk to health. MRLs are developed for health effects other than cancer. MRLs can be made for 3 different time periods [the length of time people are exposed to the chemical: acute (about 1 to 14 days), intermediate (from 15-364 days), and chronic (exposure for more than 364 days)]. It is important to note that MRLs are not intended to define clean up or action levels for ATSDR or other Agencies. <br/><br/>   \r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical-lists/ATSDRMRLSV2' target='_blank'>ATSDRMRLSV2 - August 2022</a> This list <br/><br/>\r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical-lists/ATSDRMRLSV1' target='_blank'>ATSDRMRLSV1 - November 2018</a>",
          "chemicalCount" : 207,
          "updatedAt" : "2024-01-14T17:38:26Z"
        }, {
          "id" : 564,
          "listName" : "ATSDRMRLSV1",
          "label" : "ATSDR: Minimal Risk Levels (MRLs) for Hazardous Substances (version 1 - November 2018)",
          "type" : "federal",
          "shortDescription" : "The ATSDR Minimal Risk Levels (MRLs) were developed as an initial response to the Comprehensive Environmental Response, Compensation, and Liability Act (CERCLA) (version 1 - November 2018)",
          "longDescription" : "The Comprehensive Environmental Response, Compensation, and Liability Act (CERCLA) [<a href='https://www.govinfo.gov/app/details/USCODE-2010-title42/USCODE-2010-title42-chap103-subchapI-sec9604' target='_blank'>42 U.S.C. 9604 et seq.</a>], as amended by the Superfund Amendments and Reauthorization Act (SARA) [Pub. L. 99 499], requires that the <a href='https://www.atsdr.cdc.gov/' target='_blank'>Agency for Toxic Substances and Disease Registry</a> (ATSDR) develop jointly with the U.S. Environmental Protection Agency (EPA), in order of priority, a list of hazardous substances most commonly found at facilities on the CERCLA National Priorities List (NPL) (<a href='https://www.govinfo.gov/app/details/USCODE-2010-title42/USCODE-2010-title42-chap103-subchapI-sec9604\r\n' target='_blank'>42 U.S.C. 9604(i)(2)</a>); prepare toxicological profiles for each substance included on the priority list of hazardous substances, and to ascertain significant human exposure levels (SHELs) for hazardous substances in the environment, and the associated acute, subacute, and chronic health effects (42 U.S.C. 9604(i)(3)); and assure the initiation of a research program to fill identified data needs associated with the substances (42 U.S.C. 9604(i)(5)). The ATSDR Minimal Risk Levels (MRLs) were developed as an initial response to the mandate. An MRL is an estimate of the amount of a chemical a person can eat, drink, or breathe each day without a detectable risk to health. MRLs are developed for health effects other than cancer. MRLs can be made for 3 different time periods [the length of time people are exposed to the chemical: acute (about 1 to 14 days), intermediate (from 15-364 days), and chronic (exposure for more than 364 days)]. It is important to note that MRLs are not intended to define clean up or action levels for ATSDR or other Agencies. (Version 1 - November 2018)\r\n",
          "chemicalCount" : 756,
          "updatedAt" : "2024-01-12T13:51:40Z"
        }, {
          "id" : 1675,
          "listName" : "ATSDRMRLSV2",
          "label" : "ATSDR: Minimal Risk Levels (MRLs) for Hazardous Substances (Version 2 -  December 2022)",
          "type" : "federal",
          "shortDescription" : "The ATSDR Minimal Risk Levels (MRLs) were developed as an initial response to the Comprehensive Environmental Response, Compensation, and Liability Act (CERCLA).  (Version 2 - December 2022)\r\n",
          "longDescription" : "The Comprehensive Environmental Response, Compensation, and Liability Act (CERCLA) [<a href='https://www.govinfo.gov/app/details/USCODE-2010-title42/USCODE-2010-title42-chap103-subchapI-sec9604' target='_blank'>42 U.S.C. 9604 et seq.</a>], as amended by the Superfund Amendments and Reauthorization Act (SARA) [Pub. L. 99 499], requires that the <a href='https://www.atsdr.cdc.gov/' target='_blank'>Agency for Toxic Substances and Disease Registry</a> (ATSDR) develop jointly with the U.S. Environmental Protection Agency (EPA), in order of priority, a list of hazardous substances most commonly found at facilities on the CERCLA National Priorities List (NPL) (<a href='https://www.govinfo.gov/app/details/USCODE-2010-title42/USCODE-2010-title42-chap103-subchapI-sec9604' target='_blank'>42 U.S.C. 9604(i)(2)</a>); prepare toxicological profiles for each substance included on the priority list of hazardous substances, and to ascertain significant human exposure levels (SHELs) for hazardous substances in the environment, and the associated acute, subacute, and chronic health effects (42 U.S.C. 9604(i)(3)); and assure the initiation of a research program to fill identified data needs associated with the substances (42 U.S.C. 9604(i)(5)). The ATSDR Minimal Risk Levels (MRLs) were developed as an initial response to the mandate. An MRL is an estimate of the amount of a chemical a person can eat, drink, or breathe each day without a detectable risk to health. MRLs are developed for health effects other than cancer. MRLs can be made for 3 different time periods [the length of time people are exposed to the chemical: acute (about 1 to 14 days), intermediate (from 15-364 days), and chronic (exposure for more than 364 days)]. It is important to note that MRLs are not intended to define clean up or action levels for ATSDR or other Agencies. (Last Updated 12/12/2022 based on <a href='https://www.atsdr.cdc.gov/mrls/pdfs/ATSDR%20MRLs%20-%20August%202022%20-%20H.pdf' target='_blank'>August 2022 release of MRL values</a>)",
          "chemicalCount" : 207,
          "updatedAt" : "2024-01-14T17:35:50Z"
        }, {
          "id" : 1024,
          "listName" : "ATSDRPROFILES",
          "label" : "ATSDR Toxicological Profiles",
          "type" : "federal",
          "shortDescription" : "Toxicological Profiles (Tox Profiles) are a unique compilation of toxicological information on a given hazardous substance. ",
          "longDescription" : "Toxicological Profiles (Tox Profiles) are a unique compilation of toxicological information on a given hazardous substance. Each peer-reviewed Tox Profile reflects a comprehensive and extensive evaluation, summary, and interpretation of available toxicological and epidemiological information on a substance. A full list of Toxicological Profiles <a href='https://www.atsdr.cdc.gov/toxprofiledocs/index.html' target='_blank'>is available online</a>.",
          "chemicalCount" : 212,
          "updatedAt" : "2021-06-15T19:29:34Z"
        }, {
          "id" : 1348,
          "listName" : "BIOSOLIDS",
          "label" : "Navigation Panel to Biosolid Lists",
          "type" : "federal",
          "shortDescription" : "Biosolids lists change over time and are versioned iteratively. This panel navigates between the various versions.",
          "longDescription" : "Biosolids lists change over time and are versioned iteratively. This panel navigates between the various versions which will be released over time. \r\nThe list of substances displayed below represents the latest iteration of biosolids (BIOSOLIDS2021 - November 2021). For the versioned lists please use the hyperlinked lists below.<br/><br/> \r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/BIOSOLIDS2021' target='_blank'>BIOSOLIDS2021 - November 2021</a><br/><br/>\r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/BIOSOLIDS2022' target='_blank'>BIOSOLIDS2022 - December 2022</a><br/><br/>",
          "chemicalCount" : 726,
          "updatedAt" : "2025-02-23T18:23:55Z"
        }, {
          "id" : 1327,
          "listName" : "BIOSOLIDS2021",
          "label" : "LIST: Chemicals in biosolids (2021)",
          "type" : "federal",
          "shortDescription" : "Chemicals detected in biosolids (nutrient-rich organic materials produced from wastewater treatment facilities) (Last Updated November 9th 2021)",
          "longDescription" : "Biosolids are a product of the wastewater treatment process. During wastewater treatment the liquids are separated from the solids. Those solids are then treated physically and chemically to produce a semisolid, nutrient-rich product known as biosolids. The terms ‘biosolids’ and ‘sewage sludge’ are often used interchangeably.  <a href='https://www.epa.gov/sites/default/files/2017-08/documents/federal-water-pollution-control-act-508full.pdf' target='_blank'>Section 405(d) of the Clean Water Act (CWA)</a> \r\n requires the United States Environmental Protection Agency (EPA) to (1) develop a regulation to establish pollutant limits and management practices to protect human health and the environment from any reasonably anticipated adverse effects of pollutants that might be present in sewage sludge; and (2) review sewage sludge regulations every two years to identify any additional pollutants that may occur in biosolids and to set regulations for pollutants identified in biosolids if sufficient scientific evidence shows they may harm human health or the environment. The regulation <a href='https://www.epa.gov/biosolids/biosolids-laws-and-regulations#standards' target='_blank'>40 CFR Part 503, Standards for the Use or Disposal of Sewage Sludge</a> \r\n, was published on February 19, 1993 (58 FR 9248). Part 503 established pollutants limits for ten metals. Since 1993, EPA has conducted eight <a href='https://www.epa.gov/biosolids/biennial-reviews-sewage-sludge-standards' target='_blank'>biennial reviews</a> \r\n and three <a href='https://www.epa.gov/biosolids/sewage-sludge-surveys' target='_blank'>national sewage sludge surveys</a> \r\n to review additional pollutants found in biosolids and assess possible exposure from those chemicals. To date, 726 chemicals have been found in biosolids. You can learn more about the curation of the list of chemical pollutants here: <a href='https://www.nature.com/articles/s41597-022-01267-9' target='_blank'>https://www.nature.com/articles/s41597-022-01267-9</a>. Concentration data is also available for 484 chemical pollutants detected in the three national sewage sludge surveys here: <a href='https://www.nature.com/articles/s41597-022-01267-9#Sec11' target='_blank'>Supplementary Information Table 4 (https://www.nature.com/articles/s41597-022-01267-9#Sec11)</a>. To view all the microbial pollutants found in biosolids see Table B-1, Chemical and Microbial Pollutants Identified in Biosolids in <a href='https://www.epa.gov/biosolids/biennial-report-no-8-reporting-period-2018-2019' target='_blank'>Biennial Review No. 8</a>. (Last Updated November 9th 2021)\r\n",
          "chemicalCount" : 726,
          "updatedAt" : "2022-10-05T22:30:53Z"
        }, {
          "id" : 1613,
          "listName" : "BIOSOLIDS2022",
          "label" : "LIST: Chemicals in biosolids (2022)",
          "type" : "federal",
          "shortDescription" : "Chemicals detected in biosolids (nutrient-rich organic materials produced from wastewater treatment facilities) (Last Updated December 21st 2022)",
          "longDescription" : "Biosolids are a product of the wastewater treatment process. During wastewater treatment the liquids are separated from the solids. Those solids are then treated physically and chemically to produce a semisolid, nutrient-rich product known as biosolids. The terms ‘biosolids’ and ‘sewage sludge’ are often used interchangeably though biosolids typically means treated sewage sludge that meet federal and state requirements and are applied to land as a soil amendment.  <a href='https://www.epa.gov/sites/default/files/2017-08/documents/federal-water-pollution-control-act-508full.pdf' target='_blank'>Section 405(d) of the Clean Water Act (CWA)</a> \r\n requires the United States Environmental Protection Agency (EPA) to (1) develop a regulation to establish pollutant limits and management practices to protect human health and the environment from any reasonably anticipated adverse effects of pollutants that might be present in sewage sludge; and (2) review sewage sludge regulations every two years to identify any additional pollutants that may occur in biosolids and to set regulations for pollutants identified in biosolids if sufficient scientific evidence shows they may harm human health or the environment. The regulation <a href='https://www.epa.gov/biosolids/biosolids-laws-and-regulations#standards' target='_blank'>40 CFR Part 503, Standards for the Use or Disposal of Sewage Sludge</a> \r\n, was published on February 19, 1993 (58 FR 9248). Part 503 established pollutants limits for ten metals. Since 1993, EPA has conducted nine <a href='https://www.epa.gov/biosolids/biennial-reviews-sewage-sludge-standards' target='_blank'>biennial reviews</a> \r\n and three <a href='https://www.epa.gov/biosolids/sewage-sludge-surveys' target='_blank'>national sewage sludge surveys</a> \r\n to identify additional pollutants found in biosolids. To date, 739 chemicals have been found in biosolids. You can learn more about the curation of the list of chemical pollutants through 2021 here: <a href='https://www.nature.com/articles/s41597-022-01267-9' target='_blank'>https://www.nature.com/articles/s41597-022-01267-9</a>. Concentration data is also available for 484 chemical pollutants detected in the three national sewage sludge surveys here: <a href='https://www.nature.com/articles/s41597-022-01267-9#Sec11' target='_blank'>Supplementary Information Table 4 (https://www.nature.com/articles/s41597-022-01267-9#Sec11)</a>. To view all the microbial pollutants found in biosolids see Appendix B, ‘Table B-3: Microbial Pollutants Identified in Biosolids’ in <a href='https://www.epa.gov/biosolids/biennial-reviews-sewage-sludge-standards' target='_blank'>Biennial Report No.9 (Reporting Period 2020-2021)</a>. (Last Updated December 21st, 2022).",
          "chemicalCount" : 739,
          "updatedAt" : "2022-12-23T00:41:26Z"
        }, {
          "id" : 1634,
          "listName" : "CCL",
          "label" : "WATER|EPA: Chemical Contaminants - Navigation Panel to Chemical Candidate Lists",
          "type" : "federal",
          "shortDescription" : "Chemical Candidate Lists are versioned iteratively and this panel navigates between the various versions.",
          "longDescription" : "The Safe Drinking Water Act (SDWA), as amended in 1996, requires the United States Environmental Protection Agency (EPA) to publish every five years a list of drinking water contaminants, known as the Contaminant Candidate List (CCL), that at the time of publication:<br/>\r\n•\tare not subject to any proposed or promulgated National Primary Drinking Water Regulation,<br/> \r\n•\tare known or anticipated to occur in public water systems (PWSs), and <br/>\r\n•\tmay require regulation under the SDWA. <br/><br/> \r\n\r\nThe CCLs provided in the CompTox dashboard are versioned iteratively and this description navigates between the various versions of the lists. The list of substances displayed below represents the latest iteration of the list (CCL 5 - November 2022) and only display the chemical contaminants. The CCL 5 PFAS list is listed separately. For the versioned lists please use the hyperlinked lists below.<br/><br/> \r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL5' target='_blank'>CCL5 - November 2022</a> This list <br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL4' target='_blank'>CCL4 - November 2016</a> <br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL3' target='_blank'>CCL3 - October 2009</a> <br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL2' target='_blank'>CCL2 - February 2005</a><br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL1' target='_blank'>CCL1 - March 1998</a><br/><br/>",
          "chemicalCount" : 93,
          "updatedAt" : "2024-10-02T12:08:40Z"
        }, {
          "id" : 1630,
          "listName" : "CCL1",
          "label" : "WATER|EPA: Chemical Contaminants - CCL 1",
          "type" : "federal",
          "shortDescription" : "The Contaminant Candidate List (CCL) is a list of contaminants that are known or anticipated to occur in public water systems. Version 1 is known as CCL 1.",
          "longDescription" : "The Contaminant Candidate List (CCL) is a list of contaminants that, at the time of publication, are not subject to any proposed or promulgated national primary drinking water regulations, but are known or anticipated to occur in public water systems. Contaminants listed on the CCL may require future regulation under the Safe Drinking Water Act (SDWA). EPA announced the <a href='https://www.epa.gov/ccl/contaminant-candidate-list-1-ccl-1' target='_blank'>first Drinking Water Contaminant Candidate List (CCL 1)</a> on March 2, 1998. The CCL Chemical Candidate Lists are versioned iteratively and this description navigates between the various versions of the lists. The list of substances displayed below represents only the chemical CCL 1 contaminants. CCL 1 includes 47 individually listed chemicals and 3 chemical groups (Alachlor ESA and other acetanilide pesticide degradation products, organotins and triazines and degradation products of triazines). The triazines group includes but is not limited to Cyanazine (CASN 21725-46-2) and atrazine-desethyl (CASN 6190-65-4). For the versioned lists, please use the hyperlinked lists below. <br/><br/> \r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL5' target='_blank'>CCL5 - November 2022</a> <br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL4' target='_blank'>CCL4 - November 2016</a><br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL3' target='_blank'>CCL3 - October 2009</a> <br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL2' target='_blank'>CCL2 - February 2005</a><br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL1' target='_blank'>CCL1 - March 1998</a> This list<br/><br/> ",
          "chemicalCount" : 50,
          "updatedAt" : "2022-10-27T09:38:03Z"
        }, {
          "id" : 1631,
          "listName" : "CCL2",
          "label" : "WATER|EPA: Chemical Contaminants - CCL 2",
          "type" : "federal",
          "shortDescription" : "The Contaminant Candidate List (CCL) is a list of contaminants that are known or anticipated to occur in public water systems. Version 2 is known as CCL 2.\r\n\r\n",
          "longDescription" : "The Contaminant Candidate List (CCL) is a list of contaminants that, at the time of publication, are not subject to any proposed or promulgated national primary drinking water regulations, but are known or anticipated to occur in public water systems. Contaminants listed on the CCL may require future regulation under the Safe Drinking Water Act (SDWA). EPA announced the <a href='https://www.epa.gov/ccl/contaminant-candidate-list-2-ccl-2' target='_blank'>second Drinking Water Contaminant Candidate List (CCL 2)</a> on February 23, 2005. The CCL Chemical Candidate Lists are versioned iteratively and this description navigates between the various versions of the lists. The list of substances displayed below represents only the chemical CCL 2 contaminants. CCL 2 includes 39 individually listed chemicals and 3 chemical groups (Alachlor ESA and other acetanilide pesticide degradation products, organotins, and triazines and degradation products of triazines). For the versioned lists, please use the hyperlinked lists below.<br/><br/> \r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL5' target='_blank'>CCL5 - November 2022</a> <br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL4' target='_blank'>CCL4 - November 2016</a><br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL3' target='_blank'>CCL3 - October 2009</a> <br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL2' target='_blank'>CCL2 - February 2005</a> This list<br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/CCL1' target='_blank'>CCL1 - March 1998</a><br/><br/> ",
          "chemicalCount" : 42,
