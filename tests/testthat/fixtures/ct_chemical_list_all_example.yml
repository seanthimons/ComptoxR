          "type" : "federal",
          "shortDescription" : "List of PFAS chemicals that meets the TSCA section 8(a)(7) rule structural definition of PFAS (Version 1: created December 6th 2023)",
          "longDescription" : "EPA promulgated a reporting and recordkeeping rule for perfluoroalkyl and polyfluoroalkyl substances (PFAS) under the <a href='https://www.govinfo.gov/content/pkg/FR-2023-10-11/pdf/2023-22094.pdf' target='_blank'> Toxic Substances Control Act (TSCA) section 8(a)(7)</a>. Any entity who has manufactured a PFAS that is a TSCA chemical substance for commercial purposes in any year since January 1, 2011, is required to submit certain information to EPA. For the purpose of this TSCA section 8(a)(7) rule, EPA defines PFAS to include at least one of these three structures: 1) R-(CF<sub>2</sub>)-CF(R’)R”, where both the CF<sub>2</sub> and CF moieties are saturated carbons; 2) R-CF<sub>2</sub>OCF<sub>2</sub>-R’, where R and R’ can either be F, O, or saturated carbons; 3) CF<sub>3</sub>C(CF<sub>3</sub>)R’R’’, where R’ and R” can either be F or saturated carbons.</br> </br>\r\nThe list below is a subset of reportable substances and includes chemicals on the EPA Comptox Chemicals Dashboard that meet this rule’s structural definition of PFAS, including chemical substances from the publicly available TSCA Inventory and Low-Volume Exemption submissions that would meet the structural definition (~10% of the total number of compounds). While this list includes substances beyond the known TSCA universe to provide as comprehensive a list as possible to potential reporting entities, it is not exhaustive and does not contain polymers or <a href='https://www.epa.gov/tsca-inventory/chemical-substances-unknown-or-variable-composition-complex-reaction-products-and' target='_blank'>UVCBs (Unknown or Variable compositions, Complex reaction products, and Biological materials)</a> which may be covered by the rule. Substances that meet the rule’s structural definition but are not found on this list may be found on the <a href='https://cdxapps.epa.gov/oms-substance-registry-services/substance-list-details/490' target='_blank'>TSCA 8(a)(7) PFAS Chemicals list in the System of Registries</a>. </br> </br>\r\nNote that the list could change as the chemicals included on the CompTox Chemicals Dashboard are expanded or otherwise as modified. Such changes will be noted and curated in a transparent manner. </br> </br>\r\n(Version 1: created December 6th 2023)\r\n",
          "chemicalCount" : 11409,
          "updatedAt" : "2024-04-24T14:48:04Z"
        }, {
