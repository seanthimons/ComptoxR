          "type" : "federal",
          "shortDescription" : "This is a list of recommended chemicals for evaluation of in vitro skin corrosion test methods  originally published in a 2004 ICCVAM performance standards document.  ",
          "longDescription" : "This is a list of recommended chemicals for evaluation of in vitro skin corrosion test methods  originally published in a 2004 ICCVAM performance standards document describing essential test method components for three types of in vitro skin corrosion test methods: membrane barrier test systems (\"MB\"), human skin model systems (\"HSM\", or transcutaneal electrical resistance test systems (\"TER\"). The original file can be downloaded from the NIEHS website at <a href='https://ice.ntp.niehs.nih.gov/downloads/casreferencelists/ICCVAM%20Skin%20Corrosion%202004.xlsx'target='_blank'>ICCVAM Skin Corrosion 2004</a><br/><br/> ",
