          "id" : 658,
          "listName" : "WRIGCHRMS",
          "label" : "WATER|NORMAN: GC-HRMS target list of the Slovak Water Research Institute",
          "type" : "other",
          "shortDescription" : "GC-HRMS target list of the Slovak Water Research Institute (WRI).",
          "longDescription" : "GC-HRMS target list of the Slovak Water Research Institute (WRI). The method was established by Agilent. The list was provided to the <a href='https://www.norman-network.com/?q=suspect-list-exchange' target='_blank'>NORMAN Suspect List Exchange</a> by Michal Kirchner (Slovak Water Research Institute, WRI) and curated by Nikiforos Alygizakis (Environmental Institute at the University of Athens)\r\n\r\n ",
          "chemicalCount" : 814,
          "updatedAt" : "2019-05-18T21:20:50Z"
        }, {
          "id" : 584,
          "listName" : "WRTMSD",
          "label" : "MASSPECDB: Wiley Registry of Tandem Mass Spectral Data, MSforID",
          "type" : "other",
          "shortDescription" : "This is a list of all the compounds contained in the \"Wiley Registry of Tandem Mass Spectral Data, MSforID\" authored by Herbert Oberacher (Institute of Legal Medicine of the Medical University of Innsbruck, Austria). Further information at www.msforid.com",
          "longDescription" : "The \"Wiley Registry of Tandem Mass Spectral Data, MSforID\" is a library of high-quality tandem mass spectral data acquired on a QqTOF instrument. Each compound has been carefully measured in a series of controlled conditions to enable accurate, reliable, and reproducible search results in a variety of settings. It is combined with a tailor-made search algorithm to create a robust and transferable identification tool. The database can be searched with data from any type of tandem mass spectrometric instrument. Compounds covered include illicit drugs, pharmaceuticals, pesticides, endogenous compounds and other small bioorganic molecules. The library has been developed by Herbert Oberacher (Institute of Legal Medicine of the Medical University of Innsbruck, Austria). More information on the library and applications are available at www.msforid.com",
          "chemicalCount" : 1429,
          "updatedAt" : "2018-11-18T20:06:19Z"
