        }, {
          "id" : 801,
          "listName" : "NISTSRM2585",
          "label" : "MASSSPEC: Standard Reference Material (SRM) 2585: Organic Contaminants in House Dust to Support Exposure Assessment Measurements",
          "type" : "other",
          "shortDescription" : "SRM 2585: Organics in House Dust is a standard reference material used for the determination of selected PAHs, PCB congeners and other chemicals in house dust and similar matrices.",
          "longDescription" : "SRM 2585: Organics in House Dust is a standard reference material provided by NIST that is intended to be used in evaluating methodology used for the determination of selected PAHs, polychlorinated biphenyl (PCB) congeners, chlorinated pesticides, and PBDE congeners in house dust and similar matrices. This list is included for the purpose of providing a list of chemicals that can potentially be detected in House Dust and includes all chemicals listed in the <a href='https://tsapps.nist.gov/srmext/certificates/2585.pdf' target='_blank'>Certificate of Analysis</a> and a series of related publications. A publication is presently in development that will deliver a more complete analysis of chemicals detected in house dust (updated August 6th 2019)\r\n\r\n",
