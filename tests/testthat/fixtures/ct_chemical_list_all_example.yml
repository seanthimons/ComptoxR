          "listName" : "PAHLIST",
          "label" : "CATEGORY: Polycyclic Aromatic Hydrocarbons collection",
          "type" : "other",
          "shortDescription" : "List of polycyclic aromatic hydrocarbons",
          "longDescription" : "Polycyclic aromatic hydrocarbons (PAHs) are a class of chemicals that occur naturally in coal, crude oil, and gasoline. They also are produced when coal, oil, gas, wood, garbage, and tobacco are burned. PAHs generated from these sources can bind to or form small particles in the air. High-temperature cooking will form PAHs in meat and in other foods. Naphthalene is a PAH that is produced commercially in the United States to make other chemicals and mothballs. Cigarette smoke contains many PAHs. This list is a REPRESENTATIVE list only of PAHs as there are thousands that have been reported in the literature.",
