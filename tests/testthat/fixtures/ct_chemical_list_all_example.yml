          "type" : "federal",
          "shortDescription" : "PFAS chemicals included in EPA’s expanded ToxCast chemical inventory found to be insoluble in DMSO above 5mM.",
          "longDescription" : "Per- and Polyfluoroalkyl Substances (PFASs) in EPA’s expanded ToxCast chemical inventory that were determined to be insoluble in DMSO above 5mM concentration. These PFAS chemicals were successfully procured from commercial suppliers (with a small number provided by National Toxicology Program partners) but deemed unsuitable for testing due to limited DMSO solubility. For a complete list of solubilized PFAS in EPA’s inventory, see <a href='EPAPFASINV' target='_blank'>https://comptox.epa.gov/dashboard/chemical_lists/EPAPFASINV</a>\r\n",
