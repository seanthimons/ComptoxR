          "type" : "other",
          "shortDescription" : "The Wassenaar Arrangement is an international framework that was established with the objective of “promoting transparency and greater responsibility in transfers of conventional arms and dual-use goods and technologies.”",
          "longDescription" : "The Wassenaar Arrangement is an international framework that was established with the objective of “promoting transparency and greater responsibility in transfers of conventional arms and dual-use goods and technologies.”\r\n\r\nWithin its Munitions List 7 (ML7), the Wassenaar Arrangement features chemical agents, biological agents, riot control agents, radioactive materials, related equipment, components, and materials.\r\n\r\nThis data collection is sourced from the <a href='https://costanziresearch.com/cw-nonproliferation/cw-control-lists/wassenaar-ml7/' target='_blank'>Constanzi Research group</a>.",
