          "type" : "other",
          "shortDescription" : "COSMOS - Integrated in silico models for the prediction of human repeated-dose toxicity of COSMetics to Optimize Safety",
          "longDescription" : "COSMOS was a unique collaboration addressing the safety assessment needs of the cosmetics industry, without the use of animals. The main aim of COSMOS was to develop freely available tools and workflows to predict the safety to humans following the use of cosmetic ingredients. The project ran from January 2011 - December 2015.\r\n\r\nMajor results and links to the legacy tools are available from the <a href='http://www.cosmostox.eu/' target='_blank'>COSMOS website</a>.\r\n\r\nThis is a partial listing and data curation is presently ongoing.",
