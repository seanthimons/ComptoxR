        }, {
          "id" : 814,
          "listName" : "PESTINERTS",
          "label" : "PESTICIDES|EPA: List of Inert Ingredients Food and Nonfood Use UPDATED 10/25/2019",
          "type" : "other",
          "shortDescription" : "List of Inert Ingredients Food and Nonfood Use UPDATED 10/25/2019",
          "longDescription" : "Inert pesticide ingredients, Food and Nonfood use, <a href='https://www.epa.gov/pesticide-registration/inert-ingredients-overview-and-guidance#food' target='_blank'> as defined by EPA</a> are those inert ingredients approved for use in pesticide products applied to food that have either tolerances or tolerance exemptions in the Code of Federal Regulations (CFR), 40 CFR part 180 (the majority are found in sections 180.910 – 960), or where no residues are found in food.\r\n\r\nA related list is the <a href='https://comptox.epa.gov/dashboard/chemical_lists/PESTACTIVES' target='_blank'>List of Pesticide Actives</a>.\r\n\r\n\r\n",
