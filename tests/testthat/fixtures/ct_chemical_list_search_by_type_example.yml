          "longDescription" : "This is a partial list of the 599 additives in cigarettes submitted to the United States Department of Health and Human Services in April 1994. It applies, as documented, only to American manufactured cigarettes intended for distribution within the United States by the listed companies. The five major tobacco companies that reported the information were:\r\n\r\nAmerican Tobacco Company\r\nBrown and Williamson\r\nLiggett Group, Inc.\r\nPhilip Morris Inc.\r\nR.J. Reynolds Tobacco Company\r\n\r\nThe data were sourced from Wikipedia at <a href='https://en.wikipedia.org/wiki/List_of_additives_in_cigarettes' target='_blank'>https://en.wikipedia.org/wiki/List_of_additives_in_cigarettes</a>",
