          "listName" : "COMPARA",
          "label" : "ARTICLE: Collaborative Modeling Project for Androgen Receptor Activity (COMPARA)",
          "type" : "other",
          "shortDescription" : "COMPARA: A list related to the publication (in review), the \"Collaborative Modeling Project for Androgen Receptor Activity (CoMPARA)\" which follows on from the Collaborative Estrogen Receptor Activity Prediction Project (CERAPP)",
          "longDescription" : "In support of the <a href='https://www.epa.gov/endocrine-disruption/endocrine-disruptor-screening-program-edsp-overview' target='_blank'>Endocrine Disruptor Screening Program</a>, the U.S. Environmental Protection Agency (EPA) led two worldwide consortiums to “virtually” (i.e., in silico) screen chemicals for their potential estrogenic and androgenic activities. A publication (in review) the \"Collaborative Modeling Project for Androgen Receptor Activity (CoMPARA)\" efforts, which follows the steps of the <a href='https://ehp.niehs.nih.gov/doi/10.1289/ehp.1510267' target='_blank'>Collaborative Estrogen Receptor Activity Prediction Project (CERAPP)</a>. This CoMPARA list of screened chemicals built upon <a href='https://comptox.epa.gov/dashboard/chemical_lists/CERAPP' target='_blank'>32,464 chemicals</a> to include additional lists of interest, as well as simulated ToxCast metabolites, totaling over 55,000 chemical structures.",
