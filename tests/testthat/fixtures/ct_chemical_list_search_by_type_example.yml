        }, {
          "id" : 1263,
          "listName" : "PFASMASTER",
          "label" : "PFAS Master List of PFAS Substances (RETIRED)",
          "type" : "other",
          "shortDescription" : "PFASMASTER HAS BEEN RETIRED - see details in the list description",
          "longDescription" : "THIS LIST HAS BEEN RETIRED IN FAVOR OF TWO SEPARATE LISTS - <a href='https://comptox.epa.gov/dashboard/chemical-lists/PFASSTRUCT' target='_blank'>PFASSTRUCT</a> (EXPLICIT STRUCTURES) AND <a href='https://comptox.epa.gov/dashboard/chemical-lists/PFASDEV' target='_blank'>PFASDEV</a> (UVCB CHEMICALS). Always refer to the latest version of the list for the most up to date data, especially as curation efforts may have corrected chemicals previously classed as PFAS to non-PFAS.<br/> \r\n************RETIRED***********<br/> \r\nPFASMASTER is a consolidated list of PFAS substances spanning and bounded by the below lists of current interest to researchers and regulators worldwide. For all available lists on the dashboard view <a href='https://comptox.epa.gov/dashboard/chemical_lists/?search=pfas' target='_blank'>these search results</a>.<br/> \r\n\r\nPer- and polyfluorinated alkyl substances (PFAS) represent a growing, increasingly diverse inventory of chemicals of interest to the general public, scientific researchers, and regulatory agencies world-wide. Accompanying data-gathering, testing, and environmental monitoring exercises, in turn, have led to the publication and sharing of various lists of PFAS chemicals, some exceeding several thousand substances. A major effort was undertaken by EPA researchers within the National Center for Computational Toxicology to curate and structure-annotate several public lists in DSSTox. The below list of registered PFAS lists, from within and outside EPA, encompass PFAS of potential interest based on environmental occurrence (through literature reports and analytical detection) and manufacturing process data, as well as lists of PFAS chemicals procured for testing within EPA research programs. The consolidated list contains a number of PFAS CAS-name substances, with a subset represented with defined chemical structures. There is no precisely clear definition of what constitutes a PFAS substance given the inclusion of partially fluorinated substances, polymers, and ill-defined reaction products on these various lists. Hence, PFASMASTER serves as a consolidated list of substances spanning and bounded by the below lists, defining a practical boundary of PFAS chemical space (within DSSTox) of current interest to researchers and regulators worldwide. This PFAS Master List will continue to expand as component lists grow. (Last Updated: August 10th 2021)\r\n <br></option><br/> \r\n <a href='EPAPFASRL' target='_blank'>https://comptox.epa.gov/dashboard/chemical_lists/EPAPFASRL</a> is an EPA research list of PFAS compiled from various internal, literature and public sources.\r\n <br/><br/> \r\n <a href='EPAPFASINV' target='_blank'>https://comptox.epa.gov/dashboard/chemical_lists/EPAPFASINV</a> is a complete list of DMSO-solubilized PFAS in EPA's ToxCast inventory.\r\n <br/><br/> \r\n <a href='EPAPFAS75S1' target='_blank'>https://comptox.epa.gov/dashboard/chemical_lists/EPAPFAS75S1</a> list is a prioritized subset of this larger chemical inventory. \r\n <br/><br/> \r\n <a href='EPAPFASINSOL' target='_blank'>https://comptox.epa.gov/dashboard/chemical_lists/EPAPFASINSOL</a> is a list of chemicals procured, but found to be insoluble in DMSO above 5mM. \r\n <br/><br/> \r\n <a href='PFASOECD' target='_blank'>https://comptox.epa.gov/dashboard/chemical_lists/PFASOECD</a> is a list of PFAS chemicals in the OECD New Comprehensive Global Database. \r\n <br/><br/> \r\n <a href='PFASKEMI' target='_blank'>https://comptox.epa.gov/dashboard/chemical_lists/PFASKEMI</a> is a list of PFAS chemicals from a KEMI Swedish Chemicals Agency Report (provided by Stellan Fischer). \r\n <br/><br/> \r\n <a href='PFASTRIER' target='_blank'>https://comptox.epa.gov/dashboard/chemical_lists/PFASTRIER</a> is a list of PFAS compiled by a community effort in 2015.\r\n <br/><br/> <a href=' EPAPFASCAT ' target='_blank'>https://comptox.epa.gov/dashboard/chemical_lists/EPAPFASCAT</a>  is a  list of structure-based Markush PFAS categories (capabilities under development). \r\n <br/><br/> <a href=' PFASSTRUCT ' target='_blank'>https://comptox.epa.gov/dashboard/chemical_lists/PFASSTRUCT</a>  is a  list of all PFAS structures containing a specific defined substructures.<br/>\r\n <br/><br/> <a href=' PFASDEV1 ' target='_blank'>https://comptox.epa.gov/dashboard/chemical_lists/PFASDEV1</a> is a list of PFAS chemicals without explicit structures - polymers and other UVCB chemicals.<br/>\r\n\r\n************RETIRED***********\r\n\r\n",
          "chemicalCount" : 12039,
          "updatedAt" : "2025-09-10T08:51:34Z"
