        }, {
          "id" : 410,
          "listName" : "DRUGBANK",
          "label" : "CATEGORY|PHARMACEUTICALS: DrugBank database from the University of Alberta",
          "type" : "other",
          "shortDescription" : "The DrugBank database combines detailed drug (i.e. chemical, pharmacological and pharmaceutical) data with comprehensive drug target (i.e. sequence, structure, and pathway) information. ",
          "longDescription" : "The <a href='https://www.drugbank.ca/' target='_blank'>DrugBank database</a> is a unique bioinformatics and cheminformatics resource that combines detailed drug (i.e. chemical, pharmacological and pharmaceutical) data with comprehensive drug target (i.e. sequence, structure, and pathway) information. The database contains 9591 drug entries including 2037 FDA-approved small molecule drugs, 241 FDA-approved biotech (protein/peptide) drugs, 96 nutraceuticals and over 6000 experimental drugs. Additionally, 4661 non-redundant protein (i.e. drug target/enzyme/transporter/carrier) sequences are linked to these drug entries. Each DrugCard entry contains more than 200 data fields with half of the information being devoted to drug/chemical data and the other half devoted to drug target or protein data.\r\n\r\n",
