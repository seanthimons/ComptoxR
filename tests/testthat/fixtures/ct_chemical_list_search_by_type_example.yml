          "label" : "LIST: Synthetic cannabinoids and psychoactive compounds",
          "type" : "other",
          "shortDescription" : "List of synthetic cannabinoids and psychoactive compounds assembled from public resources.",
          "longDescription" : "A psychoactive drug, psychopharmaceutical, or psychotropic is a chemical substance that changes brain function and results in alterations in perception, mood, consciousness, cognition, or behavior. Synthetic cannabinoids are a class of molecules that bind to cannabinoid receptors in the body (the same receptors to which THC and CBD attach, which are cannabinoids in cannabis plants). Synthetic cannabinoids are also designer drugs that are often sprayed onto plant matter. This combined list is assembled from Wikipedia, public databases, and scientific literature. It remains under constant development and will update with every release of the dashboard.",
