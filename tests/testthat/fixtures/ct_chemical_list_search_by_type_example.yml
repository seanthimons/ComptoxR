          "listName" : "CASMI2012",
          "label" : "MASSSPEC: CASMI2012",
          "type" : "other",
          "shortDescription" : "The 2012 Critical Assessment of Small Molecules (CASMI) contest dataset",
          "longDescription" : "The Critical Assessment of Small Molecules (CASMI) contests were initiated in 2012 to provide a means to evaluate compound identification tools on standardized sets of MS/MS data. In the publication “Revisiting Five Years of CASMI Contests with EPA Identification Tools” by McEachran et al, compound identification was performed on all 5 CASMI contest datasets using Dashboard tools and data in order to critically evaluate Dashboard performance relative to that of other applications. CASMI data were accessed via <a href='http://casmi-contest.org/' target='_blank'>http://casmi-contest.org/</a> and processed for use in our spectral matching and identification workflow. We conducted an in-depth review of the CASMI structure sets which sometimes resulted in edits to structures as described in the publication and we are providing these edited datasets via the Dashboard as reference data. This is the CASMI2012 dataset",
