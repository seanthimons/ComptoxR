          "listName" : "NAKNOWBASE",
          "label" : "EPA: NaKnowBase Nanomaterials Knowledgebase",
          "type" : "other",
          "shortDescription" : "The EPA Nanomaterials Knowledgebase- NaKnowBase (NKB) contains information relevant to the Engineered Nanomaterials (ENMs).",
          "longDescription" : "The EPA Nanomaterials Knowledgebase- NaKnowBase (NKB) contains a full list of materials obtained from published ORD research relevant to the potential environmental and biological actions of Engineered Nanomaterials (ENMs). The Nanomaterial-ID file maps DSSTox substance records to the most current list of ENMs (last updated 12/14/20). The Nanomaterial-ID is a current snapshot of all NKB-documented ENMs. A detailed description of EPA's chemical management system and the DSSTox curation associated with chemical registration and mapping of the Nanomaterial-ID file is described in the article <a href='https://www.nature.com/articles/s41597-021-01098-0' target='_blank'>An EPA database on the effects of engineered nanomaterials-NaKnowBase</a>.\r\n",
