          "type" : "other",
          "shortDescription" : "The PlastChem database comprehensively synthesizes the state of the science on plastic chemicals, including their hazard properties, and their presence in polymers.",
          "longDescription" : "The PlastChem database comprehensively synthesizes the state of the science on plastic chemicals, including their hazard properties, and their presence in polymers. Objectives of the PlastChem project include:\r\n\r\n1) Compiling a thorough overview of all known plastic chemicals.\r\n2) Identifying plastic chemicals of concern and linking them to specific polymers.\r\n3) Prioritizing plastic chemicals based on hazard, and other scientific, regulatory, and market data.\r\n4) Synthesizing scientific evidence to guide informed policy development.\r\n\r\nKey activities of the project include consolidating data on over 15 000 plastic chemicals from various sources, compiling hazard and other information, and identifying and prioritizing plastic chemicals and polymers of concern. ",
