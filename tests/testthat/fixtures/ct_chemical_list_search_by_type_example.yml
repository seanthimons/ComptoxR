          "listName" : "SYNTHCANNAB",
          "label" : "LIST: Synthetic cannabinoids",
          "type" : "other",
          "shortDescription" : "A list of synthetic cannabinoids assembled from public resources.",
          "longDescription" : "Synthetic cannabinoids are a class of molecules that bind to cannabinoid receptors in the body (the same receptors to which THC and CBD attach, which are cannabinoids in cannabis plants). Synthetic cannabinoids are also designer drugs that are often sprayed onto plant matter.They are typically consumed through smoking, although more recently they have been consumed in a concentrated liquid form. They have been marketed as herbal incense, or “herbal smoking blends” and sold under common names like Spice,and Synthetic Marijuana. This list is assembled from Wikipedia, public databases, and scientific literature. It remains under constant development and will update with every release of the dashboard.",
