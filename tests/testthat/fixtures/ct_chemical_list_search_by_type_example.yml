          "id" : 979,
          "listName" : "HTTKHUMANv1",
          "label" : "EPA|HTTK: Chemicals with human in vitro measured toxicokinetic data (Version 1) ",
          "type" : "other",
          "shortDescription" : "List of chemicals available for toxicokinetic prediction in the R package “httk” (version 1)",
          "longDescription" : "These chemicals are available for toxicokinetic prediction in the <a href='https://cran.r-project.org/web/packages/httk/'>R package \"httk\"</a>. Each chemical has experimentally-measured hepatic metabolic clearance and plasma protein binding data. These data have been either curated from the literature or measured by EPA, its contractors, and collaborators. These data, along with physicochemical properties, can be used to make chemical-specific predictions with the suite of generic toxicokinetic models offered by “httk”. “httk” includes a <a href='https://doi.org/10.1016/j.envint.2017.06.004'>population variability simulator that draws from NHANES biometrics</a> and allows for <a href='http://dx.doi.org/10.18637/jss.v079.i04'>in vitro-to-in vivo (IVIVE) extrapolation of high throughput screening data</a>. This list is for HTTK v2.0.3. (Version 1: Last Updated 8/24/2020)",
          "chemicalCount" : 1016,
          "updatedAt" : "2025-02-03T14:09:10Z"
        }, {
          "id" : 2197,
          "listName" : "HTTKHUMANv2",
          "label" : "EPA|HTTK: Chemicals with human in vitro measured toxicokinetic data (Version 2)",
          "type" : "other",
          "shortDescription" : "List of chemicals available for toxicokinetic prediction in the R package “httk” (version 2)\r\n",
          "longDescription" : "These chemicals are available for toxicokinetic prediction in the  <A HREF=https://cran.r-project.org/web/packages/httk/>R package httk</A>. Each chemical has experimentally-measured hepatic metabolic clearance and plasma protein binding data. These data have been either curated from the literature or measured by EPA, its contractors, and collaborators. These data, along with physicochemical properties, can be used to make chemical-specific predictions with the suite of generic toxicokinetic models offered by “httk”. “httk” includes a <A HREF=https://doi.org/10.1016/j.envint.2017.06.004>population variability simulator that draws from NHANES biometrics</A> and allows for <A HREF=https://doi.org/10.1080/17425255.2021.1935867>in vitro-to-in vivo (IVIVE) extrapolation of high throughput screening data</A>. This list is for HTTK v2.5.0. (Version 2: Last updated 2/3/2025)",
