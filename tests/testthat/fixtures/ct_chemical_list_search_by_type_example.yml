          "id" : 807,
          "listName" : "WORMJAM",
          "label" : "LIST: WormJam: C. elegans metabolic reconstruction",
          "type" : "other",
          "shortDescription" : "WormJam: community effort for a unified C. elegans metabolic reconstruction",
          "longDescription" : "WormJam (short for Worm Jamboree) is being established as a platform for a community effort towards reconciliation of existing and expansion of the unified C. elegans metabolic reconstruction as described in \"WormJam: A consensus C. elegans Metabolic Reconstruction and Metabolomics Community and Workshop Series\"(<a href='https://www.tandfonline.com/doi/full/10.1080/21624054.2017.1373939' target='_blank'>https://www.tandfonline.com/doi/full/10.1080/21624054.2017.1373939</a>). With the increasing recognition of metabolism as being of pivotal importance for ageing, development, disease mechanisms as well as evolution, the availability of a community-driven consensus reconstruction of C. elegans metabolism will lay the foundation for bringing C. elegans to the forefront of metabolism research. This is a PARTIAL set of the full list of chemicals archived at  \r\n<a href='https://doi.org/10.5281/zenodo.3403364'target='_blank'>https://doi.org/10.5281/zenodo.3403364</a>",
