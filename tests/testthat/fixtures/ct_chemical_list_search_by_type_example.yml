          "longDescription" : "Pharmaceuticals marketed in Luxembourg, as published by d'Gesondheetskeess (<a href='https://cns.public.lu/fr.html' target='_blank'>CNS, la caisse nationale de santé</a>), mapped by name to structures using CompTox by R. Singh et al. (in prep.). List downloaded from <a href='https://cns.public.lu/en/legislations/textes-coordonnes/liste-med-comm.html' target='_blank'>https://cns.public.lu/en/legislations/textes-coordonnes/liste-med-comm.html</a>. Hosted by the <a href='https://www.norman-network.com/nds/SLE/' target='_blank'>NORMAN Suspect List Exchange</a>, dataset DOI: <a href='https://zenodo.org/record/4587356#.YGWzlq9Kg2w' target='_blank'>10.5281/zenodo.458735</a>",
