          "id" : 1259,
          "listName" : "FORMALDEHYDER",
          "label" : "List of formaldehyde releasers, formaldehyde donors or formaldehyde-releasing chemicals",
          "type" : "other",
          "shortDescription" : "List of formaldehyde releasers, formaldehyde donors or formaldehyde-releasing preservative is a chemical compound that slowly releases formaldehyde.",
          "longDescription" : "A formaldehyde releaser, formaldehyde donor or formaldehyde-releasing preservative is a chemical compound that slowly releases formaldehyde. \r\n\r\nFormaldehyde-releasers are added to prevent microbial growth and extend shelf life. They are found in cosmetics, toiletries, cleaning agents, adhesives, paints, lacquers and metalworking fluids.\r\n\r\nFormaldehyde‐releasers can be further defined as:\r\n\r\nSubstances that release formaldehyde as a result of decomposition\r\nChemicals synthesized from formaldehyde that may still contain residues of free formaldehyde such as melamine/formaldehyde and urea‐formaldehyde resins.\r\n\r\nData were extracted from various sources and peer reviewed publications [<a href=' https://doi.org/10.1111/j.1600-0536.2009.01582.x' target='_blank'>1</a>].\r\n\r\n",
          "chemicalCount" : 36,
          "updatedAt" : "2021-08-10T12:36:46Z"
        }, {
          "id" : 768,
          "listName" : "FRACFOCUS",
          "label" : "FRACFOCUS Chemical Disclosure Registry",
          "type" : "other",
          "shortDescription" : "FracFocus is the national hydraulic fracturing chemical registry. ",
          "longDescription" : "FracFocus is the national hydraulic fracturing chemical registry. \r\n\r\nFracFocus is managed by the Ground Water Protection Council and Interstate Oil and Gas Compact Commission, two organizations whose missions both revolve around conservation and environmental protection. \r\n\r\nThe site was created to provide the public access to reported chemicals used for hydraulic fracturing within their area. To help users put this information into perspective, the site also provides objective information on hydraulic fracturing, the chemicals used, the purposes they serve and the means by which groundwater is protected.",
          "chemicalCount" : 40,
          "updatedAt" : "2019-11-16T10:14:55Z"
        }, {
          "id" : 1387,
          "listName" : "FRFULLLIST",
          "label" : "CATEGORY: Flame Retardants - US CPSC/US EPA Flame Retardant Inventory",
          "type" : "other",
          "shortDescription" : "Joint US Consumer Product Safety Commission (CPSC)-US Environmental Protection Agency (EPA) Flame Retardant Inventory",
          "longDescription" : "Joint US Consumer Product Safety Commission (CPSC)-US Environmental Protection Agency (EPA) Flame Retardant Inventory: potential Flame Retardant substances identified from publicly-available materials. This encompasses EPA/CPSC reports, published literature, as well as publicly available information from manufacturers. For more information on the collection and curation process see the published article [Nature Scientific Data DOI will be inserted when available] and the published dataset [Figshare DOI for final dataset will be inserted when available].<br/> \r\n\r\nOther curated lists based on the flame retardancy of these substances are available as listed below:<br/>\r\n\r\n<b>Likely Flame Retardants</b>: A subset of the Joint US CPSC-US EPA Flame Retardant Inventory of substances that have undergone review by a panel of experts and have been identified as being likely flame retardants. In addition to expert opinion, substances’ flame retardancy were predicted with Quantitative Structure-Use Relationships (see <a href='https://doi.org/10.1039/C6GC02744J' target='_blank'>Phillips, et al, 2017</a> for more information on this methodology). The list is available <a href='https://comptox.epa.gov/dashboard/chemical-lists/FRLIKELY' target='_blank'>here</a>. <br/>\r\n\r\n<b>Likely Organohalogen Flame Retardants</b>: A subset of the Join US CPSC-US EPA Flame Retardant Inventory of substances that have undergone review by a panel of experts and have been identified as being likely organohalogen flame retardants (i.e., substances that are likely flame retardants and have at least one Carbon-Halogen bond). In addition to expert opinion, substances’ flame retardancy and organohalogen structure were bolstered by use of Quantitative Structure-Use Relationships (see <a href='https://doi.org/10.1039/C6GC02744J' target='_blank'>Phillips, et al, 2017</a> for more information on this methodology). The list is available <a href='https://comptox.epa.gov/dashboard/chemical-lists/OFRLIKELY' target='_blank'>here</a>. <br/>",
          "chemicalCount" : 797,
          "updatedAt" : "2022-04-07T15:11:30Z"
        }, {
          "id" : 1388,
          "listName" : "FRLIKELY",
          "label" : "CATEGORY: Likely Flame Retardants - Partial subset of the US CPSC/US EPA Flame Retardant Inventory",
          "type" : "other",
          "shortDescription" : "Joint US Consumer Product Safety Commission (CPSC)-US Environmental Protection Agency (EPA) partial subset of <b>Likely Flame Retardants</b> from the Flame Retardant Inventory",
          "longDescription" : "<b>Likely Flame Retardants</b>: A subset of the Joint US CPSC-US EPA Flame Retardant Inventory of substances that have undergone review by a panel of experts and have been identified as being likely flame retardants. In addition to expert opinion, substances’ flame retardancy were predicted with Quantitative Structure-Use Relationships (see <a href='https://doi.org/10.1039/C6GC02744J' target='_blank'>Phillips, et al, 2017</a> for more information on this methodology). <br/>\r\n\r\nOther curated lists based on the flame retardancy of these substances are available as listed below:<br/>\r\n\r\n<b>Full Flame Retardant Inventory</b>: Joint US Consumer Product Safety Commission (CPSC)-US Environmental Protection Agency (EPA) Flame Retardant Inventory: potential Flame Retardant substances identified from publicly-available materials. This encompasses EPA/CPSC reports, published literature, as well as publicly available information from manufacturers. For more information on the collection and curation process see the published article [Nature Scientific Data DOI will be inserted when available] and the published dataset [Figshare DOI for final dataset will be inserted when available]. The list is available <a href='https://comptox.epa.gov/dashboard/chemical-lists/FRFULLLIST' target='_blank'>here</a>.<br/>\r\n\r\n<b>Likely Organohalogen Flame Retardants</b>: A subset of the Join US CPSC-US EPA Flame Retardant Inventory of substances that have undergone review by a panel of experts and have been identified as being likely organohalogen flame retardants (i.e., substances that are likely flame retardants and have at least one Carbon-Halogen bond). In addition to expert opinion, substances’ flame retardancy and organohalogen structure were bolstered by use of Quantitative Structure-Use Relationships (see <a href='https://doi.org/10.1039/C6GC02744J' target='_blank'>Phillips, et al, 2017</a> for more information on this methodology). The list is available <a href='https://comptox.epa.gov/dashboard/chemical-lists/OFRLIKELY' target='_blank'>here</a>. <br/>",
