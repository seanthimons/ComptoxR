          "type" : "other",
          "shortDescription" : "HBM4EU CECscreen is a suspect screening list for Chemicals of Emerging Concern (CECs) plus metadata and predicted Phase 1 metabolites",
          "longDescription" : "HBM4EU CECscreen is a suspect screening list for Chemicals of Emerging Concern (CECs) plus metadata and predicted Phase 1 metabolites; this list contains the CECs only. CECScreen is part of the <a href='https://www.hbm4eu.eu' target='_blank'>HBM4EU</a> project (coord. UBA) > WP16 \"emerging chemicals\" (lead INRA, JP Antignac/L Debrauwer) > Task 16.1 (lead IRAS, J Vlanderen / R Vermeulen) > Main contributor (J Meijer) > Involved Partners (M Lamoree, T Hamers, S Hutinet, A, Covaci, C Huber, M Krauss, DI Walker, EL Schymanski) and hosted on the <a href='https://www.norman-network.com/nds/SLE' target='_blank'>NORMAN Suspect List Exchange</a>.Further details in Meijer et al (2021) DOI: <a href='https://doi.org/10.1016/j.envint.2021.106511' target='_blank'>10.1016/j.envint.2021.106511</a>. Dataset DOI: <a href='https://doi.org/10.5281/zenodo.3956586' target='_blank'>10.5281/zenodo.3956586</a>.\r\n\r\n\r\n",
