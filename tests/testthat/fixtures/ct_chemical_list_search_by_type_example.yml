          "longDescription" : "This dataset is designed to provide an entry point for users to contribute transformation products and reactions documented in the literature to the NORMAN Suspect List Exchange (<a href='https://www.norman-network.com/nds/SLE/' target='_blank'>https://www.norman-network.com/nds/SLE/</a>) for addition to open resources such as the NORMAN SLE, CompTox and PubChem. Dataset DOI: <a href='https://doi.org/10.5281/zenodo.4318838' target='_blank'>10.5281/zenodo.4318838</a>\r\n\r\n\r\n\r\n",
