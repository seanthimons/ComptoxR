          "label" : "PFAS|EPA PFAS chemicals without explicit structures",
          "type" : "other",
          "shortDescription" : "List of PFAS chemicals without explicit structures - polymers and other UVCB chemicals",
          "longDescription" : "List of PFAS chemicals without explicit structures - polymers and other UVCB chemicals. The list was assembled by searching on the following substring list: Perfluoro, Polyfluoro, Fluoroethylene, Fluoropropylene, Fluorobutene, Fluoropolymer, \"Ethene, 1,1,2,2-tetrafluoro\" (the PTFE monomer unit), Chlorotrifluoroethylene, Difluoromethylene, Vinyl fluoride, Tetrafluoro, Pentafluoro, Hexafluoro, Heptafluoro, Octafluoro, Nonafluoro and Decafluoro and filtering out distinct chemical structures. This will retain Markush structure representations. This list remains under constant curation and expansion. <br/><br/>\r\n\r\nLast Updated (November 22nd 2024).  For the versioned lists please use the hyperlinked lists below.<br/><br/>\r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/PFASDEV4' target='_blank'>PFASDEV4 - November 22nd 2024</a> This list <br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/PFASDEV3' target='_blank'>PFASDEV3 - March 23rd 2024<br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/PFASDEV2' target='_blank'>PFASDEV2 - August 8th 2021</a> <br/><br/>\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/PFASDEV1' target='_blank'>PFASDEV1 - September 16th 2020</a> <br/><br/>\r\n\r\n",
