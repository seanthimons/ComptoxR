          "longDescription" : "Rosin is a solid form of resin obtained from pines and some other plants, mostly conifers. Rosin is an ingredient in printing inks, photocopying and laser printing paper, varnishes, adhesives (glues), soap, paper sizing, soda, soldering fluxes, and sealing wax. Rosin can be used as a glazing agent in medicines and chewing gum.",
