          "longDescription" : "A pyrethroid is an organic compound similar to the natural pyrethrins produced by the flowers of pyrethrums (Chrysanthemum cinerariaefolium and C. coccineum). Pyrethroids constitute the majority of commercial household insecticides (a sub-class of pesticides).",
          "chemicalCount" : 25,
