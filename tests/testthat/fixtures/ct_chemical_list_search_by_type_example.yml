          "id" : 664,
          "listName" : "VOLATILOME",
          "label" : "LIST: VOLATILOME: Human Breath",
          "type" : "other",
          "shortDescription" : "A subset of compounds detected in human breath",
          "longDescription" : "This list is a subset of compounds detected in human breath and reported in the peer-reviewed literature and identified in experimental work at US-EPA. The bulk of the collection is extracted from the articles \"The human volatilome: volatile organic compounds (VOCs) in exhaled breath, skin emanations, urine, feces and saliva\" by Amman et al (<a href='http://dx.doi.org/10.1088/1752-7155/8/3/034001' target='_blank'>DOI:10.1088/1752-7155/8/3/034001</a>), from the review \"A review of the volatiles from the healthy human body\" by de Lacy Costello et al (<a href='http://dx.doi.org/10.1088/1752-7155/8/1/014001' target='_blank'>DOI:10.1088/1752-7155/8/1/014001</a>) and from the article \"On-line analysis of exhaled breath\", by Bruderer et al (<a href='http://dx.doi.org/10.1021/acs.chemrev.9b00005' target='_blank'>DOI:10.1021/acs.chemrev.9b00005</a>) as well as an increasing number of chemicals identified in our own laboratory studies.",
