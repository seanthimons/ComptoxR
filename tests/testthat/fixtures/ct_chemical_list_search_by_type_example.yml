          "type" : "other",
          "shortDescription" : "The ChemSEC SIN List is a list of hazardous chemicals that are used in a wide variety of articles, products and manufacturing processes around the globe.",
          "longDescription" : "The ChemSEC SIN List is a list of hazardous chemicals that are used in a wide variety of articles, products and manufacturing processes around the globe. The SIN abbreviation – Substitute It Now – implies that these chemicals should be removed as soon as possible as they pose a threat to human health and the environment.\r\n\r\nThe SIN List is developed by the non-profit ChemSec in close collaboration with scientists and technical experts, as well as an advisory committee of leading environmental, health, consumer organisations. The list is based on credible, publicly available information from existing databases and scientific studies.",
          "chemicalCount" : 978,
          "updatedAt" : "2021-08-04T22:53:36Z"
        }, {
          "id" : 674,
          "listName" : "SLTChemDB",
          "label" : "TOBACCO|SMOKING: Database of chemical compounds present in Smokeless tobacco products (SLTChemDB)",
          "type" : "other",
          "shortDescription" : "SLTChemDB is a database of chemicals in Smokeless Tobacco",
          "longDescription" : "SLTChemDB is a Smokeless Tobacco database that makes available detailed information on various properties of chemical compounds identified across different brands of SLT products. The database was reported in  <a href=https://www.nature.com/articles/s41598-019-43559-y' target='_blank'>this article</a>. The primary information for the database was extracted through extensive literature search, which was further curated from popular chemical web servers and databases. SLTChemDB contains comprehensive information on 233 unique chemical compounds and 82 SLT products. This list is a partial collection until the next update of the dashboard.",
          "chemicalCount" : 208,
