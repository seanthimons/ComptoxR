          "longDescription" : "The PPDB is a comprehensive relational database of pesticide chemical identity, physicochemical, human health and ecotoxicological data. It was developed by the Agriculture & Environment Research Unit (AERU) at the University of Hertfordshire to support risk assessments and risk management.",
