          "listName" : "ALGALTOX",
          "label" : "LIST: Algal Toxins",
          "type" : "other",
          "shortDescription" : "A list of Algal Toxins of potential interest",
          "longDescription" : "Algal toxins do not enter the marine environment from an external source but are generated during blooms of particular naturally occurring marine algal species. Such blooms have been referred to as toxic algal blooms, harmful algal blooms (HABs) and red tides. The occurrence of blooms of these and other so-called toxic algae is perfectly natural but there are concerns that increases in the supply of essential nutrients (such as nitrogen, phosphorus) to the marine environment as a result of Man's activities may be contributing to the increased frequency and magnitude of these events.",
