        }, {
          "id" : 1389,
          "listName" : "OFRLIKELY",
          "label" : "CATEGORY: Likely Organohalogen Flame Retardants - Partial subset of the US CPSC/US EPA Flame Retardant Inventory",
          "type" : "other",
          "shortDescription" : "Joint US Consumer Product Safety Commission (CPSC)-US Environmental Protection Agency (EPA) partial subset of <b>Likely Organohalogen Flame Retardants</b> from the Flame Retardant Inventory",
          "longDescription" : "<b>Likely Organohalogen Flame Retardants</b>: A subset of the Join US CPSC-US EPA Flame Retardant Inventory of substances that have undergone review by a panel of experts and have been identified as being likely organohalogen flame retardants (i.e., substances that are likely flame retardants and have at least one Carbon-Halogen bond). In addition to expert opinion, substances’ flame retardancy and organohalogen structure were bolstered by use of Quantitative Structure-Use Relationships (see <a href='https://doi.org/10.1039/C6GC02744J' target='_blank'>Phillips, et al, 2017</a> for more information on this methodology). <br/>\r\n\r\nOther curated lists based on the flame retardancy of these substances are available as listed below:<br/>\r\n\r\n<b>Full Flame Retardant Inventory</b>: Joint US Consumer Product Safety Commission (CPSC)-US Environmental Protection Agency (EPA) Flame Retardant Inventory: potential Flame Retardant substances identified from publicly-available materials. This encompasses EPA/CPSC reports, published literature, as well as publicly available information from manufacturers. For more information on the collection and curation process see the published article [Nature Scientific Data DOI will be inserted when available] and the published dataset [Figshare DOI for final dataset will be inserted when available]. The list is available <a href='https://comptox.epa.gov/dashboard/chemical-lists/FRFULLLIST' target='_blank'>here</a>.<br/> \r\n\r\n<b>Likely Flame Retardants</b>: A subset of the Joint US CPSC-US EPA Flame Retardant Inventory of substances that have undergone review by a panel of experts and have been identified as being likely flame retardants. In addition to expert opinion, substances’ flame retardancy were predicted with Quantitative Structure-Use Relationships (see <a href='https://doi.org/10.1039/C6GC02744J' target='_blank'>Phillips, et al, 2017</a> for more information on this methodology). The list is available <a href='https://comptox.epa.gov/dashboard/chemical-lists/FRLIKELY' target='_blank'>here</a>. <br/>",
