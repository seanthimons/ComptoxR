          "longDescription" : "List of PFAS chemicals without explicit structures - polymers and other UVCB chemicals. The list was assembled by searching on the following substring list: Perfluoro, Polyfluoro, Fluoroethylene, Fluoropropylene, Fluorobutene, Fluoropolymer, \"Ethene, 1,1,2,2-tetrafluoro\" (the PTFE monomer unit), Chlorotrifluoroethylene, Difluoromethylene, Vinyl fluoride, Tetrafluoro, Pentafluoro, Hexafluoro, Heptafluoro, Octafluoro, Nonafluoro and Decafluoro and filtering out distinct chemical structures. This will retain Markush structure representations. Chemicals with matching substrings, such as sodium hexafluorosilicate (cryolite) are filtered out manually. This list remains under constant curation and expansion. <br/><br/> \r\n\r\nPlease note that curation may change the representation of a chemical in the list and, specifically, chemicals listed with no structure at some point in time may be enhanced with a structural representation. <br/><br/>\r\n\r\n(Last Updated November 22nd 2024)",
