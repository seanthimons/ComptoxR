        }, {
          "id" : 1512,
          "listName" : "CECTOYS",
          "label" : "NORMAN|Chemicals of Emerging Concern (CECs) in plastic toys",
          "type" : "other",
          "shortDescription" : "A list of Chemicals of Concern (CECs) found in plastic toys",
          "longDescription" : "A list of Chemicals of Concern (CoCs) found in plastic toys described in Aurisano et. Al. The list is categorized into four based on being included in regulatory lists of concern as well as reported hazard index (HI) and child cancer risk (CCR) based criteria. DOI: <a href='https://doi.org/10.1016/j.envint.2020.106194' target='_blank'>10.1016/j.envint.2020.106194</a>\r\nDataset DOI : <a href='https://doi.org/10.5281/zenodo.5933615' target='_blank'>10.5281/zenodo.5933615</a>. Data hosted on the <a href='https://www.norman-network.com/nds/SLE/' target='_blank'>NORMAN Suspect List Exchange</a>.\r\n",
