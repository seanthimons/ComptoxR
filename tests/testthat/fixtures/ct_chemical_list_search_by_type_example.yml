          "label" : "T3DB Toxic Exposome Database",
          "type" : "other",
          "shortDescription" : "T3DB provides mechanisms of toxicity and target proteins for each toxin.",
          "longDescription" : "The focus of the T3DB is on providing mechanisms of toxicity and target proteins for each toxin. This dual nature of the T3DB, in which toxin and toxin target records are interactively linked in both directions, makes it unique from existing databases. It is both modelled after and closely linked to the Human Metabolome Database (HMDB) and DrugBank. Potential applications of T3DB include toxin metabolism prediction, toxin/drug interaction prediction, and general toxin hazard awareness by the public, making it applicable to various fields. \r\n",
