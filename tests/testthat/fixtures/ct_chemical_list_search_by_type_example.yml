          "longDescription" : "A compiled list of PFAS occurring in NORMAN SusDat, created by merging SLE lists S9, S14, S25, S46, and S80 and searching for additional fluorinated content in SusDat. Provided by Kelsey Ng, EI (manuscript in prep.).\r\nDataset DOI: <a href=\"https://doi,org/10.5281/zenodo.5769582\" target=\"_blank\">10.5281/zenodo.5769582</a>. Data hosted on the <a href=\"http://www.norman-network.com/?q=node/236\" target=\"_blank\">NORMAN Suspect List Exchange</a>.\r\n",
