          "type" : "other",
          "shortDescription" : "Statins, also known as HMG-CoA reductase inhibitors or 3-hydroxy-3-methyl-glutaryl-coenzyme A reductase inhibitors, are a class of lipid-lowering medications.",
          "longDescription" : "Statins, also known as HMG-CoA reductase inhibitors or 3-hydroxy-3-methyl-glutaryl-coenzyme A reductase inhibitors, are a class of lipid-lowering medications. This list has been compiled from information on Wikipedia (<a href='https://en.wikipedia.org/wiki/Statin#Available_forms' target='_blank'>https://en.wikipedia.org/wiki/Statin#Available_forms</a> \r\n  ) and PubMed MeSH terms and will grow with progressive Dashboard releases. Note that a substring search for “statin” in the Dashboard will return compounds that do not necessarily fit with this definition of statin (e.g. nystatin is an antifungal agent and astatine is a radioactive chemical element). ",
