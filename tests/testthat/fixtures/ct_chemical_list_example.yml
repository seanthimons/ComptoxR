          "id" : 952,
          "listName" : "ECOTOX_v4",
          "label" : "EPA|ECOTOX: Ecotoxicology knowledgebase version 4",
          "type" : "federal",
          "shortDescription" : "ECOTOXicology knowledgebase (ECOTOX) is a comprehensive, publicly available knowledgebase providing single chemical environmental toxicity data on aquatic life, terrestrial plants and wildlife",
          "longDescription" : "The ECOTOX Knowledgebase is a comprehensive, dynamic, curated database that summarizes chemical environmental toxicity data on aquatic life, terrestrial plants, and wildlife. This publically available database includes curated data from over 47,000 publications and is updated quarterly. For more information on the ECOTOX Knowledgebase and to search the ECOTOX records, see: https://cfpub.epa.gov/ecotox/. This is the data snapshot as of June 30 2020. Curation is an ongoing process.\r\n",
