          "type" : "other",
          "shortDescription" : "This list of chemicals corresponds to chemicals with bioactivity assay data in EPA's ToxCast Database, referred to as invitrodb (v4.1 public release, September 2023)",
          "longDescription" : "This list of chemicals corresponds to chemicals with bioactivity assay data in EPA's ToxCast Database, referred to as invitrodb (v4.1 public release, Sept 2023). Invitrodb contains data for chemicals in the ToxCast and Tox21 programs, with more information available here. This list is provided as a resource to support the September 2023 version of the bioactivity data in invitrodb v4.1 and can be downloaded and cited as follows: EPA Center for Computational Toxicology and Exposure. (2023). Invitrodb version 4.1 <a href='https://doi.org/10.23645/epacomptox.6062623.v11' target='_blank'>https://doi.org/10.23645/epacomptox.6062623.v11</a>. v4.0 was a beta release of invitrodb (DOI: <a href='https://doi.org/10.23645/epacomptox.24132942.v1' target='_blank'>https://doi.org/10.23645/epacomptox.24132942.v1</a>)  to accompany <a href='https://doi.org/10.3389/ftox.2023.1275980' target='_blank'>Feshuk et al, 2023</a> and includes the same chemicals as the TOXCAST_INVITRODB_v3_5 chemical list.",
