          "longDescription" : "This list of chemicals corresponds to chemicals with bioactivity assay data in EPA's ToxCast Database, referred to as invitrodb (v3.5 public release, August 2022). Invitrodb contains data for chemicals in the ToxCast and Tox21 programs, with more information available <a href='https://www.epa.gov/chemical-research/exploring-toxcast-data-downloadable-data' target='_blank'>here</a>. This list is provided as a resource to support the August 2022 version of the bioactivity data in invitrodb v3.5 and can be downloaded and cited as follows: EPA Center for Computational Toxicology and Exposure. (2022). Invitrodb version 3.5. <a href='https://doi.org/10.23645/epacomptox.6062623.v8' target='_blank'>https://doi.org/10.23645/epacomptox.6062623.v8</a>. v4.0 was a beta release of invitrodb (DOI: <a href='https://doi.org/10.23645/epacomptox.24132942.v1' target='_blank'>10.23645/epacomptox.24132942.v1</a>) to accompany <a href='https://doi.org/10.3389/ftox.2023.1275980' target='_blank'>Feshuk et al, 2023</a> and includes the same chemicals as the TOXCAST_INVITRODB_v3_5 chemical list.\r\n",
          "chemicalCount" : 9550,
          "updatedAt" : "2023-10-27T12:11:40Z"
