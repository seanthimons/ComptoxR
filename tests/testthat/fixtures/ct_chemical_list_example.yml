        }, {
          "id" : 169,
          "listName" : "EINECS",
          "label" : "European INventory of Existing Commercial chemical Substances",
          "type" : "international",
          "shortDescription" : "European INventory of Existing Commercial chemical Substances",
          "longDescription" : "In the EU regulatory framework, Existing Chemical substances are those substances listed in EINECS (European INventory of Existing Commercial chemical Substances), an inventory of substances that were deemed to be on the European Community market between 1 January 1971 and 18 September 1981. EINECS was drawn up by the European Commission in the application of Article 13 of Directive 67/548/EEC, as amended by Directive 79/831/EEC, and in accordance with the detailed provisions of Commission Decision 81/437/EEC. In 1993 the Council adopted Council Regulation (EEC) 793/93, more commonly known as the ESR (Existing Substances Regulation), thereby introducing a comprehensive framework for the evaluation and control of existing chemical substances",
          "chemicalCount" : 37692,
          "updatedAt" : "2024-10-14T23:34:49Z"
        }, {
          "id" : 660,
          "listName" : "REACH2017",
          "label" : "NORMAN: REACH Chemicals List Provided to NORMAN Network",
          "type" : "international",
          "shortDescription" : "This REACH list of 57760 REACH chemicals from the <a href='https://www.norman-network.com/?q=suspect-list-exchange' target='_blank'>NORMAN Suspect List Exchange</a>",
          "longDescription" : "A REACH list of >68,600 REACH chemicals from the <a href='https://www.norman-network.com/?q=suspect-list-exchange' target='_blank'>NORMAN Suspect List Exchange</a> includes InChIKeys and spectral information, was provided by N. Alygizakis and J. Slobodnik (Environmental Institute at the University of Athens) and has been mapped to DTXSIDs by CAS Registry Number only (by E. Schymanski) for inclusion on the Dashboard. The total mappings is ~ 57760. Other REACH lists are undergoing curation by the Dashboard team and will be available in due course.",
          "chemicalCount" : 57758,
          "updatedAt" : "2020-06-05T15:18:04Z"
        }, {
          "id" : 844,
          "listName" : "AOPSTRESSORS",
          "label" : "List of Adverse Outcome Pathway Stressors",
          "type" : "other",
          "shortDescription" : "List of Adverse Outcome Pathway Stressors from the AOP Database",
          "longDescription" : "The EPA Adverse Outcome Pathway Database (<a href='https://cfpub.epa.gov/si/si_public_record_report.cfm?dirEntryId=340325&Lab=NHEERL' target='_blank'>AOP_DB</a>) contains a full list of AOP stressors obtained and updated from the <a href='https://aopwiki.org/' target='_blank'>AOP-Wiki</a>, which is available and updated as part of the OECD supported AOP Knowledge Base (<a href='https://aopkb.oecd.org/index.html' target='_blank'>AOP_KB</a>). The AOP-STRESSOR file maps the DSSTox substance records to the most current list of AOP stressors (last updated 2/12/2020). The AOP-STRESSOR file is a current snapshot of all AOP-Wiki-documented stressors. A detailed description of EPA's chemical management system and the DSSTox curation associated with chemical registration and mapping of the AOP-STRESSOR file is provided in the published document available for download at: <a href='https://www.nature.com/articles/s41597-021-00962-3.pdf' target='_blank'>The 2021 update of the EPA’s adverse outcome pathway database</a>",
          "chemicalCount" : 349,
          "updatedAt" : "2022-08-26T13:10:36Z"
        }, {
          "id" : 729,
          "listName" : "APCRARETRO",
          "label" : "LIST: APCRA Chemicals for Retrospective Analysis",
          "type" : "other",
          "shortDescription" : "A list related to a publication comparing point-of-departure calculations based on high-throughput predictions of bioactivity, exposure predictions, and traditional hazard information.",
          "longDescription" : "Accelerating the Pace of Chemical Risk Assessment (APCRA) is a government-to-government initiative whose aim is to promote collaboration and dialogue on the scientific and regulatory needs for the application and acceptance of “New Approach Methodologies” (NAMs) in regulatory decision making. A recent publication “<a href='https://academic.oup.com/toxsci/advance-article/doi/10.1093/toxsci/kfz201/5571376' target='_blank'>Utility of In Vitro Bioactivity as a Lower Bound Estimate of In Vivo Adverse Effect Levels and in Risk-Based Prioritization</a>” related to APCRA has compared point-of-departure based on high-throughput predictions of bioactivity, exposure predictions, and traditional hazard information for the 448 chemicals in this list. ",
          "chemicalCount" : 448,
          "updatedAt" : "2019-10-15T10:01:44Z"
