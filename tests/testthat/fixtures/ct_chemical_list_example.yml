          "id" : 706,
          "listName" : "USGSWATER",
          "label" : "WATER: USGS List of Chemicals ",
          "type" : "federal",
          "shortDescription" : "This list of chemicals are in the USGS list of chemicals in water",
          "longDescription" : "The United States Geological Survey is a scientific agency of the United States government. The scientists of the USGS study the landscape of the United States, its natural resources, and the natural hazards that threaten it. This list of chemicals are in the USGS list of chemicals in water under the <a href='https://nwis.waterdata.usgs.gov/usa/nwis/pmcodes?radio_pm_search=param_group&pm_group=Organics%2C+pesticide&pm_search=&casrn_search=&srsname_search=&format=html_table&show=parameter_group_nm&show=parameter_nm&show=casrn&show=srsname&show=parameter_units' target='_blank'> \"Parameter Code Definition\" list</a>\r\n\r\n",
