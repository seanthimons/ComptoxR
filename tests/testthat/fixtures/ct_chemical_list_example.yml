          "id" : 957,
          "listName" : "CECSCREEN",
          "label" : "METABOLITES: HBM4EU CECscreen: Screening List for Chemicals of Emerging Concern",
          "type" : "other",
          "shortDescription" : "HBM4EU CECscreen is a suspect screening list for Chemicals of Emerging Concern (CECs) plus metadata and predicted Phase 1 metabolites",
          "longDescription" : "HBM4EU CECscreen is a suspect screening list for Chemicals of Emerging Concern (CECs) plus metadata and predicted Phase 1 metabolites; this list contains the CECs only. CECScreen is part of the <a href='https://www.hbm4eu.eu' target='_blank'>HBM4EU</a> project (coord. UBA) > WP16 \"emerging chemicals\" (lead INRA, JP Antignac/L Debrauwer) > Task 16.1 (lead IRAS, J Vlanderen / R Vermeulen) > Main contributor (J Meijer) > Involved Partners (M Lamoree, T Hamers, S Hutinet, A, Covaci, C Huber, M Krauss, DI Walker, EL Schymanski) and hosted on the <a href='https://www.norman-network.com/nds/SLE' target='_blank'>NORMAN Suspect List Exchange</a>.Further details in Meijer et al (2021) DOI: <a href='https://doi.org/10.1016/j.envint.2021.106511' target='_blank'>10.1016/j.envint.2021.106511</a>. Dataset DOI: <a href='https://doi.org/10.5281/zenodo.3956586' target='_blank'>10.5281/zenodo.3956586</a>.\r\n\r\n\r\n",
          "chemicalCount" : 56377,
          "updatedAt" : "2021-03-24T08:13:12Z"
        }, {
          "id" : 431,
          "listName" : "CERAPP",
          "label" : "ARTICLE: Collaborative Estrogen Receptor Activity Prediction Project (CERAPP)",
          "type" : "other",
          "shortDescription" : "CERAPP uses predictive computational models trained on HTS data to evaluate thousands of chemicals for ER-related activity.",
          "longDescription" : "CERAPP (Collaborative Estrogen Receptor Activity Prediction Project) is a large-scale modeling project demonstrate the efficacy of using predictive computational models trained on high-throughput screening data to evaluate thousands of chemicals for ER-related activity and prioritize them for further testing. CERAPP combined multiple models developed in collaboration with 17 groups in the United States and Europe to predict ER activity of a common set of 32,464 chemical structures. Quantitative structure–activity relationship models and docking approaches were employed, mostly using a common training set of 1,677 chemical structures provided by the U.S. EPA, to build a total of 40 categorical and 8 continuous models for binding, agonist, and antagonist ER activity. All predictions were evaluated on a set of 7,522 chemicals curated from the literature. To overcome the limitations of single models, a consensus was built by weighting models on scores based on their evaluated accuracies. The work is described in this peer-reviewed publication: <a href='https://ehp.niehs.nih.gov/doi/10.1289/ehp.1510267' target='_blank'>https://ehp.niehs.nih.gov/doi/10.1289/ehp.1510267</a>",
          "chemicalCount" : 32320,
          "updatedAt" : "2025-11-18T08:03:34Z"
        }, {
          "id" : 812,
          "listName" : "COMPARA",
          "label" : "ARTICLE: Collaborative Modeling Project for Androgen Receptor Activity (COMPARA)",
          "type" : "other",
          "shortDescription" : "COMPARA: A list related to the publication (in review), the \"Collaborative Modeling Project for Androgen Receptor Activity (CoMPARA)\" which follows on from the Collaborative Estrogen Receptor Activity Prediction Project (CERAPP)",
          "longDescription" : "In support of the <a href='https://www.epa.gov/endocrine-disruption/endocrine-disruptor-screening-program-edsp-overview' target='_blank'>Endocrine Disruptor Screening Program</a>, the U.S. Environmental Protection Agency (EPA) led two worldwide consortiums to “virtually” (i.e., in silico) screen chemicals for their potential estrogenic and androgenic activities. A publication (in review) the \"Collaborative Modeling Project for Androgen Receptor Activity (CoMPARA)\" efforts, which follows the steps of the <a href='https://ehp.niehs.nih.gov/doi/10.1289/ehp.1510267' target='_blank'>Collaborative Estrogen Receptor Activity Prediction Project (CERAPP)</a>. This CoMPARA list of screened chemicals built upon <a href='https://comptox.epa.gov/dashboard/chemical_lists/CERAPP' target='_blank'>32,464 chemicals</a> to include additional lists of interest, as well as simulated ToxCast metabolites, totaling over 55,000 chemical structures.",
          "chemicalCount" : 55938,
          "updatedAt" : "2024-04-01T10:24:42Z"
