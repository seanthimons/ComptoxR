        }, {
          "id" : 572,
          "listName" : "ERMODEL",
          "label" : "EPA|ENDOCRINE: Integrated pathway model for the Estrogen Receptor",
          "type" : "federal",
          "shortDescription" : "Dataset associated with \"Integrated Model of Chemical Perturbations of a Biological Pathway Using 18 In Vitro High-Throughput Screening Assays for the Estrogen Receptor\" by Judson et al. ",
          "longDescription" : "Dataset associated with \"Integrated Model of Chemical Perturbations of a Biological Pathway Using 18 In Vitro High-Throughput Screening Assays for the Estrogen Receptor\" by Judson et al. <a href='http://dx.doi.org/10.1093/toxsci/kfv168' target='_blank'>(LINK)</a> A computational network model that integrates 18 in vitro, high-throughput screening assays measuring estrogen receptor (ER) binding, dimerization, chromatin binding, transcriptional activation, and ER-dependent cell proliferation. The network model uses activity patterns across the in vitro assays to predict whether a chemical is an ER agonist or antagonist, or is otherwise influencing the assays through a manner dependent on the physics and chemistry of the technology platform (“assay interference”). The method is applied to a library of 1812 commercial and environmental chemicals, including 45 ER positive and negative reference chemicals. ",
          "chemicalCount" : 1812,
          "updatedAt" : "2019-05-18T21:04:11Z"
        }, {
          "id" : 1206,
          "listName" : "FDAUNII0421",
          "label" : "LIST: FDA UNII List April 12th 2021 Download",
          "type" : "federal",
          "shortDescription" : "FDA’s Global Substance Registration System Unique Ingredient Identifiers (UNIIs) file: April 12th 2021 download subset of chemicals with CASRN and/or structure SMILES",
          "longDescription" : "FDA’s Global Substance Registration System Unique Ingredient Identifiers (UNIIs) file: April 12th 2021 download subset of chemicals with CASRN and/or structure SMILES\r\n\r\nTo this end, FDA’s Health Informatics team, NIH's National Center for Advancing Translational Sciences (NCATS), and the European Medicines Agency (EMA) have collaborated to create a Global Substance Registration System (GSRS) that will enable the efficient and accurate exchange of information on what substances are in regulated products.\r\n\r\nInstead of relying on names--which vary across regulatory domains, countries, and regions—the GSRS knowledge base makes it possible for substances to be defined by standardized, scientific descriptions. It classifies substances as chemical, protein, nucleic acid, polymer, structurally diverse, or mixture as detailed in the ISO 11238  (International Organization for Standardization)  and ISO DTS 19844. FDA’s GSRS generates Unique Ingredient Identifiers (UNIIs) used in electronic listings.",
          "chemicalCount" : 61269,
          "updatedAt" : "2023-12-30T11:52:55Z"
        }, {
          "id" : 1052,
          "listName" : "HBSL",
          "label" : "Health-Based Screening Levels for Evaluating Water-Quality Data",
          "type" : "federal",
          "shortDescription" : "Health-Based Screening Levels (HBSLs) are non-enforceable water-quality benchmarks",
          "longDescription" : "Health-Based Screening Levels (HBSLs) are non-enforceable water-quality benchmarks that can be used to (1) supplement U.S. Environmental Protection Agency (USEPA) Maximum Contaminant Levels (MCLs) and Human Health Benchmarks for Pesticides (HHBPs), (2) determine whether contaminants found in surface-water or groundwater sources of drinking water may indicate a potential human-health concern, and (3) help prioritize monitoring efforts. HBSLs were developed by the U.S. Geological Survey (USGS) National Water-Quality Assessment (NAWQA) Project for contaminants without USEPA MCLs or HHBPs.",
          "chemicalCount" : 802,
          "updatedAt" : "2021-02-02T08:37:41Z"
        }, {
          "id" : 318,
          "listName" : "HEROMAP",
          "label" : "EPA; Chemicals mapped to HERO  ",
          "type" : "federal",
          "shortDescription" : "The Health and Environmental Research Online (HERO) database provides an easy way to access and influence the scientific literature behind EPA science assessments.",
          "longDescription" : "The Health and Environmental Research Online (HERO) database provides an easy way to access and influence the scientific literature behind EPA science assessments.\r\n\r\nThe database includes more than 600,000 scientific references and data from the peer-reviewed literature used by EPA to develop its regulations for the following: Integrated Science Assessments (ISA) that feed into the <a href=\"http://www.epa.gov/air/criteria.html\" target=\"_blank\">NAAQS</a> review, Provisional Peer Reviewed Toxicity Values (<a href=\"http://hhpprtv.ornl.gov/quickview/pprtv_papers.php\" target=\"_blank\">PPRTV</a>) that represent human health toxicity values for the Superfund, and the Integrated Risk Information System (IRIS), a database that supports critical agency policymaking for chemical regulation. These assessments supported by HERO characterize the nature and magnitude of health risks to humans and the ecosystem from pollutants and chemicals in the environment.\r\n\r\nHERO is an EVERGREEN database, this means that new studies are continuously added so scientists can keep abreast of current research. Imported references are systematically sorted, classified and made available for search and citation. \r\n\r\nHERO is part of the <a href=\"http://epa.gov/open\" target=\"_blank\">open government directive</a> to conduct business with transparency, participation, and collaboration. Every American has the right to know the data behind EPA's regulatory process. With HERO, the public can participate in the decision-making process.",
          "chemicalCount" : 495,
          "updatedAt" : "2018-11-16T21:29:55Z"
        }, {
          "id" : 754,
          "listName" : "HTPP2019_SCREEN",
          "label" : "EPA HTPP Screening Set - Nyffeler et al. 2019",
          "type" : "federal",
          "shortDescription" : "List of chemicals screened by EPA researchers in high-throughput phenotypic profiling in U-2 OS cells. ",
          "longDescription" : "List of chemicals screened by EPA researchers in high-throughput phenotypic profiling in U-2 OS cells. For more information, see: <a href='https://doi.org/10.1016/j.taap.2019.114876' target='_blank'>Nyffeler et al., Bioactivity screening of environmental chemicals using high-throughput phenotypic profiling</a>. See also <a href='https://comptox.epa.gov/dashboard/chemical-lists/HTPP2019_REFSET' target='_blank'>HTPP2019_REFSET</a>.\r\n\r\n\r\n",
          "chemicalCount" : 462,
          "updatedAt" : "2022-05-12T05:07:37Z"
        }, {
          "id" : 870,
          "listName" : "HZRDWASTEPU",
          "label" : "EPA: Hazardous Waste P & U Lists",
          "type" : "federal",
          "shortDescription" : "The P and U Hazardous Waste lists designate as hazardous waste pure and commercial grade formulations of certain unused chemicals that are being disposed.",
          "longDescription" : "A solid waste is a hazardous waste if it is specifically listed as a known hazardous waste or meets the characteristics of a hazardous waste. Listed wastes are wastes from common manufacturing and industrial processes, specific industries and can be generated from discarded commercial products. Characteristic wastes are wastes that exhibit any one or more of the following characteristic properties: ignitability, corrosivity, reactivity or toxicity.\r\n\r\nThe <a href='https://www.epa.gov/hw/defining-hazardous-waste-listed-characteristic-and-mixed-radiological-wastes#PandU' target='_blank'>P and U lists</a> designate as hazardous waste pure and commercial grade formulations of certain unused chemicals that are being disposed. For a waste to be considered a P- or U-listed waste it must meeting the following three criteria:\r\n\r\nThe waste must contain one of the chemicals listed on the P or U list;\r\nThe chemical in the waste must be unused; and\r\nThe chemical in the waste must be in the form of a commercial chemical product.\r\nEPA defines a commercial chemical product for P and U list purposes as a chemical that is either 100 percent pure, technical (e.g., commercial) grade or the sole active ingredient in a chemical formulation.\r\n\r\nThe P-list identifies acute hazardous wastes from discarded commercial chemical products. The P-list can be found at \r\n<a href='https://www.govinfo.gov/app/details/CFR-2012-title40-vol27/CFR-2012-title40-vol27-sec261-33' target='_blank'>40 CFR section 261.33</a>. The U-list wastes can be found at <a href='https://www.govinfo.gov/app/details/CFR-2012-title40-vol27/CFR-2012-title40-vol27-sec261-33' target='_blank'>40 CFR section 261.33</a>.",
          "chemicalCount" : 371,
          "updatedAt" : "2020-04-14T13:15:33Z"
        }, {
          "id" : 303,
          "listName" : "IRIS",
          "label" : "EPA: IRIS Chemicals",
          "type" : "federal",
          "shortDescription" : "EPA’s IRIS Program identifies and characterizes the health hazards of chemicals found in the environment. Each IRIS assessment can cover a chemical, a group of related chemicals, or a complex mixture.",
          "longDescription" : "The IRIS Program is located within EPA’s Center for Public Health and Environmental Assessment (CPHEA) in the Office of Research and Development (ORD). EPA’s IRIS Program identifies and characterizes the health hazards of chemicals found in the environment. Each IRIS assessment can cover a chemical, a group of related chemicals, or a complex mixture. IRIS assessments provide the following toxicity values for health effects resulting from chronic exposure to chemical: Reference Concentration (RfC), Reference Dose (RfD), Cancer descriptors, Oral slope factors (OSF) and Inhalation unit risk (IUR).",
          "chemicalCount" : 603,
          "updatedAt" : "2023-02-21T16:35:04Z"
        }, {
          "id" : 1708,
          "listName" : "IRISNONCANCER",
          "label" : "EPA: IRIS current non-cancer assessments (as of February 21st 2023)",
          "type" : "federal",
          "shortDescription" : "IRIS list containing chemicals with current (non-archived) non-cancer assessments containing reference dose (RfD) and reference concentrations (RfC).",
          "longDescription" : "The IRIS Program is located within EPA’s Center for Public Health and Environmental Assessment (CPHEA) in the Office of Research and Development (ORD). EPA’s IRIS Program identifies and characterizes the health hazards of chemicals found in the environment. Each IRIS assessment can cover a chemical, a group of related chemicals, or a complex mixture. IRIS assessments provide toxicity values and slope factors for health effects resulting from chronic exposure to chemicals. This list contains chemicals with current (non-archived) non-cancer assessments containing reference dose (RfD) and reference concentrations (RfC).",
          "chemicalCount" : 396,
          "updatedAt" : "2023-02-21T16:29:26Z"
        }, {
          "id" : 399,
          "listName" : "NIOSHICSC",
          "label" : "NIOSH: International Chemical Safety Cards",
          "type" : "federal",
          "shortDescription" : "The International Chemical Safety Cards (ICSC) summarize essential health and safety information on chemicals.",
          "longDescription" : "The International Chemical Safety Cards (ICSC) summarize essential health and safety information on chemicals for their use at the \"shop floor\" level by workers and employers in factories, agriculture, construction and other work places. ICSC summarize health and safety information collected, verified, and peer reviewed by internationally recognized experts, taking into account advice from manufacturers and Poison Control Centres.\r\n\r\n",
          "chemicalCount" : 1609,
          "updatedAt" : "2018-11-16T21:45:03Z"
        }, {
          "id" : 401,
          "listName" : "NIOSHNPG",
          "label" : "NIOSH: Pocket Guide to Chemical Hazards",
          "type" : "federal",
          "shortDescription" : "The NIOSH Pocket Guide to Chemical Hazards (NPG) informs workers, employers, and occupational health professionals about workplace chemicals and their hazards.",
          "longDescription" : "The NIOSH Pocket Guide to Chemical Hazards (NPG) informs workers, employers, and occupational health professionals about workplace chemicals and their hazards. The NPG gives general industrial hygiene information for hundreds of chemicals/classes. The NPG clearly presents key data for chemicals or substance groupings (such as cyanides, fluorides, manganese compounds) that are found in workplaces. The guide offers key facts, but does not give all relevant data. The NPG helps users recognize and control workplace chemical hazards.",
          "chemicalCount" : 615,
          "updatedAt" : "2018-11-16T21:45:25Z"
        }, {
          "id" : 849,
          "listName" : "ORNLRSL",
          "label" : "EPA Regional Screening Levels Data Chemicals List",
          "type" : "federal",
          "shortDescription" : "Chemicals associated with the Regional Screening Levels (RSLs) Generic Tables",
          "longDescription" : "The Regional Screening Levels (RSLs) Generic Tables contain chemical-specific parameters necessary for the calculation of Regional screening Levels (RSLs) for Superfund sites. The RSL tables provide comparison values for residential and commercial/industrial exposures to soil, air, and water. The RSLs are primarily used to determine contaminants of potential concern (COPCs). A more expansive description of the Regional Screening Levels (RSLs) Generic Tables is given <a href='https://www.epa.gov/risk/regional-screening-levels-rsls-generic-tables' target='_blank'>here</a>.",
          "chemicalCount" : 1706,
          "updatedAt" : "2020-02-19T11:53:36Z"
        }, {
          "id" : 2183,
          "listName" : "OSHAV2",
          "label" : "LIST: OSHA Chemicals (Version 2)",
          "type" : "federal",
          "shortDescription" : "List of chemicals from the OSHA Occupational Chemical Database (Version 2)",
          "longDescription" : "This list represents the union of chemicals identified in two datasets maintained by the U.S. Occupational Safety and Health Administration (OSHA): the United States Information System (USIS) and the Chemical Exposure Health Data (CEHD). The USIS aggregates information from two sources: the legacy Integrated Management Information System (IMIS), which includes records from 1971 to 2015, and its next-generation replacement, the OSHA Information System (OIS), which includes records from 2011 to 2021. The CEHD dataset includes all OSHA chemical exposure measurements analyzed by the Salt Lake Technical Center, spanning data from 1984 through 2024. (Last Updated 1/22/2025)",
          "chemicalCount" : 1119,
          "updatedAt" : "2025-01-22T09:23:48Z"
        }, {
          "id" : 1705,
          "listName" : "PESTHHBS",
          "label" : "EPA|PESTICIDES: 2021 Human Health Benchmarks for Pesticides",
          "type" : "federal",
          "shortDescription" : "EPA has developed human health benchmarks for 430 pesticides.",
          "longDescription" : "Advanced testing methods now allow for the detection of pesticides in water at very low levels. Small amounts of pesticides detected in drinking water or source water for drinking water do not necessarily indicate a health risk to consumers. EPA has developed human health benchmarks for 430 pesticides to provide information to enable Tribes, states, and water systems to evaluate: (1) whether the detection level of a pesticide in drinking water or sources of drinking water may indicate a potential health risk; and (2) to help to prioritize water monitoring efforts.\r\n\r\nThe HHBPs Table includes noncancer benchmarks for exposure to pesticides that may be found in surface or ground water sources of drinking water. Noncancer benchmarks for acute (one-day) and chronic (lifetime) drinking water exposures to each pesticide were derived for the most sensitive life stage, based on the available information. The table also includes cancer benchmarks for 48 of the pesticides that have toxicity information that indicates the potential to lead to cancer. The HHBP table includes pesticides for which EPA’s Office of Pesticide Programs has available toxicity data but for which EPA has not yet developed either enforceable National Primary Drinking Water Regulations (i.e., MCLs) or non-enforceable HAs. The list of 2021 Human Health Benchmarks is available <a href='https://www.epa.gov/sdwa/2021-human-health-benchmarks-pesticides' target='_blank'>here</a>.\r\n",
          "chemicalCount" : 448,
          "updatedAt" : "2023-02-17T18:52:40Z"
        }, {
          "id" : 232,
          "listName" : "PPRTVWEB",
          "label" : "EPA: PPRTV Chemical Report",
          "type" : "federal",
          "shortDescription" : "The Provisional Peer-Reviewed Toxicity Values (PPRTVs) currently represent the second tier of human health toxicity values for the EPA Superfund and Resource Conservation and Recovery Act (RCRA) hazardous waste programs.",
          "longDescription" : "PPRTVs (Provisional peer-reviewed Toxicity Values) are developed for use in the EPA Superfund Program. Requests to try and derive a PPRTV are generally filtered through the EPA Regional Superfund Program, in which the site subject to the request is located. However, Regions typically request PPRTVs regardless of what party is considered the lead agency or is funding response actions on the (Superfund) site, including Fund-lead sites, potential responsible party (PRP) lead sites, State-lead sites, and sites where other Federal agencies may be identified as the lead agency.",
          "chemicalCount" : 407,
          "updatedAt" : "2025-10-23T14:39:11Z"
        }, {
          "id" : 398,
          "listName" : "SCDM",
          "label" : "EPA; Superfund Chemical Data Matrix ",
          "type" : "federal",
          "shortDescription" : "The Superfund Chemical Data Matrix (SCDM) generates a list of the corresponding Hazard Ranking System (HRS) factor values, benchmarks, and data elements for a particular chemical.",
          "longDescription" : "The Superfund Chemical Data Matrix (SCDM) generates a list of the corresponding Hazard Ranking System (HRS) factor values, benchmarks, and data elements for a particular chemical.",
          "chemicalCount" : 220,
          "updatedAt" : "2018-11-16T21:58:15Z"
        }, {
          "id" : 949,
          "listName" : "SSWQS",
          "label" : "State-Specific Water Quality Standards Effective under the Clean Water Act (CWA)",
          "type" : "federal",
          "shortDescription" : "EPA has compiled state, territorial, and authorized tribal water quality standards that EPA has approved or are otherwise in effect for Clean Water Act purposes. ",
          "longDescription" : "The State-Specific Water Quality Standards Effective under the Clean Water Act (CWA) website is available \r\n<a href='https://www.epa.gov/wqs-tech/state-specific-water-quality-standards-effective-under-clean-water-act-cwa' target='_blank'>here</a>.\r\n\r\nEPA has compiled state, territorial, and authorized tribal water quality standards that EPA has approved or are otherwise in effect for Clean Water Act purposes.  This compilation is continuously updated as EPA approves new or revised Water Quality Standards. \r\n\r\nIn instances when state-specific water quality standards have not been developed or approved by EPA, the Agency will propose and/or promulgate standards for a state until such time as the state submits and EPA approves their own standards. Any federally-proposed or promulgated replacement water quality standards are also identified.\r\n\r\nWater quality standards may contain additional provisions outside the scope of the Clean Water Act, its implementing federal regulations, or EPA's authority. In some cases, these additional provisions have been included as supplementary information.\r\n\r\nEPA is posting the water quality standards as a convenience to users and has made a reasonable effort to assure their accuracy. Additionally, EPA has made a reasonable effort to identify parts of the standards that are approved, disapproved, or are otherwise not in effect for Clean Water Act purposes. ",
          "chemicalCount" : 409,
          "updatedAt" : "2020-06-24T19:56:30Z"
        }, {
          "id" : 923,
          "listName" : "STORAGETANKS",
          "label" : "EPA: Underground Storage Tanks (USTs)",
          "type" : "federal",
          "shortDescription" : "Chemicals present in Underground Storage Tanks  ",
          "longDescription" : "Approximately 550,000  <a href='https://www.epa.gov/ust' target='_blank'>underground storage tanks (USTs)</a> nationwide store petroleum or hazardous substances. The greatest potential threat from a leaking UST is contamination of groundwater, the source of drinking water for nearly half of all Americans. EPA, states, territories, and tribes work in partnership with industry to protect the environment and human health from potential releases.<br/><br/>\r\n\r\nOther lists of interest are:<br/><br/>\r\n\r\nHazardous Substance List (40CFR116.4): related to Above Ground Storage Tanks\r\n<a href='http://comptox.epa.gov/admin/chemical_lists/40cfr1164' target='_blank'>Hazardous Substance List (40CFR116.4): related to Above Ground Storage Tanks</a><br/><br/>\r\n\r\nList of constituents of motor fuels relevant to leaking underground storage tank sites\r\n<a href='http://comptox.epa.gov/admin/chemical_lists/motorfuels' target='_blank'>List of constituents of motor fuels relevant to leaking underground storage tank sites</a><br/><br/>\r\n",
          "chemicalCount" : 756,
          "updatedAt" : "2020-07-27T13:07:13Z"
        }, {
          "id" : 161,
          "listName" : "TOX21SL",
          "label" : "TOX21SL: Tox21 Screening Library",
          "type" : "federal",
          "shortDescription" : "TOX21SL is list of unique substances comprising the screening library for the Tox21 program, a multi-federal agency collaborative among the US EPA, NIH/NTP, NIH/NCATS, and the US FDA.",
          "longDescription" : "TOX21SL is a list of unique DSSTox substances comprising the original screening library for the Tox21 program, a multi-federal agency collaborative among US EPA, the National Institutes of Health (NIH) National Toxicology Program (NTP) and National Center for Advances in Translational Science (NCATS), and the US Food and Drug Administration (FDA). EPA, NTP and NCATS partners contributed approximately equal size inventories to the library, whereas FDA contributed a small set of drugs. EPA’s contribution to the original TOX21SL fully covered its ToxCast inventory, so retains significant overlap with the current ToxCast HTS inventory (<a href=https://comptox.epa.gov/dashboard/chemical_lists/toxcast”target=”_blank”>TOXCAST</a>). The NTP contribution was drawn from the NTP bioassay and research testing programs of chemicals of interest to environmental toxicology, and the NCATS contribution consisted primarily of marketed drugs. Tox21 compounds were selected based on a wide range of criteria, including, but not limited to: environmental hazard or exposure concern based on production volume (industrial chemicals) or occurrence data, availability of animal toxicity study data, food-additives, fragrances, toxicity reference chemicals, and drugs or known bioactive compounds. Chemicals in the original Tox21 program underwent screening at the intramural NCATS robotics testing facility. All HTS assay data generated in association with the Tox21 program are publicly available through PubChem (https://pubchem.ncbi.nlm.nih.gov/), as are the analytical chemistry quality control (QC) summary records generated in association with the Tox21 testing program. Tox21 assay data are also included in EPA’s ToxCast data downloads (<a href='https://www.epa.gov/chemical-research/exploring-toxcast-data-downloadable-data' target='_blank'>https://www.epa.gov/chemical-research/exploring-toxcast-data-downloadable-data)</a>.<br/><br/>For current information on the Tox21 program, see \r\n<a href='https://tox21.gov/page/home' target='_blank'>https://tox21.gov/page/home</a><br/><br/>\r\nUpdate (Nov 20, 2018):<br/><br/>The following publication coauthored by Tox21 Federal Partner Leads lays out a strategic and operational plan for the Tox21 program from 2018 onward:  <a href='https://www.ncbi.nlm.nih.gov/pubmed/29529324' target='_blank'>https://www.ncbi.nlm.nih.gov/pubmed/29529324)</a><br>  \r\nThe plan articulates areas of focused scientific investment, both in chemical and biological space, to which new Tox21 cross-partner projects will be directed. In keeping with the new strategic plan, the Tox21 testing library moving forward is being consolidated under EPA chemical management and includes the full, currently available EPA ToxCast chemical library as well as approx. 1300 newly added chemicals provided by the NTP that were in the original TOX21SL library. The full chemical library available to the Tox21 cross-partner projects as DMSO solutions currently exceeds 6400 chemicals, of which nearly 6000 were included in the original TOX21SL library. A snapshot of this active plating library list (dated 11/21/2018) can be accessed at <a href='https://comptox.epa.gov/dashboard/chemical_lists/epacheminv_avail' target='_blank'>EPACHEMINV_AVAIL</a>.\r\n\r\n ",
          "chemicalCount" : 8947,
          "updatedAt" : "2018-11-23T20:53:50Z"
        }, {
          "id" : 1432,
          "listName" : "TOXCAST",
          "label" : "TOXCAST is the complete list of chemicals having undergone some level of screening in EPA's ToxCast research program since 2007 (last updated 4/11/2017); sublists included.",
          "type" : "federal",
          "shortDescription" : "TOXCAST is the complete list of chemicals having undergone some level of screening in EPA's ToxCast research program since 2007 (last updated 4/11/2017); sublists included.",
          "longDescription" : "TOXCAST consists of the full list of chemicals having undergone some level of screening in EPA's ToxCast research program from 2007 to the present (last updated 4/11/2017). The list includes all chemicals available for current Phase III testing, as well as discontinued chemicals that underwent limited screening in earlier Phases I and II of the ToxCast program. Discontinued chemicals includes those that were depleted and could not be reprocured (cost, availability), and those discontinued for other reasons (e.g., limited solubility, instability, volatility). TOXCAST also includes EPA’s full, plated contribution of nearly 4000 unique chemicals to the multi-federal agency Tox21 program (<a href=https://comptox.epa.gov/dashboard/chemical_lists/tox21sl”target=”_blank”>TOX21SL</a>). A publication detailing the construction and composition of the ToxCast inventory (Richard et al., Chem. Res. Toxicol. 2016) can be freely downloaded from: <a href='http://pubs.acs.org/doi/abs/10.1021/acs.chemrestox.6b00135' target='_blank'>http://pubs.acs.org/doi/abs/10.1021/acs.chemrestox.6b00135</a> <br/> <br/>\r\n\r\nRelated sublists: <br/>\r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/toxcast_phaseI' target='_blank'>TOXCAST_PhaseI: </a> … 310 chemicals (mostly pesticides) screened in Phase I of the ToxCast program (ph1v1 subset)<br/><br/>\r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/toxcast_phaseII' target='_blank'>TOXCAST_PhaseII: </a> … 1800 chemicals screened in Phase II of the ToxCast program, consisting of TOXCAST_ph1v2, ph2 and e1k sublists<br/><br/>\r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/toxcast_phaseIII' target='_blank'>TOXCAST_PhaseIII: </a>… 4584 chemicals available for screening in the current Phase III of the ToxCast program (as of 4/11/2017) <br/><br/>\r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/toxcast_ph1v2' target='_blank'>TOXCAST_ph1v2: </a>… 293 chemicals representing reprocured subset of Phase I (ph1v1) moved into Phase II testing<br/><br/>\r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/toxcast_ph2' target='_blank'>TOXCAST_ph2: </a>… 768 chemicals added in Phase II of the ToxCast program to increase chemical diversity and coverage of chemicals of concern to EPA programs<br/><br/>\r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/toxcast_e1k' target='_blank'>TOXCAST_e1k: </a>… 799 chemicals added in Phase II of the ToxCast program that were selected for screening in endocrine-related assays<br/><br/>\r\n\r\n<a href='https://comptox.epa.gov/dashboard/chemical_lists/toxcast_ph3' target='_blank'>TOXCAST_ph3: </a>… 2678 chemicals added in the most recent, ongoing Phase III of the ToxCast program (current as of 4/11/2017)<br/><br/>\r\n\r\n\r\nFor more information on EPA’s ToxCast program, see:\r\n<a href='https://www.epa.gov/chemical-research/toxicity-forecasting' target='_blank'>https://www.epa.gov/chemical-research/toxicity-forecasting</a><br/><br/>\r\n\r\n\r\nTo access the ToxCast HTS data within the EPA ToxCast Dashboard, see:\r\n<a href='https://www.epa.gov/chemical-research/toxcast-dashboard' target='_blank'>https://www.epa.gov/chemical-research/toxcast-dashboard </a><br/><br/>\r\n",
          "chemicalCount" : 4746,
          "updatedAt" : "2025-09-10T08:29:11Z"
        }, {
