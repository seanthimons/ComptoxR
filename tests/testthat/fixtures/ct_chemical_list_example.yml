          "type" : "other",
          "shortDescription" : "Suspect list from \"Data-driven prioritization of chemicals for various water types using suspect screening LC-HRMS\" by Sjerps et al.",
          "longDescription" : "Extended Suspect List (Table S4) from \"Data-driven prioritization of chemicals for various water types using suspect screening LC-HRMS. Sjerps et al. 2016 Water Research 93: 254-264. <a href='https://dx.doi.org/10.1016/j.watres.2016.02.034' target='_blank'>DOI: 10.1016/j.watres.2016.02.034</a>. The original list is available from the <a href='https://www.norman-network.com/?q=suspect-list-exchange' target='_blank'>NORMAN Suspect List Exchange</a>\r\n",
