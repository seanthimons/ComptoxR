        }, {
          "id" : 662,
          "listName" : "WETMORE2012",
          "label" : "EPA|HTTK: Hepatic metabolic clearance and plasma protein binding data PHASE 1",
          "type" : "other",
          "shortDescription" : "Hepatic metabolic clearance and plasma protein binding data from Wetmore <i>et al.</i>  PHASE 1",
          "longDescription" : "Data from the Wetmore <i>et al.</i> paper <a href='https://dx.doi.org/10.1093/toxsci/kfr254' target='_blank'>Integration of dosimetry, exposure, and high-throughput screening data in chemical toxicity assessment</a>. Hepatic metabolic clearance and plasma protein binding data were experimentally measured for ca. 240 ToxCast Phase I chemicals. The experimental data were used in a population-based <i>in vitro</i>-to-<i>in vivo</i> (IVIVE) extrapolation model to estimate the daily human oral dose, called the oral equivalent dose, necessary to produce steady-state <i>in vivo</i> blood concentrations equivalent to <i>in vitro</i> AC(50) (concentration at 50% of maximum activity) or lowest effective concentration values across more than 500 <i>in vitro</i> assays.\r\n\r\nThe work was split into two phases. This is phase 1 (2012) and the second phase is <a href='https://comptox.epa.gov/dashboard/chemical_lists/WETMORE2015' target='_blank'>available here (2015)</a>.\r\n\r\n\r\n\r\n",
