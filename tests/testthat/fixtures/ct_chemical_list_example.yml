          "shortDescription" : "WISER is a system designed to assist emergency responders in hazardous material incidents. ",
          "longDescription" : "WISER is a system designed to assist emergency responders in hazardous material incidents. WISER provides a wide range of information on hazardous substances, including substance identification support, physical characteristics, human health information, and containment and suppression advice.",
