        }, {
          "id" : 2039,
          "listName" : "CALCSCP",
          "label" : "California Safe Cosmetics Program (CSCP) Product Database",
          "type" : "state",
          "shortDescription" : "California Safe Cosmetics Program (CSCP) Product Database",
          "longDescription" : "The California Safe Cosmetics Act (CSCA) was signed into law in 2005. The Cosmetic Fragrance and Flavor Ingredient Right to Know Act (CFFIRKA) was signed into law in 2020. For all cosmetics sold in California, these laws require the manufacturer, packer, and/or distributor named on the product label to report to the California Department of Public Health (CDPH) all cosmetics that contain any ingredients known or suspected to cause harm, as described in authorizative lists specfied in these laws. The California Safe Cosmetics Program (CSCP) is charged with implementing CSCA and CFFIRKA. The goal of CSCP is to collect and share information on hazardous and potentially hazardous ingredients in cosmetics sold in California and to make this information available to the public. The California Safe Cosmetics Program (CSCP) Product Database is available <a href='https://cscpsearch.cdph.ca.gov/search/publicsearch' target='_blank'>online</a>.\r\n\r\nThis list release is a partial registration and curation is underway as of March 12th 2024. ",
          "chemicalCount" : 3009,
          "updatedAt" : "2024-03-12T00:56:14Z"
        }, {
          "id" : 714,
          "listName" : "MNDOHTOXFREE",
          "label" : "LIST: Minnesota Department of Health  Chemicals of High Concern and Priority Chemicals",
          "type" : "state",
          "shortDescription" : "The Minnesota Department of Health Toxic Free Kids Program Chemicals of High Concern list.",
          "longDescription" : "During the 2009 legislative session, the Toxic Free Kids Act (Minn. Stat. 2010 116.9401 – 116.9407), was passed and signed into law by the governor. The Minnesota Department of Health (MDH) is required to review and revise the Chemicals of High Concern list at least every three years. The Toxic Free Kids Program published the third update of the Chemicals of High Concern list June 28, 2019. A report describing this process as well as public education efforts can be found on the Reports page. The fourth update of the Chemicals of High Concern list is scheduled for July 2022. <br/> <br/>\r\n\r\n\r\nThrough the Toxic Free Kids (TFK) program, MDH is working to identify and communicate the potential for hazardous chemical exposures which could be harmful to human health, particularly to vulnerable or susceptible populations, such as children and pregnant women. <br/> <br/>\r\n\r\n\r\nURL for original data: <a href='https://www.health.state.mn.us/communities/environment/childenvhealth/tfka/index.html' target='_blank'>https://www.health.state.mn.us/communities/environment/childenvhealth/tfka/index.html</a> <br/> <br/>\r\n",
          "chemicalCount" : 1717,
          "updatedAt" : "2021-08-07T14:13:20Z"
        }, {
          "id" : 1692,
          "listName" : "MNDOHTOXFREE2022",
          "label" : "LIST: Minnesota Department of Health Chemicals of High Concern and Priority Chemicals (Last updated January 27th 2023)",
          "type" : "state",
          "shortDescription" : "The Minnesota Department of Health Toxic Free Kids Program Chemicals of High Concern list (Last updated January 27th 2023)",
          "longDescription" : "This is the 2022 Update of the Minnesota Department of Health (MDH) Chemicals of High Concern List. The Toxic Free Kids Program published the fourth update of the Chemicals of High Concern list July 1, 2022. During the 2009 legislative session, the Toxic Free Kids Act (Minn. Stat. 2010 116.9401 – 116.9407), was passed and signed into law by the governor. MDH is required to review and revise the Chemicals of High Concern list at least every three years. A report describing this process as well as public education efforts can be found on the Reports page. The fifth update of the Chemicals of High Concern list is scheduled for July 2025. <br/> <br/>\r\n\r\nThrough the Toxic Free Kids (TFK) program, MDH is working to identify and communicate the potential for hazardous chemical exposures which could be harmful to human health, particularly to vulnerable or susceptible populations, such as children and pregnant women. <br/> <br/>\r\n\r\nURL for original data: <a href='https://www.health.state.mn.us/communities/environment/childenvhealth/tfka/index.html' target='_blank'>https://www.health.state.mn.us/communities/environment/childenvhealth/tfka/index.html</a> <br/> <br/>\r\n\r\n(Last updated January 27th 2023) ",
          "chemicalCount" : 1727,
          "updatedAt" : "2023-01-29T01:58:40Z"
        }, {
          "id" : 378,
          "listName" : "OEHHA",
          "label" : "California Office of Environmental Health Hazard Assessment ",
          "type" : "state",
          "shortDescription" : "The OEHHA Chemical Database is a compilation of health hazard information including reference exposure levels, California public health goals, child-specific reference doses, Propos. 65 safe harbor numbers and soil-screening levels.",
          "longDescription" : "The Office of Environmental Health Hazard Assessment (OEHHA) is the lead state agency for the assessment of health risks posed by environmental contaminants. OEHHA’s mission is to protect human health and the environment through scientific evaluation of risks posed by hazardous substances. The Office is one of five state departments within the California Environmental Protection Agency (CalEPA). The OEHHA Chemical Database is a searchable compilation of health hazard information developed by OEHHA, including reference exposure levels, California public health goals, child-specific reference doses, Proposition 65 safe harbor numbers, and soil-screening levels.",
          "chemicalCount" : 993,
          "updatedAt" : "2021-08-17T06:46:16Z"
        } ]
