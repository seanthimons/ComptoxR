        }, {
          "id" : 813,
          "listName" : "PESTACTIVES",
          "label" : "PESTICIDES|EPA: List of Active Ingredients UPDATED 10/25/2019",
          "type" : "other",
          "shortDescription" : "List of active ingredients in pesticides UPDATED 10/25/2019",
          "longDescription" : "Active pesticide ingredients, <a href='https://www.epa.gov/ingredients-used-pesticide-products/basic-information-about-pesticide-ingredients' target='_blank'>as defined by EPA</a> are the chemicals in a pesticide product that act to control the pests. There are several categories of active ingredients:<br/><br/>\r\n\r\nConventional, which are all ingredients other than biological pesticides and antimicrobial pesticides.<br/><br/>\r\nAntimicrobial, which are substances or mixtures of substances used to destroy or suppress the growth of harmful microorganisms whether bacteria, viruses, or fungi on inanimate objects and surfaces.<br/><br/>\r\nBiopesticides, which are types of ingredients derived from certain natural materials.<br/><br/>\r\n\r\nThis list is maintained with every release.<br/><br/>\r\n\r\nA related list is the <a href='https://comptox.epa.gov/dashboard/chemical_lists/PESTINERTS' target='_blank'>List of Pesticide Inerts</a>.\r\n\r\n\r\n\r\n",
          "chemicalCount" : 510,
          "updatedAt" : "2019-11-17T23:27:44Z"
        }, {
          "id" : 2043,
          "listName" : "PLASTCHEMv1",
          "label" : "PLASTCHEMv1",
          "type" : "other",
          "shortDescription" : "The PlastChem database comprehensively synthesizes the state of the science on plastic chemicals, including their hazard properties, and their presence in polymers.",
          "longDescription" : "The PlastChem database comprehensively synthesizes the state of the science on plastic chemicals, including their hazard properties, and their presence in polymers. Objectives of the PlastChem project include:\r\n\r\n1) Compiling a thorough overview of all known plastic chemicals.\r\n2) Identifying plastic chemicals of concern and linking them to specific polymers.\r\n3) Prioritizing plastic chemicals based on hazard, and other scientific, regulatory, and market data.\r\n4) Synthesizing scientific evidence to guide informed policy development.\r\n\r\nKey activities of the project include consolidating data on over 15 000 plastic chemicals from various sources, compiling hazard and other information, and identifying and prioritizing plastic chemicals and polymers of concern. ",
          "chemicalCount" : 15806,
          "updatedAt" : "2024-12-16T22:14:45Z"
