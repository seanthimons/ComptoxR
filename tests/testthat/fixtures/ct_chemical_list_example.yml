          "type" : "other",
          "shortDescription" : "Chemicals associated with the article \"Standardizing Benchmark Dose Calculations to Improve Science-Based Decisions in Human Health Assessments\" by Wignall et al., 2014",
          "longDescription" : "Chemicals associated with the article \"<a href='https://doi.org/10.1289/ehp.1307539' target='_blank'>Standardizing Benchmark Dose Calculations to Improve Science-Based Decisions in Human Health Assessments</a>\" by Wignall et al., 2014. 880 dose–response data sets for 352 environmental chemicals with existing human health assessments were examined.\r\n\r\n\r\n\r\n",
