          "type" : "federal",
          "shortDescription" : "The List of Lists is a consolidated list of chemicals subject to: Emergency Planning and Community Right-to-Know Act (EPCRA), Comprehensive Environmental Response, Compensation and Liability Act (CERCLA), and Section 112(r) of the Clean Air Act (CAA). ",
          "longDescription" : "The List of Lists is a consolidated list of chemicals subject to: <br/>\r\n\r\nEmergency Planning and Community Right-to-Know Act (EPCRA), <br/>\r\n\r\nComprehensive Environmental Response, Compensation and Liability Act (CERCLA), and <br/>\r\n\r\nSection 112(r) of the Clean Air Act (CAA). <br/>\r\n\r\n",
