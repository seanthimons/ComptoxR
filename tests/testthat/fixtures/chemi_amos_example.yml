DF","description":"BPAL-1 is a pure substance certified reference material (CRM) for [13C5]-bisphenol A. This material, distributed in 5 mg units, is suitable for use as an internal standard during liquid chromatograph \u2013 mass spectrometry (LC\u2012MS) for the quantitation of bisphenol A. A certified value for the mass fraction of bisphenol A has been established for this CRM.","internal_id":"FS-43673","link":"https://nrc-digital-repository.canada.ca/eng/view/crt/?id=d6adc30b-a506-4860-a3b9-e63237bc0772&dsl=en","methodologies":null,"record_type":"Fact Sheet","source":"NRC Canada"},{"count":2,"data_type":"PDF","description":"BPAN-1 is a pure substance certified reference material (CRM) for bisphenol A. This material, distributed in 30 mg units, is intended for instrument calibration, method development, and validation for the quantitation of bisphenol A. A certified value for the mass fraction of bisphenol A has been established for this CRM.","internal_id":"FS-43674","link":"https://nrc-digital-repository.canada.ca/eng/view/crt/?id=0e003156-cbd2-4753-a637-1a4c25e90b51&dsl=en","methodologies":null,"record_type":"Fact Sheet","source":"NRC Canada"},{"count":42,"data_type":"PDF","description":"SESA-1 is an artificial sea salt Certified Reference Material (CRM) from the National Research Council Canada (NRC) to be used as a proxy for seawater. A unit of SESA-1 consists of 9 g of salt powder certified for trace elements. Additionally, SESA-1 was spiked with numerous organic contaminants for future method development purposes. Gravimetric formulation information is provided for all spiked analytes. A 4.0 g of SESA-1 should be transferred into a pre-cleaned flask and reconstituted to 100 g using diluted HNO3 as detailed in the Intended Use section. SESA-1 reconstituted solution has a typical salinity of seawater and can be used for method development and quality control for the analysis of trace elements in seawaters similar to NRC CASS-6 and NASS-7.","internal_id":"FS-43787","link":"https://nrc-digital-repository.canada.ca/eng/view/crt/?id=757ea4ef-2772-4a41-a649-cda777a3e8b4&dsl=en","methodologies":null,"record_type":"Fact Sheet","source":"NRC Canada"},{"count":70,"data_type":"PDF","description":"Scientific Committee on Consumer Products opinion concerning: Request for Confirmation of the SCCNFP Opinion 0474/01 on Chemical Ingredients in Cosmetic Products Classified as Carcinogenic, Mutagenic or Toxic to Reproduction according to Council Directive 67/548/EEC","internal_id":"FS-44174","link":"https://ec.europa.eu/health/ph_risk/committees/04_sccp/docs/sccp_o_00h.pdf","methodologies":null,"record_type":"Fact Sheet","source":"ECCS"},{"count":100,"data_type":"PDF","description":"Scientific Committee on Consumer Products opinion on: Request for Confirmation of the SCCNFP Opinion 0474/01 on Chemical Ingredients in Cosmetic Products Classified as Carcinogenic, Mutagenic or Toxic to Reproduction according to Council Directive 67/548/EEC","internal_id":"FS-44177","link":"https://ec.europa.eu/health/ph_risk/committees/04_sccp/docs/sccp_o_00g.pdf","methodologies":null,"record_type":"Fact Sheet","source":"ECCS"},{"count":1,"data_type":"PDF","description":"EU Risk Assessment for Bisphenol A - 01","internal_id":"FS-44500","link":"http://echa.europa.eu/documents/10162/d35a98bb-d173-4f31-b578-c056f91c1270","methodologies":null,"record_type":"Fact Sheet","source":"ECHA"},{"count":1,"data_type":"PDF","description":"EU Risk Assessment for Bisphenol A - 02","internal_id":"FS-44501","link":"http://echa.europa.eu/documents/10162/c6a8dcfc-1823-4d31-8a24-2c1168f0d217","methodologies":null,"record_type":"Fact Sheet","source":"ECHA"},{"count":1,"data_type":"PDF","description":"EU Risk Assessment for Bisphenol A - 03","internal_id":"FS-44502","link":"http://echa.europa.eu/documents/10162/d1d9e186-4385-4595-b6cb-5a1a7a160f07","methodologies":null,"record_type":"Fact Sheet","source":"ECHA"},{"count":1,"data_type":"PDF","description":"Toxicokinetics of Bisph